<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAN Card Print Layout Engine</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <style>
        * {
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }
        .canvas-container {
            position: relative;
            margin: 15px auto;
            width: 100%;
            max-width: 400px;
            background: #f5f5f5;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }
        
        .exit-fullscreen-btn {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .exit-fullscreen-btn:hover { background: #dc3545; }

        .fullscreen-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 100000;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        .fullscreen-controls button {
            width: auto;
            min-width: 100px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
        }
        
        .canvas-container:fullscreen {
            max-width: 100vw !important;
            width: 100vw !important;
            height: 100vh !important;
            background: #111 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 0;
            margin: 0;
        }
        
        .canvas-container:fullscreen .exit-fullscreen-btn { display: block; }
        .canvas-container:fullscreen .fullscreen-controls { display: flex; }
        
        .canvas-container:fullscreen canvas {
            width: auto !important;
            height: auto !important;
            max-width: 100% !important;
            max-height: 80vh !important;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        .instructions {
            font-size: 13px;
            color: #555;
            text-align: center;
            margin-bottom: 5px;
        }
        .side-preview {
            margin: 15px auto;
            text-align: center;
            display: none;
            scroll-margin-top: 20px;
        }
        .side-preview img {
            width: 180px;
            height: 114px;
            object-fit: contain;
            border: 2px dashed #28a745;
            border-radius: 6px;
            background: #fff;
            padding: 2px;
        }
        .side-preview p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: #28a745;
            font-weight: bold;
        }
        .input-group {
            margin-top: 10px;
            margin-bottom: 15px;
        }
        .input-group label {
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .force-grayscale {
            filter: grayscale(100%) brightness(102%) contrast(105%) !important;
        }
        button:disabled {
            background-color: #9e9e9e !important;
            cursor: not-allowed !important;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>PAN Card Print Layout Engine</h2>
    <p id="cvStatus" style="text-align:center; font-size:12px; color:#e65100; margin:-5px 0 10px 0;">⏳ Loading image enhancer...</p>

    <input type="text" id="name" placeholder="Customer Name (Optional)">
    <input type="tel" id="mobile" placeholder="Mobile Number (Optional)">

    <div class="input-group">
        <label>Number of Pages / Copies to Print:</label>
        <input type="number" id="copies" value="1" min="1" oninput="calculatePrice()" required>
    </div>

    <div class="input-group">
        <label>Print Type Mode:</label>
        <select id="type" onchange="calculatePrice(); applyLiveGrayscalePreviewFilter();">
            <option value="5" selected>Black & White (₹5 / copy)</option>
            <option value="10">Color (₹10 / copy)</option>
        </select>
    </div>

    <h3 id="totalPrice" style="color: #1976d2; text-align: center; margin-bottom: 20px;">Total Price: ₹5</h3>

    <hr>

    <h3>Upload PAN Card (Front Side)</h3>
    <p class="instructions">Drag corners to crop. Use 2 fingers to pinch-zoom / pan.</p>
    <p id="frontDetectStatus" style="text-align:center; font-size:12px; color:#888; margin:-3px 0 5px 0; min-height:15px;"></p>
    <input type="file" id="frontFile" accept="image/*">
    
    <div class="canvas-container" id="frontContainer">
        <button type="button" class="exit-fullscreen-btn" onclick="closeFullscreen()">✕ Exit Fullscreen</button>
        <canvas id="frontCanvas"></canvas>
        <div class="fullscreen-controls">
            <button type="button" style="background: #28a745;" onclick="rotateImage('front')">↻ Rotate</button>
            <button type="button" id="fullscreenSaveBtn" style="background: #1976d2;" onclick="saveSide('front')">Save Card</button>
        </div>
    </div>
    
    <div class="controls">
        <button type="button" onclick="rotateImage('front')">↻ Rotate 90°</button>
        <button type="button" onclick="goFullscreen('front')">⛶ Edit Fullscreen</button>
        <button type="button" onclick="resetZoom('front')">Reset Zoom</button>
        <button type="button" id="saveCardBtn" onclick="saveSide('front')">Save Card</button>
    </div>

    <div class="side-preview" id="frontPreviewContainer">
        <img id="frontPreviewImg" src="" alt="Front Preview">
        <p id="frontPreviewStatus">✓ Clean PAN Image Saved</p>
    </div>

    <br>
    <button type="button" id="submitOrderBtn" onclick="submitID()" style="background:#1976d2; width:100%; padding:12px; font-weight:bold; color:white; border:none; border-radius:6px; cursor:pointer; font-size:16px;">Submit Processing Order</button>
</div>

<script>
const client = window.supabase.createClient(window.SITE_CONFIG.SUPABASE_URL, window.SITE_CONFIG.SUPABASE_KEY);

// 🔍 Visible feedback while OpenCV.js (used for auto-enhance / auto-detect) loads in the background
(function pollCvReady() {
    const cvStatusEl = document.getElementById('cvStatus');
    if (typeof cv !== 'undefined' && cv.Mat) {
        if (cvStatusEl) {
            cvStatusEl.textContent = '✓ Image enhancer ready';
            cvStatusEl.style.color = '#28a745';
            setTimeout(() => { if (cvStatusEl) cvStatusEl.style.display = 'none'; }, 2000);
        }
        return;
    }
    setTimeout(pollCvReady, 300);
})();

let frontDataUrl = null;

const engine = {
    front: { img: null, corners: [], activeCorner: -1, canvas: null, ctx: null, rotation: 0, originalSrc: "", zoom: 1, offsetX: 0, offsetY: 0, isPanning: false, lastTouchDist: 0, lastTouchX: 0, lastTouchY: 0, renderW: 400, renderH: 260 }
};

engine.front.canvas = document.getElementById('frontCanvas');
engine.front.ctx = engine.front.canvas.getContext('2d');

// Helper function for aspect ratio parameters
engine.front.renderWidth = function() { return this.renderW * this.zoom; };
engine.front.renderHeight = function() { return this.renderH * this.zoom; };

document.getElementById('frontFile').addEventListener('change', (e) => handleFileSelect(e, 'front'));

function handleFileSelect(e, side) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        const rawImg = new Image();
        rawImg.onload = function() {
            const maxDimension = 1200;
            let targetWidth = rawImg.width;
            let targetHeight = rawImg.height;

            if (rawImg.width > maxDimension || rawImg.height > maxDimension) {
                if (rawImg.width > rawImg.height) {
                    targetWidth = maxDimension;
                    targetHeight = Math.round((rawImg.height * maxDimension) / rawImg.width);
                } else {
                    targetHeight = maxDimension;
                    targetWidth = Math.round((rawImg.width * maxDimension) / rawImg.height);
                }
            }

            const optimizationCanvas = document.createElement('canvas');
            optimizationCanvas.width = targetWidth;
            optimizationCanvas.height = targetHeight;
            const optimizationCtx = optimizationCanvas.getContext('2d');
            optimizationCtx.drawImage(rawImg, 0, 0, targetWidth, targetHeight);

            const optimizedDataUrl = optimizationCanvas.toDataURL("image/jpeg", 0.92);
            
            engine[side].originalSrc = optimizedDataUrl;
            engine[side].rotation = 0; 
            loadImageData(side, optimizedDataUrl);
        };
        rawImg.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

function loadImageData(side, src) {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = function() {
        const s = engine[side];
        s.img = img;
        
        // 🚀 FIXED: Dynamic Aspect Ratio Canvas Scaling
        const containerWidth = 400; // Fixed visual width of container
        const calculatedHeight = Math.round((img.height / img.width) * containerWidth);
        
        // Set canvas to exact proportion of image
        s.canvas.width = containerWidth;
        s.canvas.height = calculatedHeight;
        
        s.renderW = containerWidth;
        s.renderH = calculatedHeight;
        
        s.zoom = 1;
        s.offsetX = 0;
        s.offsetY = 0;
        
        const pad = 20;
        // Fallback default corners (used if auto-detect fails or OpenCV isn't ready yet)
        s.corners = [
            { x: pad, y: pad },
            { x: containerWidth - pad, y: pad },
            { x: containerWidth - pad, y: calculatedHeight - pad },
            { x: pad, y: calculatedHeight - pad }
        ];
        
        draw(side);

        // 🔍 Auto-detect card corners using OpenCV.js as soon as it's available
        tryAutoDetectCorners(side);
    };
    img.src = src;
}

// ========================================================================
// 🔍 AUTO CORNER DETECTION (OpenCV.js Canny + Contour detection)
// ========================================================================
function tryAutoDetectCorners(side, attempt) {
    attempt = attempt || 0;
    const s = engine[side];
    const statusEl = document.getElementById(`${side}DetectStatus`);

    // OpenCV.js still loading in background — wait for it (max ~6s), then give up silently
    if (typeof cv === 'undefined' || !cv.Mat) {
        if (statusEl) statusEl.textContent = '⏳ Waiting for image enhancer to load...';
        if (attempt < 20) setTimeout(() => tryAutoDetectCorners(side, attempt + 1), 300);
        else if (statusEl) statusEl.textContent = '';
        return;
    }

    // User may have already switched images / moved on — bail if nothing to detect
    if (!s.img) return;

    if (statusEl) statusEl.textContent = '🔍 Detecting card edges...';

    // Let the "Detecting..." message paint before the (synchronous, can be heavy) CV work runs
    setTimeout(() => {
        const detected = autoDetectCorners(side);
        if (detected) {
            draw(side);
            if (statusEl) {
                statusEl.textContent = '✓ Card edges auto-detected — adjust if needed';
                statusEl.style.color = '#28a745';
            }
        } else if (statusEl) {
            statusEl.textContent = 'ℹ️ Could not auto-detect — please drag corners manually';
            statusEl.style.color = '#e65100';
        }
    }, 30);
}

// Orders 4 arbitrary points into [top-left, top-right, bottom-right, bottom-left]
// to match the winding order expected by projectPerspective()
function orderCornersClockwise(pts) {
    const sums = pts.map(p => p.x + p.y);
    const diffs = pts.map(p => p.x - p.y);
    const tl = pts[sums.indexOf(Math.min(...sums))];
    const br = pts[sums.indexOf(Math.max(...sums))];
    const tr = pts[diffs.indexOf(Math.max(...diffs))];
    const bl = pts[diffs.indexOf(Math.min(...diffs))];
    return [tl, tr, br, bl];
}

// Corner detection strategy:
//  - bilateralFilter instead of GaussianBlur: smooths busy/textured backgrounds
//    (wood, stone, fabric) while preserving the card's actual edges
//  - multiple adaptive Canny threshold bands tried per image, instead of a single
//    fixed pair — glare on plastic sleeves and low-contrast backgrounds often need
//    a wider or narrower band than the standard auto-canny ratio
//  - RETR_LIST instead of RETR_EXTERNAL: still finds the card contour even if
//    it's nested inside a larger background contour
//  - approxPolyDP first, with a cv.minAreaRect fallback when the contour never
//    cleanly reduces to 4 points (common with glare-fragmented edges)
//  - scores candidate quads by area + rectangularity + how close their
//    aspect ratio is to a real PAN card (856:540 ≈ 1.586), instead of just
//    picking the single largest 4-point contour
function autoDetectCorners(side) {
    const s = engine[side];
    const dispW = s.canvas.width;
    const dispH = s.canvas.height;
    const TARGET_RATIO = 856 / 540; // PAN card aspect ratio ~1.586

    // 🎯 ACCURACY UPGRADE 1 — detect at higher resolution than the display
    // canvas, then scale the found corners back down. The on-screen canvas
    // is only 400px wide (kept small for smooth dragging); that's not
    // enough resolution for the contour/corner math to land precisely on
    // the card's real edge, especially on higher-res phone photos.
    const nativeW = s.img.naturalWidth || s.img.width || dispW;
    const DETECT_W = Math.min(1100, Math.max(dispW, nativeW));
    const scale = DETECT_W / dispW;
    const w = DETECT_W;
    const h = Math.round(dispH * scale);
    const canvasArea = w * h;

    let src, gray, blurred, kernel;
    const candidates = [];
    let rejectedForSize = 0;

    const cx = w / 2, cy = h / 2;
    const maxCenterDist = Math.hypot(cx, cy);

    function quadSideLengths(pts) {
        const d = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
        return [d(pts[0], pts[1]), d(pts[1], pts[2]), d(pts[2], pts[3]), d(pts[3], pts[0])];
    }

    function evaluateCandidate(pts) {
        const ordered = orderCornersClockwise(pts);
        const sides = quadSideLengths(ordered);
        const wAvg = (sides[0] + sides[2]) / 2;
        const hAvg = (sides[1] + sides[3]) / 2;
        const ratio = Math.max(wAvg, hAvg) / Math.max(1, Math.min(wAvg, hAvg));
        const ratioError = Math.abs(ratio - TARGET_RATIO) / TARGET_RATIO;
        const area = wAvg * hAvg;
        return { ordered, ratioError, area };
    }

    // Manually compute the 4 corners of a cv.RotatedRect (from cv.minAreaRect).
    // NOTE: cv.RotatedRect.points() is NOT a real method in OpenCV.js's bindings —
    // calling it throws, which was silently aborting detection entirely before.
    function rotatedRectCorners(rect) {
        const angleRad = (rect.angle * Math.PI) / 180;
        const cos = Math.cos(angleRad), sin = Math.sin(angleRad);
        const w2 = rect.size.width / 2, h2 = rect.size.height / 2;
        const rcx = rect.center.x, rcy = rect.center.y;
        return [
            { x: -w2, y: -h2 }, { x: w2, y: -h2 }, { x: w2, y: h2 }, { x: -w2, y: h2 }
        ].map(p => ({
            x: rcx + p.x * cos - p.y * sin,
            y: rcy + p.x * sin + p.y * cos
        }));
    }

    // Card can be a small part of the frame, but shouldn't be near-zero (noise)
    // or the entire frame (a false "whole image" contour)
    const minArea = canvasArea * 0.03;
    const maxArea = canvasArea * 0.95;

    // 🎯 ACCURACY UPGRADE 2 — collect every plausible quad ONCE across all
    // masks (instead of accept/reject inline against one fixed tolerance).
    // Selection tolerance is applied afterwards in tiers (see below), so
    // the actual CV work (findContours/approxPolyDP/etc.) isn't repeated.
    function collectCandidates(binaryMat, label) {
        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();
        cv.findContours(binaryMat, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

        for (let i = 0; i < contours.size(); i++) {
            const cnt = contours.get(i);
            let hull = null;
            try {
                const area = cv.contourArea(cnt);
                if (area < minArea || area > maxArea) { rejectedForSize++; continue; }

                hull = new cv.Mat();
                cv.convexHull(cnt, hull);
                const peri = cv.arcLength(hull, true);

                let quadPts = null;
                for (let epsFactor = 0.02; epsFactor <= 0.1; epsFactor += 0.01) {
                    const approx = new cv.Mat();
                    cv.approxPolyDP(hull, approx, epsFactor * peri, true);
                    if (approx.rows === 4) {
                        quadPts = [];
                        for (let j = 0; j < 4; j++) {
                            quadPts.push({ x: approx.intPtr(j, 0)[0], y: approx.intPtr(j, 0)[1] });
                        }
                        approx.delete();
                        break;
                    }
                    approx.delete();
                }

                if (!quadPts) {
                    const rotRect = cv.minAreaRect(hull);
                    quadPts = rotatedRectCorners(rotRect);
                }

                const rect = cv.boundingRect(cnt);
                const rectangularity = area / Math.max(1, (rect.width * rect.height));
                const { ordered, ratioError, area: quadArea } = evaluateCandidate(quadPts);
                const centroidX = (ordered[0].x + ordered[1].x + ordered[2].x + ordered[3].x) / 4;
                const centroidY = (ordered[0].y + ordered[1].y + ordered[2].y + ordered[3].y) / 4;

                candidates.push({ ordered, ratioError, rectangularity, area: quadArea, centroidX, centroidY, label });
            } catch (candidateErr) {
                console.warn(`[autoDetect/${side}] candidate from ${label} threw:`, candidateErr);
            } finally {
                if (hull) hull.delete();
                cnt.delete();
            }
        }
        contours.delete();
        hierarchy.delete();
    }

    let bestQuad = null;
    let usedTierLabel = "";

    try {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w;
        tempCanvas.height = h;
        tempCanvas.getContext('2d').drawImage(s.img, 0, 0, w, h);

        src = cv.imread(tempCanvas);
        gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        blurred = new cv.Mat();
        cv.bilateralFilter(gray, blurred, 9, 75, 75);

        kernel = cv.Mat.ones(5, 5, cv.CV_8U);
        const meanVal = cv.mean(blurred)[0];

        // Strategy A: Canny edges at several adaptive threshold bands
        const multiplierSets = [[0.66, 1.33], [0.4, 1.6], [0.2, 2.0]];
        for (const [loMult, hiMult] of multiplierSets) {
            const lower = Math.max(0, loMult * meanVal);
            const upper = Math.min(255, hiMult * meanVal);
            let edged = new cv.Mat();
            let dilated = new cv.Mat();
            cv.Canny(blurred, edged, lower, upper);
            cv.dilate(edged, dilated, kernel, new cv.Point(-1, -1), 2);
            collectCandidates(dilated, `canny(${loMult},${hiMult})`);
            edged.delete();
            dilated.delete();
        }

        // Strategy B: Otsu threshold on brightness. A white/light card against
        // a duller background (wood, stone, fabric, skin) segments as one bright
        // blob far more reliably than edge detection does on textured surfaces.
        let otsu = new cv.Mat();
        cv.threshold(blurred, otsu, 0, 255, cv.THRESH_BINARY + cv.THRESH_OTSU);
        collectCandidates(otsu, "otsu-bright");
        otsu.delete();

        // Strategy C: inverse Otsu, in case the card is darker than its background
        let otsuInv = new cv.Mat();
        cv.threshold(blurred, otsuInv, 0, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);
        collectCandidates(otsuInv, "otsu-dark");
        otsuInv.delete();

        // 🎯 ACCURACY UPGRADE 3 — strict-to-loose tier cascade. A tight,
        // clean quad that closely matches the card's real aspect ratio
        // wins over a big loose one, even if the loose one scores higher
        // on raw area. We only fall back to a looser tier if literally
        // nothing clean was found at that tier.
        const tiers = [
            { ratioTol: 0.12, rectTol: 0.88, label: "strict" },
            { ratioTol: 0.25, rectTol: 0.75, label: "medium" },
            { ratioTol: 0.6,  rectTol: 0.5,  label: "loose"  },
        ];

        for (const tier of tiers) {
            let localBest = null;
            let localBestScore = -1;
            for (const c of candidates) {
                if (c.ratioError >= tier.ratioTol || c.rectangularity <= tier.rectTol) continue;
                // 🎯 ACCURACY UPGRADE 3b — central bias: the card is almost
                // always the thing the user deliberately framed in the
                // middle of the shot, so prefer centrally-placed candidates
                // over stray background shapes that also happen to pass
                // the ratio/rectangularity bar.
                const centerDist = Math.hypot(c.centroidX - cx, c.centroidY - cy) / maxCenterDist;
                const centerBias = 1 - Math.min(1, centerDist) * 0.35;
                const score = c.area * c.rectangularity * (1 - c.ratioError) * centerBias;
                if (score > localBestScore) {
                    localBestScore = score;
                    localBest = c.ordered;
                }
            }
            if (localBest) {
                bestQuad = localBest;
                usedTierLabel = tier.label;
                break;
            }
        }

        console.log(`[autoDetect/${side}] candidates: ${candidates.length}, rejected(size): ${rejectedForSize}, tier used: ${usedTierLabel || "none"}`);

        if (bestQuad) {
            // 🎯 ACCURACY UPGRADE 4 — sub-pixel corner refinement. The
            // polygon-approximation corners above are accurate to a few
            // pixels at best; cornerSubPix nudges each one to the true
            // local gradient intersection, visibly tightening the crop
            // right at the card boundary. Best-effort: some opencv.js
            // builds omit this binding, so failures are silently ignored
            // and the un-refined quad is kept.
            try {
                bestQuad = refineCornersSubPixel(gray, bestQuad);
            } catch (refineErr) {
                console.warn(`[autoDetect/${side}] sub-pixel refine skipped:`, refineErr);
            }

            // Scale the detected corners back down from detection
            // resolution to the display canvas's coordinate space.
            s.corners = bestQuad.map(p => ({ x: p.x / scale, y: p.y / scale }));
            return true;
        }
        return false;
    } catch (e) {
        console.warn(`[autoDetect/${side}] detection pass failed:`, e);
        return false;
    } finally {
        [src, gray, blurred, kernel].forEach(m => {
            if (m && typeof m.delete === 'function') m.delete();
        });
    }
}

// Nudges each corner of an approximate quad to the true local edge/gradient
// intersection using OpenCV's iterative sub-pixel corner refinement.
// Operates on the same grayscale Mat used for detection (pre-scale-down).
function refineCornersSubPixel(grayMat, quad) {
    let cornersMat = new cv.Mat(4, 1, cv.CV_32FC2);
    for (let i = 0; i < 4; i++) {
        cornersMat.data32F[i * 2] = quad[i].x;
        cornersMat.data32F[i * 2 + 1] = quad[i].y;
    }
    const winSize = new cv.Size(5, 5);
    const zeroZone = new cv.Size(-1, -1);
    const criteria = new cv.TermCriteria(cv.TERM_CRITERIA_EPS + cv.TERM_CRITERIA_MAX_ITER, 40, 0.001);
    cv.cornerSubPix(grayMat, cornersMat, winSize, zeroZone, criteria);
    const refined = [];
    for (let i = 0; i < 4; i++) {
        refined.push({ x: cornersMat.data32F[i * 2], y: cornersMat.data32F[i * 2 + 1] });
    }
    cornersMat.delete();
    return refined;
}

function resetZoom(side) {
    const s = engine[side];
    s.zoom = 1;
    s.offsetX = 0;
    s.offsetY = 0;
    draw(side);
}

function calculatePrice() {
    let copies = parseInt(document.getElementById("copies").value) || 1;
    if (copies < 1) copies = 1;
    let baseRate = parseInt(document.getElementById("type").value); 
    document.getElementById("totalPrice").innerText = "Total Price: ₹" + (copies * baseRate);
}

function applyLiveGrayscalePreviewFilter() {
    const frontImg = document.getElementById("frontPreviewImg");
    const isBw = document.getElementById("type").value == 5;
    
    if (isBw) {
        if(frontImg) frontImg.classList.add("force-grayscale");
    } else {
        if(frontImg) frontImg.classList.remove("force-grayscale");
    }
}

async function goFullscreen(side) {
    const container = document.getElementById(`${side}Container`);
    if (!engine[side].img) { alert("Please upload an image first."); return; }
    try {
        if (container.requestFullscreen) await container.requestFullscreen();
        else if (container.webkitRequestFullscreen) await container.webkitRequestFullscreen();
    } catch(err) { console.warn(err); }
    setTimeout(() => draw(side), 100);
}

function closeFullscreen() {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
}

function rotateImage(side) {
    const s = engine[side];
    if (!s.originalSrc) { alert("Upload image first."); return; }
    
    s.rotation = (s.rotation + 90) % 360;
    const tempImg = new Image();
    tempImg.crossOrigin = "anonymous";
    tempImg.onload = function() {
        const internalCanvas = document.createElement('canvas');
        if (s.rotation === 90 || s.rotation === 270) {
            internalCanvas.width = tempImg.height;
            internalCanvas.height = tempImg.width;
        } else {
            internalCanvas.width = tempImg.width;
            internalCanvas.height = tempImg.height;
        }
        
        const internalCtx = internalCanvas.getContext('2d');
        internalCtx.translate(internalCanvas.width / 2, internalCanvas.height / 2);
        internalCtx.rotate((s.rotation * Math.PI) / 180);
        internalCtx.drawImage(tempImg, -tempImg.width / 2, -tempImg.height / 2);
        
        const rotatedImg = new Image();
        rotatedImg.crossOrigin = "anonymous";
        rotatedImg.onload = function() {
            // Apply new dynamic height based on rotated image
            const containerWidth = 400; 
            const calculatedHeight = Math.round((rotatedImg.height / rotatedImg.width) * containerWidth);
            
            s.img = rotatedImg;
            s.canvas.width = containerWidth;
            s.canvas.height = calculatedHeight;
            s.renderW = containerWidth;
            s.renderH = calculatedHeight;
            
            s.zoom = 1;
            s.offsetX = 0;
            s.offsetY = 0;
            
            const pad = 20;
            s.corners = [
                { x: pad, y: pad },
                { x: containerWidth - pad, y: pad },
                { x: containerWidth - pad, y: calculatedHeight - pad },
                { x: pad, y: calculatedHeight - pad }
            ];
            draw(side);
            // Re-run auto corner detection since orientation changed
            tryAutoDetectCorners(side);
        };
        rotatedImg.src = internalCanvas.toDataURL("image/jpeg");
    };
    tempImg.src = s.originalSrc;
}

function draw(side) {
    const s = engine[side];
    if (!s.img) return;
    s.ctx.clearRect(0, 0, s.canvas.width, s.canvas.height);
    
    s.ctx.save();
    s.ctx.translate(s.offsetX, s.offsetY);
    s.ctx.scale(s.zoom, s.zoom);
    s.ctx.drawImage(s.img, 0, 0, s.renderW, s.renderH);
    s.ctx.restore();

    s.ctx.strokeStyle = '#28a745';
    s.ctx.lineWidth = 2;
    s.ctx.beginPath();
    s.ctx.moveTo(s.corners[0].x, s.corners[0].y);
    for (let i = 1; i < 4; i++) s.ctx.lineTo(s.corners[i].x, s.corners[i].y);
    s.ctx.closePath();
    s.ctx.stroke();

    s.corners.forEach((corner) => {
        s.ctx.fillStyle = '#28a745';
        s.ctx.beginPath();
        s.ctx.arc(corner.x, corner.y, 14, 0, Math.PI * 2);
        s.ctx.fill();
        s.ctx.strokeStyle = '#fff';
        s.ctx.lineWidth = 3;
        s.ctx.stroke();
    });
}

function projectPerspective(srcImg, corners, targetW, targetH, s) {
    targetW = 856; targetH = 540;
    const hiddenCanvas = document.createElement('canvas');
    hiddenCanvas.width = targetW; hiddenCanvas.height = targetH;
    const ctx = hiddenCanvas.getContext('2d');

    // Mapped flawlessly using dynamic boundaries
    const p1 = [(corners[0].x - s.offsetX) / s.renderWidth(), (corners[0].y - s.offsetY) / s.renderHeight()];
    const p2 = [(corners[1].x - s.offsetX) / s.renderWidth(), (corners[1].y - s.offsetY) / s.renderHeight()];
    const p3 = [(corners[2].x - s.offsetX) / s.renderWidth(), (corners[2].y - s.offsetY) / s.renderHeight()];
    const p4 = [(corners[3].x - s.offsetX) / s.renderWidth(), (corners[3].y - s.offsetY) / s.renderHeight()];

    for (let y = 0; y < targetH; y++) {
        for (let x = 0; x < targetW; x++) {
            let u = x / targetW; let v = y / targetH;
            let topX = p1[0] + u * (p2[0] - p1[0]);
            let topY = p1[1] + u * (p2[1] - p1[1]);
            let botX = p4[0] + u * (p3[0] - p4[0]);
            let botY = p4[1] + u * (p3[1] - p4[1]);
            let srcX = (topX + v * (botX - topX)) * srcImg.width;
            let srcY = (topY + v * (botY - topY)) * srcImg.height;
            ctx.drawImage(srcImg, srcX, srcY, 1, 1, x, y, 1, 1);
        }
    }

    const isBw = document.getElementById("type").value == 5;
    if (isBw) {
        const imgData = ctx.getImageData(0, 0, targetW, targetH);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
            data[i] = gray; data[i+1] = gray; data[i+2] = gray;
        }
        ctx.putImageData(imgData, 0, 0);
    }
    return hiddenCanvas;
}

function enhanceCroppedImageOnBrowser(canvasElement) {
    if (typeof cv === 'undefined') return canvasElement; 
    try {
        let src = cv.imread(canvasElement);
        let labMat = new cv.Mat();
        let channels = new cv.MatVector();
        let cl = new cv.Mat();
        
        cv.cvtColor(src, labMat, cv.COLOR_RGBA2RGB, 0);
        cv.cvtColor(labMat, labMat, cv.COLOR_RGB2Lab, 0);
        cv.split(labMat, channels);
        
        let clahe = new cv.CLAHE(2.0, new cv.Size(8, 8));
        clahe.apply(channels.get(0), cl);
        channels.set(0, cl);
        cv.merge(channels, labMat);
        
        let enhancedRGB = new cv.Mat();
        cv.cvtColor(labMat, enhancedRGB, cv.COLOR_Lab2RGB, 0);
        
        let blurred = new cv.Mat();
        cv.GaussianBlur(enhancedRGB, blurred, new cv.Size(0, 0), 3, 3, cv.BORDER_DEFAULT);
        
        let dest = new cv.Mat();
        cv.addWeighted(enhancedRGB, 1.5, blurred, -0.5, 0, dest);
        
        cv.imshow(canvasElement, dest);
        
        src.delete(); labMat.delete(); channels.delete(); cl.delete();
        clahe.delete(); enhancedRGB.delete(); blurred.delete(); dest.delete();
    } catch (e) {
        console.warn("Local JS CV dropped:", e);
    }
    return canvasElement;
}

// 🚀 FIXED: Auto-scroll so the saved preview lands at the top of the viewport
function saveSide(side) {
    const s = engine[side];
    if (!s.img) { alert(`Choose an image for ${side} first.`); return; }
    
    const mainSaveBtn = document.getElementById("saveCardBtn");
    const fullSaveBtn = document.getElementById("fullscreenSaveBtn");
    if(mainSaveBtn) mainSaveBtn.innerText = "Please wait...";
    if(fullSaveBtn) fullSaveBtn.innerText = "Please wait...";

    setTimeout(() => {
        closeFullscreen();

        let resultCanvas = projectPerspective(s.img, s.corners, 856, 540, s);
        resultCanvas = enhanceCroppedImageOnBrowser(resultCanvas);
        
        const croppedDataUrl = resultCanvas.toDataURL("image/jpeg", 0.90);
        
        const previewContainer = document.getElementById(`${side}PreviewContainer`);
        document.getElementById(`${side}PreviewImg`).src = croppedDataUrl;
        previewContainer.style.display = "block";
        applyLiveGrayscalePreviewFilter();

        if (side === 'front') frontDataUrl = croppedDataUrl;
        
        if(mainSaveBtn) mainSaveBtn.innerText = "Save Card";
        if(fullSaveBtn) fullSaveBtn.innerText = "Save Card";

        // 📜 Auto-scroll so the freshly saved preview appears at the top of the screen.
        // requestAnimationFrame ensures display:"block" has been painted first,
        // so the browser measures the container's real position before scrolling.
        requestAnimationFrame(() => {
            previewContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    }, 50);
}

function generateMergedA4Blob() {
    return new Promise((resolve) => {
        const a4Canvas = document.createElement('canvas');
        a4Canvas.width = 2480;
        a4Canvas.height = 3508;
        const ctx = a4Canvas.getContext('2d');

        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, a4Canvas.width, a4Canvas.height);

        function drawRoundedCard(img, x, y, width, height, radius) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            
            ctx.clip();
            ctx.drawImage(img, x, y, width, height);
            ctx.restore();
        }

        const frontImg = new Image();
        frontImg.onload = function() {
            drawRoundedCard(frontImg, 735, 150, 1010, 640, 50);
            a4Canvas.toBlob((blob) => {
                resolve(blob);
            }, "image/jpeg", 0.92);
        };
        frontImg.src = frontDataUrl;
    });
}

// ==========================================
// 📝 SUBMIT ORDER (NAME & MOBILE ARE OPTIONAL)
// ==========================================
async function submitID() {
    // 🟢 INPUT SANITIZATION (same guard-rails as the ID Card tool)
    const rawName = document.getElementById("name").value.trim();
    const rawMobile = document.getElementById("mobile").value.trim();

    const name = rawName.replace(/<[^>]*>?/gm, '');
    const mobile = rawMobile.replace(/[^0-9+]/g, '');

    if (rawName !== name || rawMobile !== mobile) {
        alert("⚠️ Invalid characters detected in Name or Mobile!");
        return;
    }

    const finalName = name || "Guest";
    const finalMobile = mobile || "N/A";
    const copiesInput = parseInt(document.getElementById("copies").value) || 1;
    const typeSelect = document.getElementById("type").value;
    const isBw = typeSelect == 5;

    if (!frontDataUrl) { alert("Save crop first."); return; }

    const submitBtn = document.getElementById("submitOrderBtn");
    submitBtn.innerText = "Please wait...";
    submitBtn.style.background = "#fab387";
    submitBtn.style.color = "#11111b";
    submitBtn.disabled = true;

    try {
        const finalA4Blob = await generateMergedA4Blob();

        const prefix = isBw ? "bw_" : "color_";
        const timestamp = Date.now();
        const fileName = `${timestamp}_${prefix}merged_a4.jpg`;

        const uploadResponse = await client.storage.from("documents").upload(fileName, finalA4Blob, { 
            contentType: "image/jpeg",
            upsert: true 
        });
        
        if (uploadResponse.error) { 
            alert("Upload Failed: " + uploadResponse.error.message); 
            submitBtn.innerText = "Submit Processing Order";
            submitBtn.disabled = false;
            return; 
        }

        const publicUrl = client.storage.from("documents").getPublicUrl(fileName).data.publicUrl;
        let baseRate = isBw ? 5 : 10;
        let totalAmountCalculation = copiesInput * baseRate;

        const printLabel = isBw ? "Black & White" : "Color";
        const orderLabelText = `Document ID - ${printLabel} [${copiesInput} Copies]`;

        const { data: insertedOrder, error } = await client.from("orders").insert([{
            customer_name: finalName, mobile: finalMobile, print_type: orderLabelText, pages: copiesInput, amount: totalAmountCalculation,
            file_url: publicUrl, front_url: null, back_url: null, payment_status: "Pending", payment_id: ""
        }]).select();

        if (error) { 
            alert("Database Insertion Error: " + error.message); 
            submitBtn.innerText = "Submit Processing Order";
            submitBtn.disabled = false;
            return; 
        }

        localStorage.setItem("amount", totalAmountCalculation);
        localStorage.setItem("mobile", finalMobile);
        localStorage.setItem("printType", "id");
        if (insertedOrder && insertedOrder.length > 0) localStorage.setItem("current_order_id", insertedOrder[0].id); 

        window.location.href = "payment.html";
    } catch (err) {
        submitBtn.innerText = "Submit Processing Order";
        submitBtn.disabled = false;
    }
}

// ========================================================================
// MOBILE TOUCH / INTERACTION MULTI-GRID EVENT SCHEMATICS
// ========================================================================
['front'].forEach((side) => {
    const canvas = engine[side].canvas;
    let lastX = 0; let lastY = 0;
    
    function getCanvasCoordinates(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { 
            x: (clientX - rect.left) * (canvas.width / rect.width), 
            y: (clientY - rect.top) * (canvas.height / rect.height) 
        };
    }

    canvas.addEventListener('touchstart', function(e) {
        const s = engine[side]; if (!s.img) return;
        
        if (e.touches.length === 2) {
            s.activeCorner = -1;
            s.isPanning = false;
            s.lastTouchDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            s.lastTouchX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            s.lastTouchY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        } else if (e.touches.length === 1) {
            const pos = getCanvasCoordinates(e);
            s.activeCorner = s.corners.findIndex(c => Math.hypot(c.x - pos.x, c.y - pos.y) < 45);
            
            if (s.activeCorner === -1 && s.zoom > 1) { 
                s.isPanning = true; 
                lastX = e.touches[0].clientX; 
                lastY = e.touches[0].clientY; 
            }
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', function(e) {
        const s = engine[side]; if (!s.img) return;
        if (e.cancelable) e.preventDefault(); 

        if (e.touches.length === 2) {
            const currentDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            const currentX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const currentY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

            let scaleFactor = currentDist / s.lastTouchDist;
            let newZoom = s.zoom * scaleFactor;
            newZoom = Math.max(1, Math.min(8, newZoom)); 

            const rect = canvas.getBoundingClientRect();
            const canvasCenterX = (currentX - rect.left) * (canvas.width / rect.width);
            const canvasCenterY = (currentY - rect.top) * (canvas.height / rect.height);

            s.offsetX = canvasCenterX - (canvasCenterX - s.offsetX) * (newZoom / s.zoom);
            s.offsetY = canvasCenterY - (canvasCenterY - s.offsetY) * (newZoom / s.zoom);
            
            s.zoom = newZoom;
            s.offsetX += (currentX - s.lastTouchX);
            s.offsetY += (currentY - s.lastTouchY);

            s.lastTouchDist = currentDist;
            s.lastTouchX = currentX;
            s.lastTouchY = currentY;

            draw(side);
        } else if (e.touches.length === 1) {
            if (s.activeCorner !== -1) {
                const pos = getCanvasCoordinates(e);
                s.corners[s.activeCorner] = { x: Math.max(0, Math.min(canvas.width, pos.x)), y: Math.max(0, Math.min(canvas.height, pos.y)) };
                draw(side);
            } else if (s.isPanning) {
                s.offsetX += (e.touches[0].clientX - lastX); 
                s.offsetY += (e.touches[0].clientY - lastY);
                lastX = e.touches[0].clientX; 
                lastY = e.touches[0].clientY; 
                draw(side);
            }
        }
    }, { passive: false });

    window.addEventListener('touchend', function() { 
        engine[side].activeCorner = -1; 
        engine[side].isPanning = false; 
    });

    canvas.addEventListener('mousedown', function(e) {
        const s = engine[side]; if (!s.img) return;
        const pos = getCanvasCoordinates(e);
        s.activeCorner = s.corners.findIndex(c => Math.hypot(c.x - pos.x, c.y - pos.y) < 45);
        if (s.activeCorner === -1 && s.zoom > 1) { s.isPanning = true; lastX = e.clientX; lastY = e.clientY; }
    });
    
    canvas.addEventListener('mousemove', function(e) {
        const s = engine[side]; if (!s.img) return;
        if (s.activeCorner !== -1) {
            const pos = getCanvasCoordinates(e);
            s.corners[s.activeCorner] = { x: Math.max(0, Math.min(canvas.width, pos.x)), y: Math.max(0, Math.min(canvas.height, pos.y)) };
            draw(side);
        } else if (s.isPanning) {
            s.offsetX += (e.clientX - lastX); s.offsetY += (e.clientY - lastY);
            lastX = e.clientX; lastY = e.clientY; draw(side);
        }
    });
    window.addEventListener('mouseup', function() { engine[side].activeCorner = -1; engine[side].isPanning = false; });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const s = engine[side]; if (!s.img) return;
        const mouse = getCanvasCoordinates(e);
        let newZoom = e.deltaY < 0 ? s.zoom * 1.1 : s.zoom / 1.1;
        newZoom = Math.max(1, Math.min(8, newZoom));
        s.offsetX = mouse.x - (mouse.x - s.offsetX) * (newZoom / s.zoom);
        s.offsetY = mouse.y - (mouse.y - s.offsetY) * (newZoom / s.zoom);
        s.zoom = newZoom;
        draw(side);
    }, { passive: false });
});
