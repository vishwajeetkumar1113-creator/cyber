<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Shop Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .header h1 {
            color: #1976d2;
            font-size: 28px;
        }

        .refresh-btn {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background-color: #115293;
        }

        .orders-table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            text-align: left;
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid #eeeeee;
            font-size: 14px;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background-color: #fdfdfd;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
        }

        .badge-pending { background-color: #ffe699; color: #806000; }
        .badge-completed { background-color: #c6efce; color: #006100; }

        .action-btn {
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
            transition: opacity 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .action-btn:hover {
            opacity: 0.85;
        }

        .preview-btn { background-color: #28a745; color: white; }
        .download-btn { background-color: #17a2b8; color: white; }
        .complete-btn { background-color: #ffc107; color: #212529; }

        .no-orders {
            text-align: center;
            padding: 40px;
            color: #777;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <h1>Print Shop Admin Control Panel</h1>
        <button class="refresh-btn" onclick="fetchOrders()">🔄 Refresh Orders</button>
    </div>

    <div class="orders-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Created At</th>
                    <th>Customer Name</th>
                    <th>Mobile</th>
                    <th>Print Details</th>
                    <th>Pages / Copies</th>
                    <th>Amount</th>
                    <th>Payment Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <tr>
                    <td colspan="8" class="no-orders">Loading print queue dataset...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        fetchOrders();
    };

    async function fetchOrders() {
        const tableBody = document.getElementById("ordersTableBody");
        
        const { data: orders, error } = await client
            .from("orders")
            .select("*")
            .order("created_at", { ascending: false });

        if (error) {
            console.error("Error retrieving dashboard logs:", error);
            tableBody.innerHTML = `<tr><td colspan="8" class="no-orders" style="color:red;">Error loading orders: ${error.message}</td></tr>`;
            return;
        }

        if (!orders || orders.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="8" class="no-orders">No print job records found in database queue queue matrix.</td></tr>`;
            return;
        }

        tableBody.innerHTML = ""; 

        orders.forEach(order => {
            const row = document.createElement("tr");
            const dateStr = order.created_at ? new Date(order.created_at).toLocaleString() : "N/A";
            const statusClass = order.payment_status === "Completed" ? "badge-completed" : "badge-pending";

            // Identify whether it is an Aadhaar/PAN order or a document print order
            const isIdCardOrder = order.front_url && order.front_url !== "";
            const trueTargetRawSourceUrl = isIdCardOrder ? order.front_url : order.file_url;

            let actionsHtml = "";

            if (trueTargetRawSourceUrl) {
                if (isIdCardOrder) {
                    // 🌟 URL PARAMETER ENCODING SECURE MATCH
                    const encFront = encodeURIComponent(order.front_url || '');
                    const encBack = encodeURIComponent(order.back_url || '');
                    const encSummary = encodeURIComponent(order.print_type || '');

                    // Passes variables cleanly into the target preview layout logic
                    const a4LinkUrl = `idpreview.html?front=${encFront}&back=${encBack}&summary=${encSummary}`;
                    
                    actionsHtml += `<a href="${a4LinkUrl}" target="_blank" class="action-btn preview-btn">👁️ A4 Preview</a>`;
                } else {
                    // Falls back to direct documentation files presentation link logic
                    actionsHtml += `<a href="${trueTargetRawSourceUrl}" target="_blank" class="action-btn preview-btn">👁️ View Doc</a>`;
                }
                
                actionsHtml += `<a href="${trueTargetRawSourceUrl}" download class="action-btn download-btn">📥 Download</a>`;
            }

            if (order.payment_status !== "Completed") {
                actionsHtml += `<button onclick="markAsCompleted('${order.id}')" class="action-btn complete-btn">✓ Done</button>`;
            }

            row.innerHTML = `
                <td>${dateStr}</td>
                <td><strong>${escapeHtml(order.customer_name)}</strong></td>
                <td>${escapeHtml(order.mobile)}</td>
                <td><span style="font-size:12px; color:#555;">${escapeHtml(order.print_type || 'Document Print')}</span></td>
                <td>${order.pages || 1}</td>
                <td><strong>₹${order.amount || 0}</strong></td>
                <td><span class="badge ${statusClass}">${escapeHtml(order.payment_status || 'Pending')}</span></td>
                <td>${actionsHtml}</td>
            `;

            tableBody.appendChild(row);
        });
    }

    async function markAsCompleted(orderId) {
        if (!confirm("Are you sure you want to mark this print order task complete?")) return;

        const { error } = await client
            .from("orders")
            .update({ payment_status: "Completed" })
            .eq("id", orderId);

        if (error) {
            alert("Update operation failed: " + error.message);
        } else {
            alert("Order marked completed successfully!");
            fetchOrders(); 
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039 bridge;");
    }
</script>

</body>
</html>
