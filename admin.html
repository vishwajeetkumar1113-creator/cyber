<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background: #1976d2;
            color: white;
        }

        a {
            color: blue;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Admin Dashboard</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Mobile</th>
                <th>Pages</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Preview</th>
            </tr>
        </thead>

        <tbody id="orders">
        </tbody>
    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const client = window.supabase.createClient(
    "https://irqlvuphoblgjqysteto.supabase.co",
    "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-"
);

async function loadOrders() {

    const { data, error } =
        await client
            .from("orders")
            .select("*")
            .order("id", { ascending: false });

    if (error) {
        alert(error.message);
        return;
    }

    let html = "";

    data.forEach(order => {
let fileColumn = "";

if(order.print_type === "ID Card") {

    fileColumn = `
        <div>
            <b>Front:</b><br>
            <img src="${order.front_url}" width="120"><br>
            <a href="${order.front_url}" target="_blank">
                View Front
            </a>

            <br><br>

            <b>Back:</b><br>
            <img src="${order.back_url}" width="120"><br>
            <a href="${order.back_url}" target="_blank">
                View Back
            </a>
        </div>
    `;

} else {

    fileColumn = `
        <a href="${order.file_url}" target="_blank">
            View File
        </a>
    `;
}

html += `
<tr>
    <td>${order.customer_name}</td>
    <td>${order.mobile}</td>
    <td>${order.pages}</td>
    <td>${order.print_type}</td>
    <td>₹${order.amount}</td>
    <td>${fileColumn}</td>
</tr>
`;

    document.getElementById("orders").innerHTML = html;
}

loadOrders();

</script>

</body>
</html>
