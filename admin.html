<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Shop Admin Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1350px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .header h1 {
            color: #1976d2;
            font-size: 28px;
        }

        .auto-print-badge {
            background-color: #28a745;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .refresh-btn {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid #eeeeee;
            font-size: 14px;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-pending { background-color: #ffe699; color: #806000; }
        .badge-completed { background-color: #c6efce; color: #006100; }
        .badge-unpaid { background-color: #f8d7da; color: #721c24; }
        .badge-paid { background-color: #c6efce; color: #006100; }

        .action-btn {
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
            text-decoration: none;
            display: inline-block;
            color: white;
        }

        .print-btn { background-color: #28a745; }
        .download-btn { background-color: #17a2b8; }
        .pay-btn { background-color: #007bff; }
        .complete-btn { background-color: #ffc107; color: #212529; }
        .no-orders { text-align: center; padding: 40px; color: #777; }
        
        #silentPrintFrame {
            position: absolute;
            width: 0;
            height: 0;
            border: none;
            visibility: hidden;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <div>
            <h1>Print Shop Admin Control Panel</h1>
            <p style="font-size:12px; color:#666; margin-top:4px;">Scanning data matrix every 5 seconds...</p>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span class="auto-print-badge">🟢 AUTO-PRINT ENGAGED</span>
            <button class="refresh-btn" onclick="fetchOrders()">🔄 Refresh Orders</button>
        </div>
    </div>

    <div class="orders-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Created At</th>
                    <th>Customer Name</th>
                    <th>Mobile</th>
                    <th>Print Details</th>
                    <th>Pages / Copies</th>
                    <th>Amount</th>
                    <th>Payment Status</th>
                    <th>Print Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <tr>
                    <td colspan="9" class="no-orders">Loading print queue dataset...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<iframe id="silentPrintFrame"></iframe>

<script>
    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isProcessingPrintJob = false; 

    window.onload = function() {
        fetchOrders();
        setInterval(fetchOrders, 5000); 
    };

    async function fetchOrders() {
        const tableBody = document.getElementById("ordersTableBody");
        
        const { data: orders, error } = await client
            .from("orders")
            .select("*")
            .order("created_at", { ascending: false });

        if (error) {
            console.error("Database connection dropped:", error);
            return;
        }

        if (!orders || orders.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="9" class="no-orders">No print job records found.</td></tr>`;
            return;
        }

        tableBody.innerHTML = ""; 

        orders.forEach(order => {
            const row = document.createElement("tr");
            const dateStr = order.created_at ? new Date(order.created_at).toLocaleString() : "N/A";
            
            const payStatus = (order.payment_status || 'Pending').trim();
            const lowerPay = payStatus.toLowerCase();
            
            let payBadgeClass = "badge-unpaid";
            let isPaidSuccess = false;
            if (lowerPay === "success" || lowerPay === "paid" || lowerPay === "completed") {
                payBadgeClass = "badge-paid";
                isPaidSuccess = true;
            }

            const prntStatus = order.print_status || 'Pending';
            const prntBadgeClass = prntStatus === "Completed" ? "badge-completed" : "badge-pending";

            const isIdCardOrder = order.front_url && order.front_url !== "";
            const trueTargetRawSourceUrl = isIdCardOrder ? order.front_url : order.file_url;

            // 🌟 REAL-TIME INTERCEPT: Fires auto-printing instantly when paid and pending
            if (isPaidSuccess && prntStatus === "Pending" && !isProcessingPrintJob) {
                triggerAutomaticHardwarePrint(order);
            }

            let actionsHtml = "";
            if (trueTargetRawSourceUrl) {
                const encFront = encodeURIComponent(order.front_url || '');
                const encBack = encodeURIComponent(order.back_url || '');
                const encSummary = encodeURIComponent(order.print_type || '');

                const previewUrl = isIdCardOrder 
                    ? `idpreview.html?front=${encFront}&back=${encBack}&summary=${encSummary}`
                    : `docpreview.html?file=${encodeURIComponent(trueTargetRawSourceUrl)}`;
                
                actionsHtml += `<button onclick="triggerAutomaticHardwarePrint(${JSON.stringify(order).replace(/"/g, '&quot;')})" class="action-btn print-btn">🖨️ Print Now</button>`;
                actionsHtml += `<a href="${trueTargetRawSourceUrl}" download class="action-btn download-btn">📥 Download</a>`;
            }

            if (!isPaidSuccess) {
                actionsHtml += `<button onclick="markAsPaid('${order.id}')" class="action-btn pay-btn">💰 Mark Paid</button>`;
            }

            if (prntStatus !== "Completed") {
                actionsHtml += `<button onclick="markAsPrinted('${order.id}')" class="action-btn complete-btn">✓ Done</button>`;
            }

            row.innerHTML = `
                <td>${dateStr}</td>
                <td><strong>${escapeHtml(order.customer_name)}</strong></td>
                <td>${escapeHtml(order.mobile)}</td>
                <td><span style="font-size:12px; color:#555;">${escapeHtml(order.print_type || 'Document Print')}</span></td>
                <td>${order.pages || 1}</td>
                <td><strong>₹${order.amount || 0}</strong></td>
                <td><span class="badge ${payBadgeClass}">${escapeHtml(payStatus)}</span></td>
                <td><span class="badge ${prntBadgeClass}">${escapeHtml(prntStatus)}</span></td>
                <td>${actionsHtml}</td>
            `;

            tableBody.appendChild(row);
        });
    }

    // 🌟 FULLY AUTOMATIC COHESIVE PRINT HARNESS ENGINE
    async function triggerAutomaticHardwarePrint(order) {
        if (isProcessingPrintJob) return;
        isProcessingPrintJob = true; 
        console.log("Auto-Print Processing Order ID:", order.id);

        const iframe = document.getElementById("silentPrintFrame");
        const isIdCard = order.front_url && order.front_url !== "";
        
        const encFront = encodeURIComponent(order.front_url || '');
        const encBack = encodeURIComponent(order.back_url || '');
        const encSummary = encodeURIComponent(order.print_type || '');

        // Standardized route paths point explicitly to your clean local code wrappers
        const targetPrintLayoutUrl = isIdCard 
            ? `idpreview.html?front=${encFront}&back=${encBack}&summary=${encSummary}&autoplay=true`
            : `docpreview.html?file=${encodeURIComponent(order.file_url)}&autoplay=true`;

        iframe.src = targetPrintLayoutUrl;

        iframe.onload = async function() {
            try {
                // Focus and fire internal document runtime matrix parameters
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
                
                // Update database immediately
                const { error } = await client
                    .from("orders")
                    .update({ print_status: "Completed", printed: true })
                    .eq("id", order.id);

                if (error) console.error("Database update sync error:", error);
            } catch (err) {
                console.error("Hardware pipeline deployment crash:", err);
            } finally {
                setTimeout(() => {
                    isProcessingPrintJob = false;
                    fetchOrders(); 
                }, 1500);
            }
        };
    }

    async function markAsPaid(orderId) {
        const { error } = await client
            .from("orders")
            .update({ payment_status: "Paid" })
            .eq("id", orderId);

        if (error) alert("Payment update failed: " + error.message);
        fetchOrders();
    }

    async function markAsPrinted(orderId) {
        const { error } = await client
            .from("orders")
            .update({ print_status: "Completed", printed: true })
            .eq("id", orderId);

        if (error) alert("Error updating status: " + error.message);
        fetchOrders(); 
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.toString()
            .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
