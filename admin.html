<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Print Management</title>
    <style>
        /* ==========================================================================
           YOUR ORIGINAL STYLE SHEET LAYOUT (UNTOUCHED)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f1f3f6;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .admin-header {
            width: 100%;
            max-width: 800px;
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-print {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-print:hover {
            background-color: #c0392b;
        }

        .poster-canvas {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 15px;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
        }

        .poster-canvas img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        /* ==========================================================================
           PRINT OVERRIDE MECHANISM (REMOVES LINK & TIMING ONLY)
           ========================================================================== */
        @media print {
            @page {
                size: auto;
                margin: 0mm; /* This completely strips browser headers (URLs) & footers (Time) */
            }
            body {
                background-color: #ffffff !important;
                padding: 0 !important;
                margin: 8mm !important; /* Standard layout buffer padding */
            }
            .admin-header, .btn-print {
                display: none !important; /* Hides the control interface panel from print output */
            }
            .poster-canvas {
                width: 100% !important;
                max-width: 100% !important;
                box-shadow: none !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .poster-canvas img {
                width: 100% !important;
                max-width: 100% !important;
            }
        }
    </style>
</head>
<body>

    <div class="admin-header">
        <div>
            <h2>Online Printing Services</h2>
            <p style="font-size: 13px; color: #bdc3c7;">Poster Dispatch Control Desk</p>
        </div>
        <button class="btn-print" onclick="window.print()">🖨️ PRINT BANNER NOW</button>
    </div>

    <div class="poster-canvas">
        <img src="poster_preview.png" alt="Print Poster Banner">
    </div>

</body>
</html>
