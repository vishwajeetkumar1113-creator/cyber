<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        body{
            background:#f5f5f5;
            font-family:Arial,sans-serif;
        }

        .card{
            padding:20px;
            max-width: 95%;
            margin: 30px auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
            vertical-align:top;
        }

        th{
            background:#1976d2;
            color:white;
        }

        a{
            color:blue;
            text-decoration:none;
        }

        img{
            max-width:120px;
            border:1px solid #ccc;
            margin:5px 0;
        }

        /* Status Badge Colors */
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .status-completed {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-pending {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Action Buttons */
        .print-btn {
            background: #1976d2;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: auto;
            font-weight: bold;
            display: inline-block;
        }

        .print-btn:hover {
            background: #125ea7;
        }

        .doc-btn {
            background: #28a745;
        }
        .doc-btn:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Admin Dashboard</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Mobile</th>
                <th>Pages / Copies</th>
                <th>Type / Instructions</th>
                <th>Amount</th>
                <th>Payment Status</th>
                <th>Preview / Actions</th>
            </tr>
        </thead>

        <tbody id="orders">
        </tbody>
    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
    "https://irqlvuphoblgjqysteto.supabase.co",
    "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-"
);

async function loadOrders() {
    const { data, error } = await client
        .from("orders")
        .select("*")
        .order("id", { ascending: false });

    if (error) {
        alert(error.message);
        return;
    }

    let html = "";

    data.forEach(order => {
        let preview = "";

        /* ID CARD ORDER */
        if(order.front_url && order.back_url){
            preview = `
                <div>
                    <b>Front</b><br>
                    <img src="${order.front_url}" class="preview-img"><br>
                    <a href="${order.front_url}" target="_blank">View Front</a><br><br>
                    <b>Back</b><br>
                    <img src="${order.back_url}" class="preview-img"><br>
                    <a href="${order.back_url}" target="_blank">View Back</a><br><br>
                    <button class="print-btn" onclick="window.open('./idpreview.html?front=' + encodeURIComponent('${order.front_url}') + '&back=' + encodeURIComponent('${order.back_url}'), '_blank');">
                        🖨️ A4 Preview / Print
                    </button>
                </div>
            `;
        }
        /* DOCUMENT ORDER */
        else if (order.file_url) {
            preview = `
                <div>
                    <a href="${order.file_url}" target="_blank" style="font-weight:bold;color:#1976d2;display:block;margin-bottom:8px;">
                        Open Original File
                    </a>
                    <button class="print-btn doc-btn" onclick="printDirectDocument('${order.file_url}')">
                        🖨️ Print Document
                    </button>
                </div>
            `;
        } else {
            preview = "No File";
        }

        let status = (order.payment_status || "Pending").trim();
        let isPaid = status.toLowerCase() === "completed" || status.toLowerCase() === "success";
        let statusBadgeHTML = `<span class="status-badge ${isPaid ? 'status-completed' : 'status-pending'}">${status}</span>`;

        html += `
        <tr>
            <td>${order.customer_name || ""}</td>
            <td>${order.mobile || ""}</td>
            <td>${order.pages || "1"}</td>
            <td>${order.print_type || ""}</td>
            <td style="font-weight:bold;color:#1976d2;">₹${order.amount || 0}</td>
            <td>${statusBadgeHTML}</td>
            <td>${preview}</td>
        </tr>
        `;
    });

    document.getElementById("orders").innerHTML = html;
}

function printDirectDocument(url) {
    const printWindow = window.open(url, '_blank');
    printWindow.focus();
    printWindow.print();
}

// Polling interval to auto-refresh the dashboard tracking entries every 10 seconds automatically
setInterval(loadOrders, 10000);

loadOrders();
</script>

</body>
</html>
