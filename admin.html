<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .card {
            padding: 20px;
            max-width: 95%;
            margin: 30px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px 10px;
            text-align: center;
            vertical-align: top;
        }

        th {
            background: #1976d2;
            color: white;
            font-weight: bold;
        }

        a {
            color: #1976d2;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }

        img.preview-img {
            max-width: 120px;
            height: auto;
            border: 1px solid #ccc;
            margin: 5px 0;
            border-radius: 4px;
            display: inline-block;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .status-completed {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-pending {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .print-btn {
            background: #1976d2;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            display: inline-block;
            transition: background 0.2s;
        }
        .print-btn:hover {
            background: #125ea7;
        }

        .doc-btn {
            background: #28a745;
        }
        .doc-btn:hover {
            background: #218838;
        }
        
        .preview-box-container {
            text-align: center;
            padding: 5px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Admin Dashboard</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Mobile</th>
                <th>Pages / Copies</th>
                <th>Type / Instructions</th>
                <th>Amount</th>
                <th>Payment Status</th>
                <th>Preview / Actions</th>
            </tr>
        </thead>
        <tbody id="orders">
            <tr>
                <td colspan="7">Loading records from database...</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
    "https://irqlvuphoblgjqysteto.supabase.co",
    "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-"
);

async function loadOrders() {
    const { data, error } = await client
        .from("orders")
        .select("*")
        .order("id", { ascending: false });

    if (error) {
        console.error("Dashboard error:", error.message);
        return;
    }

    let html = "";

    data.forEach(order => {
        let preview = "";

        /* CARD PRINT LAYOUT CONDITION (Aadhaar or PAN) */
        if (order.front_url) {
            let isSingleSided = !order.back_url || order.back_url.trim() === "";
            let targetPrintUrl = "";

            if (isSingleSided) {
                // Route PAN card to A4 layout matching top-center parameters
                targetPrintUrl = `./idpreview.html?front=${encodeURIComponent(order.front_url)}&layout=top-center`;
            } else {
                // Route standard Aadhaar card layout parameters
                targetPrintUrl = `./idpreview.html?front=${encodeURIComponent(order.front_url)}&back=${encodeURIComponent(order.back_url)}`;
            }

            preview = `
                <div class="preview-box-container">
                    <b>Front View</b><br>
                    <img src="${order.front_url}" class="preview-img"><br>
                    <a href="${order.front_url}" target="_blank">Open Image</a><br><br>
                    
                    ${!isSingleSided ? `
                        <b>Back View</b><br>
                        <img src="${order.back_url}" class="preview-img"><br>
                        <a href="${order.back_url}" target="_blank">Open Image</a><br><br>
                    ` : ''}
                    
                    <button class="print-btn" onclick="window.open('${targetPrintUrl}', '_blank');">
                        🖨️ A4 Preview / Print
                    </button>
                </div>
            `;
        }
        /* DOCUMENT SYSTEM CONDITION */
        else if (order.file_url) {
            preview = `
                <div class="preview-box-container">
                    <a href="${order.file_url}" target="_blank" style="display:block; margin-bottom:10px;">
                        Open Original File
                    </a>
                    <button class="print-btn doc-btn" onclick="printDirectDocument('${order.file_url}')">
                        🖨️ Print Document
                    </button>
                </div>
            `;
        } else {
            preview = "No Files Attached";
        }

        let status = (order.payment_status || "Pending").trim();
        let isPaid = status.toLowerCase() === "completed" || status.toLowerCase() === "success";
        let statusBadgeHTML = `<span class="status-badge ${isPaid ? 'status-completed' : 'status-pending'}">${status}</span>`;

        html += `
        <tr>
            <td>${order.customer_name || "N/A"}</td>
            <td>${order.mobile || "N/A"}</td>
            <td>${order.pages || "1"}</td>
            <td>${order.print_type || "N/A"}</td>
            <td style="font-weight:bold; color:#1976d2;">₹${order.amount || 0}</td>
            <td>${statusBadgeHTML}</td>
            <td>${preview}</td>
        </tr>
        `;
    });

    document.getElementById("orders").innerHTML = html || `<tr><td colspan="7">No orders found.</td></tr>`;
}

function printDirectDocument(url) {
    const printWindow = window.open(url, '_blank');
    if (printWindow) {
        printWindow.focus();
        printWindow.print();
    }
}

// Automatically check database logs every 10 seconds for real-time order tracking updates
setInterval(loadOrders, 10000);
loadOrders();
</script>

</body>
</html>
