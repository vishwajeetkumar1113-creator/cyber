<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Digital Print Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #1976d2;
            color: white;
        }
        tr:hover {
            background-color: #f1f5f9;
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }
        .status-paid { background-color: #d4edda; color: #155724; }
        .status-pending { background-color: #fff3cd; color: #856404; }
        .status-cash { background-color: #cce5ff; color: #004085; }
        
        .print-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease;
        }
        .print-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1>🖨️ Live Print Shop Order Queue</h1>
    <p>Incoming customer files sync here in real-time. Paid items can be spooled directly to the hardware queue.</p>

    <table id="ordersTable">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Amount</th>
                <th>Payment Status</th>
                <th>File Action</th>
            </tr>
        </thead>
        <tbody id="ordersBody">
            <tr>
                <td colspan="4" style="text-align: center; color: #888;">Connecting to live stream synchronization channel...</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        loadIncomingOrdersTable();
        listenToLiveOrderUpdates();
    };

    // 1. Initial Load of Database Table Content
    async function loadIncomingOrdersTable() {
        const { data: orders, error } = await client
            .from("orders")
            .select("*")
            .order("created_at", { ascending: false });

        if (error) {
            console.error("Error fetching orders:", error);
            return;
        }
        renderTableRows(orders);
    }

    // 2. Real-Time Listener (Auto-updates layout instantly when payment clears)
    function listenToLiveOrderUpdates() {
        client
            .channel('schema-db-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, payload => {
                console.log('Change received!', payload);
                loadIncomingOrdersTable(); // Refresh dataset on change
            })
            .subscribe();
    }

    // 3. Render Data Strings into Table Rows
    function renderTableRows(orders) {
        const tbody = document.getElementById("ordersBody");
        tbody.innerHTML = "";

        if (!orders || orders.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center;">No active print requests found.</td></tr>`;
            return;
        }

        orders.forEach(order => {
            let badgeClass = "status-pending";
            if (order.payment_status === "Paid") badgeClass = "status-paid";
            if (order.payment_status === "Cash Payment Pending") badgeClass = "status-cash";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><strong>#${order.id.substring(0, 8)}...</strong></td>
                <td>₹${order.amount || '0'}</td>
                <td><span class="status-badge ${badgeClass}">${order.payment_status}</span></td>
                <td>
                    <button class="print-btn" onclick="fetchAndPrintFile('${order.file_url}', '${order.file_type}')">🖨️ Direct Print</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 4. Download Asset Content and Convert to Blob Profile Link
    async function fetchAndPrintFile(fileUrl, fileType) {
        if (!fileUrl) {
            alert("No file attachment mapped to this tracking target.");
            return;
        }

        try {
            const response = await fetch(fileUrl);
            const blobData = await response.blob();
            
            // Generate a secure temporary system object path configuration link
            const secureBlobUrl = URL.createObjectURL(blobData);
            
            // Execute the Firefox-safe hardware printing engine call sequence
            executeFirefoxSafePrint(secureBlobUrl, fileType);
        } catch (err) {
            console.error("Storage download failure profile details:", err);
            alert("Unable to fetch asset file from storage layer.");
        }
    }

    // 🌟 5. THE FIX FOR FIREFOX PRINT ENGINE LAYOUT BLOCKS
    function executeFirefoxSafePrint(blobUrl, fileType) {
        // Create an isolated iframe layout structure
        const printFrame = document.createElement('iframe');
        
        // Hide the engine wrapper elements completely from active viewports
        printFrame.style.position = 'fixed';
        printFrame.style.right = '0';
        printFrame.style.bottom = '0';
        printFrame.style.width = '0';
        printFrame.style.height = '0';
        printFrame.style.border = '0';
        
        document.body.appendChild(printFrame);

        // Handle image assets differently than PDF sheets to bypass Firefox wrapper blocks
        if (fileType && fileType.includes('image')) {
            const frameDoc = printFrame.contentWindow.document;
            frameDoc.open();
            frameDoc.write(`
                <html>
                <body style="margin:0; padding:0; display:flex; justify-content:center; align-items:center;">
                    <img src="${blobUrl}" style="max-width:100%; max-height:100%; object-fit:contain;" onload="window.focus(); window.print();">
                </body>
                </html>
            `);
            frameDoc.close();
        } else {
            // Standard Document processing paths
            printFrame.src = blobUrl;
        }
        
        // Give Firefox a structural rendering delay buffer frame to populate layout before printing
        printFrame.onload = function() {
            setTimeout(() => {
                printFrame.contentWindow.focus();
                printFrame.contentWindow.print();
                
                // Tear down and clean up DOM framework reference points
                setTimeout(() => {
                    document.body.removeChild(printFrame);
                    URL.revokeObjectURL(blobUrl); // Safely clean up memory strings
                }, 2000);
            }, 600); // 600ms delays keep Firefox from loading blank pages
        };
    }
</script>
</body>
</html>
