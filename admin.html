<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .btn {
            padding: 8px 12px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-print {
            background-color: #28a745;
        }
        .btn-print:hover {
            background-color: #218838;
        }
        .status-paid {
            color: #28a745;
            font-weight: bold;
        }
        .status-pending {
            color: #dc3545;
            font-weight: bold;
        }
        .status-cash {
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🖨️ Admin Print Queue</h1>
    
    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Amount</th>
                <th>Payment Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="ordersBody">
            <tr>
                <td colspan="4" style="text-align: center;">Loading synchronization queue...</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        fetchOrders();
        setupRealtimeListener();
    };

    async function fetchOrders() {
        const { data: orders, error } = await client
            .from("orders")
            .select("*")
            .order("created_at", { ascending: false });

        if (error) {
            console.error("Error:", error);
            return;
        }
        displayOrders(orders);
    }

    function setupRealtimeListener() {
        client
            .channel('public-orders-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => {
                fetchOrders();
            })
            .subscribe();
    }

    function displayOrders(orders) {
        const tbody = document.getElementById("ordersBody");
        tbody.innerHTML = "";

        if (!orders || orders.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center;">No orders found.</td></tr>`;
            return;
        }

        orders.forEach(order => {
            let statusStyle = "status-pending";
            if (order.payment_status === "Paid") statusStyle = "status-paid";
            if (order.payment_status === "Cash Payment Pending") statusStyle = "status-cash";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>#${order.id.substring(0, 8)}</td>
                <td>₹${order.amount || '0'}</td>
                <td><span class="${statusStyle}">${order.payment_status}</span></td>
                <td>
                    <button class="btn btn-print" onclick="fetchAndPrintFile('${order.file_url}', '${order.file_type}')">🖨️ Print File</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 🌟 REWRITTEN PRINT LOGIC WITH FIREFOX BLANK PAGE FIX
    async function fetchAndPrintFile(fileUrl, fileType) {
        if (!fileUrl) {
            alert("File URL is missing for this order.");
            return;
        }

        try {
            const response = await fetch(fileUrl);
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            
            // Call the iframe printer engine
            runIframePrinter(blobUrl, fileType);
        } catch (err) {
            console.error(err);
            alert("Failed to download file from storage layer.");
        }
    }

    function runIframePrinter(blobUrl, fileType) {
        // Create an isolated hidden frame
        const printFrame = document.createElement('iframe');
        
        printFrame.style.position = 'fixed';
        printFrame.style.right = '0';
        printFrame.style.bottom = '0';
        printFrame.style.width = '0';
        printFrame.style.height = '0';
        printFrame.style.border = '0';
        
        document.body.appendChild(printFrame);

        // If it's a raw image asset, wrap it inside HTML so Firefox loads it cleanly
        if (fileType && fileType.includes('image')) {
            const doc = printFrame.contentWindow.document;
            doc.open();
            doc.write(`
                <html>
                <body style="margin:0; padding:0; display:flex; justify-content:center; align-items:center;">
                    <img src="${blobUrl}" style="max-width:100%; max-height:100%; object-fit:contain;">
                </body>
                </html>
            `);
            doc.close();
        } else {
            // Document/PDF streams load directly into frame src
            printFrame.src = blobUrl;
        }
        
        // 🌟 Give Firefox 600ms to render the contents before pulling up the system window
        printFrame.onload = function() {
            setTimeout(() => {
                printFrame.contentWindow.focus();
                printFrame.contentWindow.print();
                
                // Tear down frame completely from background DOM memory
                setTimeout(() => {
                    document.body.removeChild(printFrame);
                    URL.revokeObjectURL(blobUrl);
                }, 2000);
            }, 600);
        };
    }
</script>
</body>
</html>
