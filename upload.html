<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="card">
    <h2>Upload Document</h2>

    <input type="text" id="name" placeholder="Customer Name" required>
    <input type="tel" id="mobile" placeholder="Mobile Number" required>
    <input type="file" id="file" required>

    <label style="font-size: 14px; color: #555; display: block; margin-top: 10px;">Pages to Print:</label>
    <input type="text" id="pages" placeholder="e.g., All, 1, 3-5, 2, 4" value="All" required>

    <select id="type" onchange="calculate()">
        <option value="5">Black & White (₹5/page)</option>
        <option value="10">Color (₹10/page)</option>
    </select>

    <button onclick="calculate()">
        Calculate Price
    </button>

    <h3 id="total">Total: ₹5</h3>

    <button onclick="submitOrder()">
        Submit Order
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
function calculate() {
    let pageInput = document.getElementById("pages").value.trim().toLowerCase();
    let price = parseInt(document.getElementById("type").value);
    let totalPages = 1;

    // Simple estimation helper logic for price calculator display
    if (pageInput !== "all" && pageInput !== "") {
        // Count comma separated entries roughly
        let parts = pageInput.split(",");
        totalPages = 0;
        parts.forEach(part => {
            if (part.includes("-")) {
                let range = part.split("-");
                let start = parseInt(range[0]);
                let end = parseInt(range[1]);
                if (!isNaN(start) && !isNaN(end)) totalPages += (end - start + 1);
            } else {
                if (!isNaN(parseInt(part))) totalPages += 1;
            }
        });
        if (totalPages === 0) totalPages = 1;
    }

    document.getElementById("total").innerHTML = "Total: ₹" + (totalPages * price);
}

const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function submitOrder() {
    const name = document.getElementById("name").value.trim();
    if (name === "") { alert("Please enter Customer Name."); return; }

    const mobile = document.getElementById("mobile").value.trim();
    if (mobile === "") { alert("Please enter Mobile Number."); return; }

    const file = document.getElementById("file").files[0];
    if (!file) { alert("Please select a document."); return; }

    // Read custom selected pages value text
    const pages = document.getElementById("pages").value.trim();
    if (pages === "") { alert("Please specify which pages to print (or type 'All')."); return; }

    const type = document.getElementById("type").value;
    
    // Calculate final static pricing string
    let displayPriceText = document.getElementById("total").innerHTML;
    let amount = parseInt(displayPriceText.replace("Total: ₹", ""));

    let cleanedFile = file;

    try {
        alert("Please wait while AI cleans your document...");
        const formData = new FormData();
        formData.append("file", file);

        const response = await fetch("https://ai-cleaner-e8vk.onrender.com/clean", {
            method: "POST",
            body: formData
        });

        if (response.ok) {
            cleanedFile = await response.blob();
        }
    } catch (error) {
        console.log("AI Error:", error);
    }

    const fileName = Date.now() + "_" + file.name;
    const { error: uploadError } = await client.storage.from("documents").upload(fileName, cleanedFile);

    if (uploadError) { alert(uploadError.message); return; }

    const fileUrl = client.storage.from("documents").getPublicUrl(fileName).data.publicUrl;

    const { error } = await client.from("orders").insert([
        {
            customer_name: name,
            mobile: mobile,
            pages: pages, // Saves user input selection text directly (e.g. "1, 3, 5-7")
            print_type: type == 5 ? "Black & White" : "Color",
            amount: amount,
            file_url: fileUrl,
            payment_status: "Pending",
            payment_id: ""
        }
    ]);

    if (error) {
        alert(error.message);
        console.log(error);
    } else {
        localStorage.setItem("amount", amount);
        localStorage.setItem("mobile", mobile);
        localStorage.setItem("printType", "document");
        window.location.href = "success.html";
    }
}

calculate();
</script>

</body>
</html>
