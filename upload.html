<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Document Upload</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <style>
        * { touch-action: manipulation; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; }
        .card { max-width: 450px; margin: auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        .input-group label { font-size: 14px; color: #555; display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .preview-wrapper { width: 100%; max-width: 400px; height: 350px; margin: 15px auto; border: 2px dashed #1976d2; border-radius: 8px; background: #f8f9fa; overflow: auto; padding: 10px; }
        .preview-box { width: 100%; min-height: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .preview-box.layout-grid-2 { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
        .preview-box canvas { max-width: 100%; height: auto; display: block; border: 1px solid #ddd; border-radius: 4px; }
        .page-render-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .canvas-container { position: relative; margin: 15px auto; width: 100%; max-width: 400px; background: #f5f5f5; border: 2px dashed #28a745; border-radius: 8px; overflow: hidden; }
        #cropCanvas { display: block; width: 100%; height: auto; cursor: crosshair; }
        .crop-controls { text-align: center; margin-bottom: 15px; display: flex; justify-content: center; gap: 8px; }
        .crop-controls button { padding: 8px 12px; font-size: 14px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .force-grayscale { filter: grayscale(100%) brightness(105%) contrast(105%) !important; }
        #submitBtn { background: #1976d2; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #submitBtn:disabled { background: #9e9e9e !important; cursor: not-allowed; }
    </style>
</head>

<body>
<div class="card">
    <h2>Upload A4 Document</h2>

    <input type="text" id="name" class="input-group" placeholder="Customer Name" required>
    <input type="tel" id="mobile" class="input-group" placeholder="Mobile Number" required>
    
    <div class="input-group">
        <label>Select File(s) (PDF or Multiple Images):</label>
        <input type="file" id="file" accept="image/*,application/pdf" multiple onchange="handleFileSelectionChange()" required>
    </div>

    <div class="input-group" id="docTypeGroup" style="display:none; background: #e3f2fd; padding: 10px; border-radius: 6px; border: 1px solid #90caf9;">
        <label style="color: #1565c0;">Image Print Size:</label>
        <select id="docType">
            <option value="full">Full Page (Marksheet / Receipt)</option>
        </select>
    </div>

    <div id="pdfUI" style="display:none;">
        <div class="preview-wrapper" id="previewWrapperFrame">
            <div class="preview-box" id="docPreview">
                <span style="margin-top: 150px; color:#777;">No file selected</span>
            </div>
        </div>
        <div class="input-group">
            <label>Pages to Print:</label>
            <input type="text" id="pages" placeholder="e.g., All, 1, 3-5" value="All" oninput="calculate(); previewDocument();">
        </div>
        <div class="input-group">
            <label>Pages Per Sheet (Layout):</label>
            <select id="layout_mode" onchange="calculate(); updateLivePreviewGrid();">
                <option value="1">1 Page Per Sheet (Standard)</option>
                <option value="2">2 Pages Per Sheet</option>
            </select>
        </div>
    </div>

    <div id="imageUI" style="display: none;">
        <h4 id="imageStatus" style="text-align: center; color: #1976d2; margin-bottom: 10px;"></h4>
        <div id="cropAreaWrapper">
            <p style="font-size: 13px; color: #555; text-align: center;">Drag corners to crop your document perfectly.</p>
            <div class="canvas-container" id="cropContainer">
                <canvas id="cropCanvas"></canvas>
            </div>
            <div class="crop-controls">
                <button type="button" style="background:#28a745;" onclick="rotateImage()">↻ Rotate</button>
                <button type="button" style="background:#6c757d;" onclick="resetZoom()">Reset Zoom</button>
                <button type="button" style="background:#1976d2;" id="saveCropBtn" onclick="saveCropAndNext()">Save Crop & Next</button>
            </div>
        </div>
        <div id="cropPreviewContainer" style="text-align: center; display: none; margin-bottom: 15px;">
            <p style="font-size: 14px; color: #28a745; font-weight: bold; margin-top: 5px;">✓ All Images Cropped & Ready for Multi-Page PDF</p>
        </div>
    </div>

    <div class="input-group">
        <label>Number of Copies:</label>
        <input type="number" id="copies" value="1" min="1" oninput="calculate()">
    </div>
    <div class="input-group">
        <label>Print Type:</label>
        <select id="type" onchange="calculate(); applyPreviewFilter();">
            <option value="5">Black & White (₹5 / page)</option>
            <option value="10">Color (₹10 / page)</option>
        </select>
    </div>

    <h3 id="total" style="text-align:center;">Total: ₹5</h3>
    <button id="submitBtn" onclick="submitOrder()">Submit Order</button>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
const client = window.supabase.createClient(window.SITE_CONFIG.SUPABASE_URL, window.SITE_CONFIG.SUPABASE_KEY);

let currentMode = "pdf";
let cachedFileObject = null;
let totalDetectedPDFPages = 1; 
let activeRenderTaskId = 0; 

// Variables for Multi-Image Processing
let uploadedImagesList = [];
let currentImageIndex = 0;
let processedA4Images = []; // Stores cropped A4 pages

const cropEngine = { canvas: document.getElementById('cropCanvas'), ctx: document.getElementById('cropCanvas').getContext('2d'), img: null, corners: [], activeCorner: -1, rotation: 0, originalSrc: "", zoom: 1, offsetX: 0, offsetY: 0, isPanning: false, lastTouchDist: 0, lastTouchX: 0, lastTouchY: 0 };

async function handleFileSelectionChange() {
    const files = document.getElementById("file").files;
    if (!files || files.length === 0) return;

    if (files[0].type === "application/pdf") {
        currentMode = "pdf";
        cachedFileObject = files[0];
        document.getElementById("pdfUI").style.display = "block";
        document.getElementById("imageUI").style.display = "none";
        document.getElementById("docTypeGroup").style.display = "none";
        
        const fileArrayBuffer = await cachedFileObject.arrayBuffer();
        const srcPdf = await PDFLib.PDFDocument.load(fileArrayBuffer);
        totalDetectedPDFPages = srcPdf.getPageCount();
        
        await previewDocument();
        calculate();
    } 
    else if (files[0].type.startsWith("image/")) {
        currentMode = "image";
        cachedFileObject = files[0]; // For filename reference
        uploadedImagesList = Array.from(files).filter(f => f.type.startsWith('image/'));
        currentImageIndex = 0;
        processedA4Images = [];
        
        document.getElementById("pdfUI").style.display = "none";
        document.getElementById("imageUI").style.display = "block";
        document.getElementById("docTypeGroup").style.display = "block";
        document.getElementById("cropPreviewContainer").style.display = "none";
        document.getElementById("cropAreaWrapper").style.display = "block";
        
        loadCurrentImageForCrop();
        calculate();
    }
}

function loadCurrentImageForCrop() {
    if (currentImageIndex >= uploadedImagesList.length) {
        document.getElementById("cropAreaWrapper").style.display = "none";
        document.getElementById("cropPreviewContainer").style.display = "block";
        document.getElementById("imageStatus").innerText = `Successfully Processed ${uploadedImagesList.length} Image(s)`;
        return;
    }

    document.getElementById("imageStatus").innerText = `Cropping Image ${currentImageIndex + 1} of ${uploadedImagesList.length}`;
    const btn = document.getElementById("saveCropBtn");
    btn.innerText = (currentImageIndex === uploadedImagesList.length - 1) ? "Save Crop & Finish" : `Save Crop & Next (${currentImageIndex + 1}/${uploadedImagesList.length})`;

    const reader = new FileReader();
    reader.onload = e => {
        const img = new Image();
        img.onload = () => {
            cropEngine.img = img;
            cropEngine.canvas.width = 400;
            cropEngine.canvas.height = (img.height * 400) / img.width;
            const w = cropEngine.canvas.width; 
            const h = cropEngine.canvas.height;
            cropEngine.corners = [{x:30, y:30}, {x:w-30, y:30}, {x:w-30, y:h-30}, {x:30, y:h-30}];
            cropEngine.rotation = 0; 
            cropEngine.originalSrc = e.target.result;
            resetZoom();
            drawCrop();
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(uploadedImagesList[currentImageIndex]);
}

function updateLivePreviewGrid() {
    const layoutMode = document.getElementById("layout_mode").value;
    const previewBox = document.getElementById("docPreview");
    previewBox.className = "preview-box"; 
    if (layoutMode === "2") previewBox.classList.add("layout-grid-2");
}

function parsePageSelection(pageInput) {
    let clean = pageInput.replace(/\s+/g, '').toLowerCase();
    if (clean === "all" || clean === "") return null;
    let selected = [];
    clean.split(",").forEach(part => {
        if (part.includes("-")) { let [s, e] = part.split("-"); for (let i = parseInt(s); i <= parseInt(e); i++) selected.push(i); } 
        else selected.push(parseInt(part));
    });
    return selected;
}

async function previewDocument() {
    const currentTaskId = ++activeRenderTaskId; 
    const previewContainer = document.getElementById("docPreview");
    let pageInput = document.getElementById("pages").value.trim();

    try {
        const fileArrayBuffer = await cachedFileObject.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: fileArrayBuffer }).promise;
        if (currentTaskId !== activeRenderTaskId) return;

        let targetPagesList = parsePageSelection(pageInput);
        let pagesToRender = (targetPagesList === null || targetPagesList.length === 0 || pageInput.toLowerCase() === "all") 
            ? Array.from({length: pdf.numPages}, (_, i) => i + 1) 
            : targetPagesList.filter(p => p >= 1 && p <= pdf.numPages);

        previewContainer.innerHTML = pagesToRender.length === 0 ? "<span>Invalid page selection</span>" : ""; 

        for (let pageNum of pagesToRender) {
            if (currentTaskId !== activeRenderTaskId) return;
            const page = await pdf.getPage(pageNum);
            const pageWrapper = document.createElement('div');
            pageWrapper.className = 'page-render-container';

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            const initialViewport = page.getViewport({ scale: 1.0 });
            const viewport = page.getViewport({ scale: 380 / initialViewport.width });

            canvas.width = viewport.width;
            canvas.height = viewport.height;
            pageWrapper.appendChild(canvas);
            previewContainer.appendChild(pageWrapper);
            await page.render({ canvasContext: context, viewport: viewport }).promise;
        }
    } catch (err) {
        console.error(err);
    }
    updateLivePreviewGrid();
    applyPreviewFilter();
}

function rotateImage() {
    if (!cropEngine.originalSrc) return;
    cropEngine.rotation = (cropEngine.rotation + 90) % 360;
    const tempImg = new Image();
    tempImg.onload = function() {
        const internalCanvas = document.createElement('canvas');
        if (cropEngine.rotation % 180 !== 0) {
            internalCanvas.width = tempImg.height; internalCanvas.height = tempImg.width;
        } else {
            internalCanvas.width = tempImg.width; internalCanvas.height = tempImg.height;
        }
        const ctx = internalCanvas.getContext('2d');
        ctx.translate(internalCanvas.width / 2, internalCanvas.height / 2);
        ctx.rotate((cropEngine.rotation * Math.PI) / 180);
        ctx.drawImage(tempImg, -tempImg.width / 2, -tempImg.height / 2);
        
        const rotatedImg = new Image();
        rotatedImg.onload = function() {
            cropEngine.canvas.height = (rotatedImg.height * 400) / rotatedImg.width;
            cropEngine.img = rotatedImg;
            cropEngine.corners = [{x:30, y:30}, {x:400-30, y:30}, {x:400-30, y:cropEngine.canvas.height-30}, {x:30, y:cropEngine.canvas.height-30}];
            drawCrop();
        };
        rotatedImg.src = internalCanvas.toDataURL("image/jpeg");
    };
    tempImg.src = cropEngine.originalSrc;
}

function resetZoom() { cropEngine.zoom = 1; cropEngine.offsetX = 0; cropEngine.offsetY = 0; drawCrop(); }

function drawCrop() {
    const s = cropEngine; if (!s.img) return;
    s.ctx.clearRect(0, 0, s.canvas.width, s.canvas.height);
    s.ctx.save(); s.ctx.translate(s.offsetX, s.offsetY); s.ctx.scale(s.zoom, s.zoom);
    s.ctx.drawImage(s.img, 0, 0, s.canvas.width, s.canvas.height); s.ctx.restore();
    s.ctx.strokeStyle = '#28a745'; s.ctx.lineWidth = 2;
    s.ctx.beginPath(); s.ctx.moveTo(s.corners[0].x, s.corners[0].y);
    for (let i = 1; i < 4; i++) s.ctx.lineTo(s.corners[i].x, s.corners[i].y);
    s.ctx.closePath(); s.ctx.stroke();
    s.corners.forEach(c => { s.ctx.fillStyle = '#28a745'; s.ctx.beginPath(); s.ctx.arc(c.x, c.y, 14, 0, Math.PI * 2); s.ctx.fill(); s.ctx.strokeStyle = '#fff'; s.ctx.lineWidth = 3; s.ctx.stroke(); });
}

async function saveCropAndNext() {
    const s = cropEngine; if (!s.img) return alert("Upload image first.");
    const mappedCorners = s.corners.map(c => ({ x: (c.x - s.offsetX) / s.zoom, y: (c.y - s.offsetY) / s.zoom }));
    
    const p1 = [mappedCorners[0].x / s.canvas.width, mappedCorners[0].y / s.canvas.height];
    const p2 = [mappedCorners[1].x / s.canvas.width, mappedCorners[1].y / s.canvas.height];
    const p3 = [mappedCorners[2].x / s.canvas.width, mappedCorners[2].y / s.canvas.height];
    const p4 = [mappedCorners[3].x / s.canvas.width, mappedCorners[3].y / s.canvas.height];

    let targetW = Math.round(Math.max(
        Math.hypot((p2[0]-p1[0])*s.img.width, (p2[1]-p1[1])*s.img.height),
        Math.hypot((p3[0]-p4[0])*s.img.width, (p3[1]-p4[1])*s.img.height)
    ));
    let targetH = Math.round(Math.max(
        Math.hypot((p4[0]-p1[0])*s.img.width, (p4[1]-p1[1])*s.img.height),
        Math.hypot((p3[0]-p2[0])*s.img.width, (p3[1]-p2[1])*s.img.height)
    ));

    if (targetW > 2000 || targetH > 2000) {
        const scale = 2000 / Math.max(targetW, targetH);
        targetW = Math.round(targetW * scale);
        targetH = Math.round(targetH * scale);
    }

    let hCvs = document.createElement('canvas'); hCvs.width = targetW; hCvs.height = targetH;
    const ctx = hCvs.getContext('2d');
    
    for (let y = 0; y < targetH; y++) {
        for (let x = 0; x < targetW; x++) {
            let u = x/targetW, v = y/targetH;
            let topX = p1[0]+u*(p2[0]-p1[0]), topY = p1[1]+u*(p2[1]-p1[1]);
            let botX = p4[0]+u*(p3[0]-p4[0]), botY = p4[1]+u*(p3[1]-p4[1]);
            ctx.drawImage(s.img, (topX+v*(botX-topX))*s.img.width, (topY+v*(botY-topY))*s.img.height, 1, 1, x, y, 1, 1);
        }
    }

    if (typeof cv !== 'undefined') {
        try {
            let src = cv.imread(hCvs); let labMat = new cv.Mat(), channels = new cv.MatVector(), cl = new cv.Mat();
            cv.cvtColor(src, labMat, cv.COLOR_RGBA2RGB, 0); cv.cvtColor(labMat, labMat, cv.COLOR_RGB2Lab, 0); cv.split(labMat, channels);
            let clahe = new cv.CLAHE(2.0, new cv.Size(8, 8)); clahe.apply(channels.get(0), cl); channels.set(0, cl); cv.merge(channels, labMat);
            let enhancedRGB = new cv.Mat(), blurred = new cv.Mat(), dest = new cv.Mat();
            cv.cvtColor(labMat, enhancedRGB, cv.COLOR_Lab2RGB, 0); cv.GaussianBlur(enhancedRGB, blurred, new cv.Size(0, 0), 3, 3, cv.BORDER_DEFAULT);
            cv.addWeighted(enhancedRGB, 1.5, blurred, -0.5, 0, dest); cv.imshow(hCvs, dest);
            src.delete(); labMat.delete(); channels.delete(); cl.delete(); clahe.delete(); enhancedRGB.delete(); blurred.delete(); dest.delete();
        } catch (e) { console.warn("CV Error", e); }
    }

    const a4DataUrl = await convertToA4(hCvs.toDataURL("image/jpeg", 0.95));
    processedA4Images.push(a4DataUrl);
    
    currentImageIndex++;
    loadCurrentImageForCrop();
    calculate();
}

async function convertToA4(imgSrc) {
    return new Promise(resolve => {
        const a4 = document.createElement('canvas'); 
        a4.width = 2480; a4.height = 3508; // Standard A4 Size
        const ctx = a4.getContext('2d'); 
        ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0,0,a4.width,a4.height);
        
        const img = new Image();
        img.onload = () => {
            // ZERO MARGIN LOGIC (Stretch to fill A4 Exactly as requested)
            ctx.drawImage(img, 0, 0, a4.width, a4.height);
            
            if (document.getElementById("type").value == 5) {
                const d = ctx.getImageData(0,0,a4.width,a4.height);
                for(let i=0; i<d.data.length; i+=4){ 
                    let g = 0.299 * d.data[i] + 0.587 * d.data[i+1] + 0.114 * d.data[i+2]; 
                    d.data[i] = d.data[i+1] = d.data[i+2] = g; 
                }
                ctx.putImageData(d,0,0);
            }
            resolve(a4.toDataURL("image/jpeg", 0.95));
        };
        img.src = imgSrc;
    });
}

function getPos(e) { const r=cropEngine.canvas.getBoundingClientRect(); return { x:((e.touches?e.touches[0].clientX:e.clientX)-r.left)*(cropEngine.canvas.width/r.width), y:((e.touches?e.touches[0].clientY:e.clientY)-r.top)*(cropEngine.canvas.height/r.height) }; }
cropEngine.canvas.addEventListener('touchstart', e=>{ const s=cropEngine; if(e.touches.length===2){ s.activeCorner=-1; s.isPanning=false; s.lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); s.lastTouchX=(e.touches[0].clientX+e.touches[1].clientX)/2; s.lastTouchY=(e.touches[0].clientY+e.touches[1].clientY)/2; } else if(e.touches.length===1){ const p=getPos(e); s.activeCorner=s.corners.findIndex(c=>Math.hypot(c.x-p.x,c.y-p.y)<45); if(s.activeCorner===-1 && s.zoom>1){s.isPanning=true; s.lastTouchX=e.touches[0].clientX; s.lastTouchY=e.touches[0].clientY;} } }, {passive:false});
cropEngine.canvas.addEventListener('touchmove', e=>{ const s=cropEngine; e.preventDefault(); if(e.touches.length===2){ const cDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); const cx=(e.touches[0].clientX+e.touches[1].clientX)/2, cy=(e.touches[0].clientY+e.touches[1].clientY)/2; let nz=s.zoom*(cDist/s.lastTouchDist); nz=Math.max(1,Math.min(8,nz)); const r=s.canvas.getBoundingClientRect(); const rx=(cx-r.left)*(s.canvas.width/r.width), ry=(cy-r.top)*(s.canvas.height/r.height); s.offsetX=rx-(rx-s.offsetX)*(nz/s.zoom); s.offsetY=ry-(ry-s.offsetY)*(nz/s.zoom); s.zoom=nz; s.offsetX+=(cx-s.lastTouchX); s.offsetY+=(cy-s.lastTouchY); s.lastTouchDist=cDist; s.lastTouchX=cx; s.lastTouchY=cy; if(s.zoom===1){s.offsetX=0;s.offsetY=0;} drawCrop(); } else if(e.touches.length===1){ if(s.activeCorner!==-1){ const p=getPos(e); s.corners[s.activeCorner]={x:Math.max(0,Math.min(s.canvas.width,p.x)), y:Math.max(0,Math.min(s.canvas.height,p.y))}; drawCrop(); }else if(s.isPanning){ s.offsetX+=(e.touches[0].clientX-s.lastTouchX); s.offsetY+=(e.touches[0].clientY-s.lastTouchY); s.lastTouchX=e.touches[0].clientX; s.lastTouchY=e.touches[0].clientY; drawCrop(); } } }, {passive:false});
window.addEventListener('touchend', ()=>{cropEngine.activeCorner=-1; cropEngine.isPanning=false;});
cropEngine.canvas.addEventListener('mousedown', e=>{ const s=cropEngine; const p=getPos(e); s.activeCorner=s.corners.findIndex(c=>Math.hypot(c.x-p.x,c.y-p.y)<45); if(s.activeCorner===-1 && s.zoom>1){s.isPanning=true; s.lastTouchX=e.clientX; s.lastTouchY=e.clientY;} });
cropEngine.canvas.addEventListener('mousemove', e=>{ const s=cropEngine; if(s.activeCorner!==-1){ const p=getPos(e); s.corners[s.activeCorner]={x:Math.max(0,Math.min(s.canvas.width,p.x)), y:Math.max(0,Math.min(s.canvas.height,p.y))}; drawCrop(); }else if(s.isPanning){ s.offsetX+=(e.clientX-s.lastTouchX); s.offsetY+=(e.clientY-s.lastTouchY); s.lastTouchX=e.clientX; s.lastTouchY=e.clientY; drawCrop(); } });
window.addEventListener('mouseup', ()=>{cropEngine.activeCorner=-1; cropEngine.isPanning=false;});
cropEngine.canvas.addEventListener('wheel', e=>{ e.preventDefault(); const s=cropEngine; const m=getPos(e); let nz=e.deltaY<0?s.zoom*1.1:s.zoom/1.1; nz=Math.max(1,Math.min(8,nz)); s.offsetX=m.x-(m.x-s.offsetX)*(nz/s.zoom); s.offsetY=m.y-(m.y-s.offsetY)*(nz/s.zoom); s.zoom=nz; if(s.zoom===1){s.offsetX=0;s.offsetY=0;} drawCrop(); }, {passive:false});

function applyPreviewFilter() {
    const isBw = document.getElementById("type").value == 5;
    if (document.getElementById("previewWrapperFrame")) {
        document.getElementById("previewWrapperFrame").classList.toggle("force-grayscale", isBw);
    }
}

function calculate() {
    let copies = parseInt(document.getElementById("copies").value) || 1;
    let price = parseInt(document.getElementById("type").value);
    let sheets = 1;
    
    if (currentMode === "pdf") {
        let layoutDivisor = parseInt(document.getElementById("layout_mode").value) || 1;
        let selectedPages = parsePageSelection(document.getElementById("pages").value);
        let totalPages = selectedPages !== null && selectedPages.length > 0 ? selectedPages.length : totalDetectedPDFPages;
        sheets = Math.ceil(totalPages / layoutDivisor);
    } else if (currentMode === "image") {
        sheets = uploadedImagesList.length || 1;
    }
    
    document.getElementById("total").innerHTML = "Total: ₹" + (sheets * price * copies);
}

async function submitOrder() {
    const name = document.getElementById("name").value.trim();
    const mobile = document.getElementById("mobile").value.trim();
    if (!name || !mobile || !cachedFileObject) return alert("Fill details and select document.");
    
    // Stop submission if all images aren't cropped
    if (currentMode === "image" && processedA4Images.length !== uploadedImagesList.length) {
        return alert("Please crop and save all selected images first.");
    }

    const submitBtn = document.getElementById("submitBtn");
    submitBtn.innerText = "Please wait...";
    submitBtn.disabled = true;

    try {
        let processedBlob = null;
        let finalMime = "application/pdf";
        let layoutVal = 1;

        if (currentMode === "pdf") {
            const srcPdfDoc = await PDFLib.PDFDocument.load(await cachedFileObject.arrayBuffer());
            let pagesSel = parsePageSelection(document.getElementById("pages").value);
            let indices = pagesSel ? pagesSel.filter(p => p <= srcPdfDoc.getPageCount()).map(p => p - 1) : Array.from({length: srcPdfDoc.getPageCount()}, (_, i) => i);
            const outPdf = await PDFLib.PDFDocument.create();
            const copied = await outPdf.copyPages(srcPdfDoc, indices);
            copied.forEach(p => outPdf.addPage(p));
            processedBlob = new Blob([await outPdf.save()], { type: "application/pdf" });
            layoutVal = document.getElementById("layout_mode").value;
        } else {
            // MULTI-IMAGE TO SINGLE PDF LOGIC
            const pdfDoc = await PDFLib.PDFDocument.create();
            for (let dataUrl of processedA4Images) {
                const imgBytes = await fetch(dataUrl).then(res => res.arrayBuffer());
                const image = await pdfDoc.embedJpg(imgBytes);
                const page = pdfDoc.addPage([2480, 3508]);
                page.drawImage(image, { x: 0, y: 0, width: 2480, height: 3508 });
            }
            processedBlob = new Blob([await pdfDoc.save()], { type: "application/pdf" });
        }

        const ext = ".pdf";
        const pre = document.getElementById("type").value == 5 ? "bw_" : "color_";
        const fileName = `${Date.now()}_${pre}${cachedFileObject.name.split('.')[0] || "doc"}${ext}`;

        const { error: uploadError } = await client.storage.from("documents").upload(fileName, processedBlob, { contentType: finalMime, upsert: true });
        if (uploadError) throw uploadError;

        const copies = document.getElementById("copies").value;
        const amount = parseInt(document.getElementById("total").innerHTML.replace("Total: ₹", ""));
        const printStr = `${document.getElementById("type").options[document.getElementById("type").selectedIndex].text}`;

        const { data: order, error } = await client.from("orders").insert([{
            customer_name: name, mobile: mobile, pages: copies, print_type: printStr, amount: amount,
            file_url: client.storage.from("documents").getPublicUrl(fileName).data.publicUrl, payment_status: "Pending", layout_mode: layoutVal
        }]).select();

        if (error) throw error;
        localStorage.setItem("amount", amount); localStorage.setItem("mobile", mobile); localStorage.setItem("current_order_id", order[0].id);
        window.location.href = "payment.html";

    } catch (err) {
        alert(err.message);
        submitBtn.innerText = "Submit Order";
        submitBtn.disabled = false;
    }
}
</script>

</html>
