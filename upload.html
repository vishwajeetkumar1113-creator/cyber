<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Upload Document</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="card">

    <h2>Upload Document</h2>

    <input type="text"
           id="name"
           placeholder="Customer Name"
           required>

    <input type="tel"
           id="mobile"
           placeholder="Mobile Number"
           required>

    <input type="file"
           id="file"
           required>

    <input type="number"
           id="pages"
           value="1"
           min="1">

    <select id="type" onchange="calculate()">
        <option value="5">Black & White</option>
        <option value="10">Color</option>
    </select>

    <button onclick="calculate()">
        Calculate Price
    </button>

    <h3 id="total">Total: ₹5</h3>

    <button onclick="submitOrder()">
        Submit Order
    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

function calculate() {

    let pages =
        parseInt(
            document.getElementById("pages").value
        );

    let price =
        parseInt(
            document.getElementById("type").value
        );

    document.getElementById("total").innerHTML =
        "Total: ₹" + (pages * price);
}

const SUPABASE_URL =
    "https://irqlvuphoblgjqysteto.supabase.co";

const SUPABASE_KEY =
    "YOUR_SUPABASE_ANON_KEY";

const client =
    window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );

async function submitOrder() {

    const name =
        document.getElementById("name")
        .value.trim();

    if (name === "") {
        alert("Please enter Customer Name.");
        return;
    }

    const mobile =
        document.getElementById("mobile")
        .value.trim();

    if (mobile === "") {
        alert("Please enter Mobile Number.");
        return;
    }

    const file =
        document.getElementById("file")
        .files[0];

    if (!file) {
        alert("Please select a document.");
        return;
    }

    const pages =
        parseInt(
            document.getElementById("pages")
            .value
        );

    const type =
        document.getElementById("type")
        .value;

    const amount = pages * type;

    let cleanedFile = file;

    try {

        alert(
            "Please wait while AI cleans your document..."
        );

        const formData = new FormData();

        formData.append(
            "file",
            file
        );

        const response =
            await fetch(
                "https://ai-cleaner-e8vk.onrender.com/clean",
                {
                    method: "POST",
                    body: formData
                }
            );

        if (response.ok) {

            cleanedFile =
                await response.blob();
        }

    } catch (error) {

        console.log(
            "AI Error:",
            error
        );

    }

    const fileName =
        Date.now() +
        "_" +
        file.name;

    const { error: uploadError } =
        await client.storage
            .from("documents")
            .upload(
                fileName,
                cleanedFile
            );

    if (uploadError) {

        alert(
            uploadError.message
        );

        return;
    }

    const { data } =
        client.storage
            .from("documents")
            .getPublicUrl(
                fileName
            );

    const fileUrl =
        data.publicUrl;

    const { error } =
        await client
            .from("orders")
            .insert([
                {
                    customer_name:
                        name,

                    mobile:
                        mobile,

                    pages:
                        pages,

                    print_type:
                        type == 5
                        ? "Black & White"
                        : "Color",

                    amount:
                        amount,

                    file_url:
                        fileUrl,

                    payment_status:
                        "Pending",

                    payment_id:
                        ""
                }
            ]);

    if (error) {

        alert(
            error.message
        );

        console.log(
            error
        );

    } else {

        localStorage.setItem(
            "amount",
            amount
        );

        localStorage.setItem(
            "mobile",
            mobile
        );

        window.location.href =
            "payment.html";
    }
}

calculate();

</script>

</body>

</html>
