<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        .preview-wrapper {
            width: 100%;
            max-width: 400px;
            height: 250px;
            margin: 15px auto;
            border: 2px dashed #1976d2;
            border-radius: 8px;
            background: #f8f9fa;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preview-box {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 14px;
            transform: scale(0.80);
            transform-origin: center center;
            box-sizing: border-box;
        }
        .preview-box img, .preview-box canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }
        .preview-box iframe {
            width: 125%; 
            height: 125%; 
            border: none;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Upload Document</h2>

    <input type="text" id="name" placeholder="Customer Name" required>
    <input type="tel" id="mobile" placeholder="Mobile Number" required>
    
    <div class="input-group">
        <label>Select Document File:</label>
        <input type="file" id="file" accept="image/*,application/pdf" onchange="resetFileCache(); previewDocument();" required>
    </div>

    <div class="preview-wrapper">
        <div class="preview-box" id="docPreview">
            <span>No file selected yet for preview</span>
        </div>
    </div>

    <div class="input-group">
        <label>Pages to Print:</label>
        <input type="text" id="pages" placeholder="e.g., All, 1, 3-5" value="All" oninput="calculate(); previewDocument();" required>
    </div>

    <div class="input-group">
        <label>Number of Copies:</label>
        <input type="number" id="copies" value="1" min="1" oninput="calculate()" required>
    </div>

    <div class="input-group">
        <label>Print Type:</label>
        <select id="type" onchange="calculate()">
            <option value="5">Black & White (₹5 / page)</option>
            <option value="10">Color (₹10 / page)</option>
        </select>
    </div>

    <h3 id="total">Total: ₹5</h3>

    <button onclick="submitOrder()">
        Submit Order
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

let currentlyLoadedFileURL = null;
let currentFileType = "";
let cachedFileObject = null;

function resetFileCache() {
    if (currentlyLoadedFileURL) {
        URL.revokeObjectURL(currentlyLoadedFileURL);
    }
    currentlyLoadedFileURL = null;
    currentFileType = "";
    cachedFileObject = null;
}

async function previewDocument() {
    const previewContainer = document.getElementById("docPreview");
    const fileInput = document.getElementById("file").files[0];
    let pageInput = document.getElementById("pages").value.trim();

    if (!fileInput) {
        previewContainer.innerHTML = "<span>No file selected yet for preview</span>";
        return;
    }

    if (!currentlyLoadedFileURL) {
        currentlyLoadedFileURL = URL.createObjectURL(fileInput);
        currentFileType = fileInput.type;
        cachedFileObject = fileInput;
    }

    if (currentFileType.startsWith("image/")) {
        previewContainer.innerHTML = `<img src="${currentlyLoadedFileURL}" alt="Document Preview">`;
    } else if (currentFileType === "application/pdf") {
        let targetPage = 1;
        let cleanInput = pageInput.replace(/\s+/g, '').toLowerCase();

        if (cleanInput !== "all" && cleanInput !== "") {
            let firstSegment = cleanInput.split(",")[0];
            if (firstSegment.includes("-")) {
                targetPage = parseInt(firstSegment.split("-")[0]) || 1;
            } else {
                targetPage = parseInt(firstSegment) || 1;
            }
        }

        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (isMobileDevice) {
            previewContainer.innerHTML = "<span>Loading mobile preview...</span>";
            try {
                const fileArrayBuffer = await cachedFileObject.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument({ data: fileArrayBuffer });
                const pdf = await loadingTask.promise;
                
                if (targetPage < 1) targetPage = 1;
                if (targetPage > pdf.numPages) targetPage = pdf.numPages;

                const page = await pdf.getPage(targetPage);
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const viewport = page.getViewport({ scale: 1.5 });

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                previewContainer.innerHTML = "";
                previewContainer.appendChild(canvas);
                await page.render(renderContext).promise;
            } catch (err) {
                console.error("Mobile rendering issue:", err);
                previewContainer.innerHTML = "<span>Preview ready (Document Loaded)</span>";
            }
        } else {
            previewContainer.innerHTML = `<iframe src="${currentlyLoadedFileURL}#page=${targetPage}&view=FitH"></iframe>`;
        }
    } else {
        previewContainer.innerHTML = "<span>Preview not supported for this file type</span>";
    }
}

function parsePageSelection(pageInput) {
    let cleanInput = pageInput.replace(/\s+/g, '').toLowerCase();
    if (cleanInput === "all" || cleanInput === "") return null;

    let selectedPages = [];
    let parts = cleanInput.split(",");
    
    parts.forEach(part => {
        if (part.includes("-")) {
            let range = part.split("-");
            let start = parseInt(range[0]);
            let end = parseInt(range[1]);
            if (!isNaN(start) && !isNaN(end)) {
                for (let i = start; i <= end; i++) selectedPages.push(i);
            }
        } else {
            let val = parseInt(part);
            if (!isNaN(val)) selectedPages.push(val);
        }
    });
    return selectedPages;
}

function calculate() {
    let pageInput = document.getElementById("pages").value.trim();
    let copies = parseInt(document.getElementById("copies").value) || 1;
    let price = parseInt(document.getElementById("type").value);
    
    if (copies < 1) copies = 1;
    let totalPages = 1;

    let selectedPages = parsePageSelection(pageInput);
    if (selectedPages !== null) {
        totalPages = selectedPages.length > 0 ? selectedPages.length : 1;
    }

    let finalAmount = totalPages * price * copies;
    document.getElementById("total").innerHTML = "Total: ₹" + finalAmount;
}

const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function submitOrder() {
    const name = document.getElementById("name").value.trim();
    if (name === "") { alert("Please enter Customer Name."); return; }

    const mobile = document.getElementById("mobile").value.trim();
    if (mobile === "") { alert("Please enter Mobile Number."); return; }

    const file = document.getElementById("file").files[0];
    if (!file) { alert("Please select a document."); return; }

    const pages = document.getElementById("pages").value.trim();
    if (pages === "") { alert("Please specify print pages."); return; }

    const copies = document.getElementById("copies").value.trim();
    const type = document.getElementById("type").value;
    
    let displayPriceText = document.getElementById("total").innerHTML;
    let amount = parseInt(displayPriceText.replace("Total: ₹", ""));

    let finalFileToUpload = file;
    let calculatedIntegerPages = 1;

    if (file.type === "application/pdf") {
        let pageNumbersList = parsePageSelection(pages);
        
        if (pageNumbersList !== null && pageNumbersList.length > 0) {
            calculatedIntegerPages = pageNumbersList.length;
            try {
                alert("Extracting selected pages only...");
                
                const fileArrayBuffer = await file.arrayBuffer();
                const srcPdf = await PDFLib.PDFDocument.load(fileArrayBuffer);
                const extractedPdf = await PDFLib.PDFDocument.create();
                
                let totalDocPagesCount = srcPdf.getPageCount();
                
                let dynamicIndicesToKeep = pageNumbersList
                    .map(p => p - 1)
                    .filter(idx => idx >= 0 && idx < totalDocPagesCount);

                if (dynamicIndicesToKeep.length > 0) {
                    const copiedPages = await extractedPdf.copyPages(srcPdf, dynamicIndicesToKeep);
                    copiedPages.forEach((page) => extractedPdf.addPage(page));
                    
                    const savedPdfBytes = await extractedPdf.save();
                    finalFileToUpload = new Blob([savedPdfBytes], { type: "application/pdf" });
                }
            } catch (pdfError) {
                console.error("PDF-LIB extraction failed, processing fallback standard:", pdfError);
            }
        }
    }

    alert("Uploading document directly to server... Please wait.");

    const fileName = Date.now() + "_" + file.name;
    const { error: uploadError } = await client.storage.from("documents").upload(fileName, finalFileToUpload);

    if (uploadError) { alert(uploadError.message); return; }

    const fileUrl = client.storage.from("documents").getPublicUrl(fileName).data.publicUrl;

    const baseType = (type == 5 ? "Black & White" : "Color");
    const detailedPrintSummary = `${baseType} [Pages: ${pages} | ${copies} Copies]`;

    const { data: insertedOrder, error } = await client.from("orders").insert([
        {
            customer_name: name,
            mobile: mobile,
            pages: calculatedIntegerPages, 
            print_type: detailedPrintSummary, 
            amount: amount,
            file_url: fileUrl,
            payment_status: "Pending", 
            payment_id: ""
        }
    ]).select();

    if (error) {
        alert(error.message);
    } else {
        localStorage.setItem("amount", amount);
        localStorage.setItem("mobile", mobile);
        localStorage.setItem("printType", "document");
        localStorage.setItem("current_order_id", insertedOrder[0].id); 
        window.location.href = "payment.html";
    }
}
</script>

</body>
</html>
