<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Document Upload</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js"></script>
    <style>
        * { touch-action: manipulation; }
        body { font-family: sans-serif; background: #f4f4f4; }
        .card { max-width: 450px; margin: auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        .input-group label { font-size: 14px; color: #555; display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="tel"], input[type="file"], input[type="number"], select { width: 100%; padding: 8px; box-sizing: border-box; }
        
        /* PDF Preview Styles */
        .preview-wrapper { width: 100%; height: 350px; margin: 15px 0; border: 2px dashed #1976d2; border-radius: 8px; background: #f8f9fa; overflow: auto; padding: 10px; box-sizing: border-box; }
        .preview-box { width: 100%; min-height: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .preview-box.layout-grid-2 { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 8px; }
        .preview-box.layout-grid-4 { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 6px; }
        .page-render-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .preview-box canvas { max-width: 100%; height: auto; border: 1px solid #ddd; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .page-badge-label { margin-top: 6px; background: #1976d2; color: #fff; font-size: 11px; padding: 3px 10px; border-radius: 12px; }
        
        /* Image Crop Styles */
        .canvas-container { position: relative; margin: 15px auto; width: 100%; background: #eee; border: 2px dashed #28a745; border-radius: 8px; overflow: hidden; touch-action: none; }
        #cropCanvas { display: block; width: 100%; height: auto; cursor: crosshair; }
        .controls button { background: #28a745; color: white; padding: 8px 12px; border: none; border-radius: 4px; margin-right: 5px; cursor: pointer; }
        #croppedPreview { max-width: 100%; border: 2px solid #28a745; margin-top: 10px; display: none; }
        
        .force-grayscale { filter: grayscale(100%) brightness(105%) contrast(105%) !important; }
        #submitBtn { background: #1976d2; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px;}
        #submitBtn:disabled { background: #9e9e9e !important; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>Smart Document Upload</h2>

    <div class="input-group">
        <input type="text" id="name" placeholder="Customer Name" required>
    </div>
    <div class="input-group">
        <input type="tel" id="mobile" placeholder="Mobile Number" required>
    </div>
    
    <div class="input-group">
        <label>Select Document File (PDF or Image):</label>
        <input type="file" id="file" accept="image/*,application/pdf" onchange="handleFileSelectionChange();" required>
    </div>

    <div id="pdfArea" style="display: none;">
        <div class="preview-wrapper" id="previewWrapperFrame">
            <div class="preview-box" id="docPreview"></div>
        </div>
        <div class="input-group">
            <label>Pages to Print (For PDF):</label>
            <input type="text" id="pages" placeholder="e.g., All, 1, 3-5" value="All" oninput="calculate(); previewDocument();">
        </div>
        <div class="input-group">
            <label>Pages Per Sheet (Layout):</label>
            <select id="layout_mode" onchange="calculate(); updateLivePreviewGrid();">
                <option value="1">1 Page Per Sheet</option>
                <option value="2">2 Pages Per Sheet</option>
                <option value="4">4 Pages Per Sheet</option>
            </select>
        </div>
    </div>

    <div id="imageArea" style="display: none;">
        <p style="font-size: 12px; color: #555; text-align: center;">Drag corners to crop. Use 2 fingers to zoom/pan.</p>
        <div class="canvas-container">
            <canvas id="cropCanvas"></canvas>
        </div>
        <div class="controls" style="text-align: center;">
            <button type="button" onclick="rotateImage()">↻ Rotate</button>
            <button type="button" onclick="resetZoom()">Reset Zoom</button>
            <button type="button" onclick="saveCrop()" style="background: #1976d2;">Save Crop</button>
        </div>
        <div style="text-align: center;">
            <img id="croppedPreview">
        </div>
    </div>

    <div id="commonControls" style="display: none; margin-top: 20px;">
        <div class="input-group">
            <label>Number of Copies:</label>
            <input type="number" id="copies" value="1" min="1" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Print Type:</label>
            <select id="type" onchange="calculate(); applyPreviewFilter();">
                <option value="5">Black & White (₹5 / page)</option>
                <option value="10">Color (₹10 / page)</option>
            </select>
        </div>
        <h3 id="total" style="text-align: center; color: #1976d2;">Total: ₹5</h3>
        <button id="submitBtn" onclick="submitOrder()">Submit Order</button>
    </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
const supabaseClient = window.supabase.createClient(window.SITE_CONFIG.SUPABASE_URL, window.SITE_CONFIG.SUPABASE_KEY);

let currentMode = ""; // "pdf" or "image"
let totalDetectedPDFPages = 1; 
let activeRenderTaskId = 0; 
let cachedFileObject = null;
let finalCroppedBlob = null; // Stores image blob

// OpenCV Engine State
const engine = { canvas: document.getElementById('cropCanvas'), ctx: document.getElementById('cropCanvas').getContext('2d'), img: null, corners: [], activeCorner: -1, rotation: 0, originalSrc: "", zoom: 1, offsetX: 0, offsetY: 0, isPanning: false };

async function handleFileSelectionChange() {
    const file = document.getElementById("file").files[0];
    if (!file) return;

    document.getElementById("commonControls").style.display = "block";
    cachedFileObject = file;

    if (file.type === "application/pdf") {
        currentMode = "pdf";
        document.getElementById("imageArea").style.display = "none";
        document.getElementById("pdfArea").style.display = "block";
        
        const fileArrayBuffer = await file.arrayBuffer();
        const srcPdf = await PDFLib.PDFDocument.load(fileArrayBuffer);
        totalDetectedPDFPages = srcPdf.getPageCount();
        await previewDocument();
        calculate();
    } 
    else if (file.type.startsWith("image/")) {
        currentMode = "image";
        document.getElementById("pdfArea").style.display = "none";
        document.getElementById("imageArea").style.display = "block";
        finalCroppedBlob = null;
        document.getElementById("croppedPreview").style.display = "none";
        
        const reader = new FileReader();
        reader.onload = (event) => {
            engine.originalSrc = event.target.result;
            engine.rotation = 0;
            initImageCrop(event.target.result);
        };
        reader.readAsDataURL(file);
        calculate();
    }
}

// ==========================================
// 📄 PDF PREVIEW LOGIC
// ==========================================
function updateLivePreviewGrid() {
    const layoutMode = document.getElementById("layout_mode").value;
    const previewBox = document.getElementById("docPreview");
    previewBox.className = "preview-box"; 
    if (layoutMode === "2") previewBox.classList.add("layout-grid-2");
    if (layoutMode === "4") previewBox.classList.add("layout-grid-4");
}

async function previewDocument() {
    const currentTaskId = ++activeRenderTaskId; 
    const previewContainer = document.getElementById("docPreview");
    let pageInput = document.getElementById("pages").value.trim();

    try {
        const fileArrayBuffer = await cachedFileObject.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: fileArrayBuffer }).promise;
        if (currentTaskId !== activeRenderTaskId) return;

        let pagesToRender = parsePageSelection(pageInput) || Array.from({length: pdf.numPages}, (_, i) => i + 1);
        pagesToRender = pagesToRender.filter(p => p >= 1 && p <= pdf.numPages);
        previewContainer.innerHTML = pagesToRender.length === 0 ? "<span>Invalid selection</span>" : ""; 

        for (let pageNum of pagesToRender) {
            if (currentTaskId !== activeRenderTaskId) return;
            const page = await pdf.getPage(pageNum);
            const pageWrapper = document.createElement('div');
            pageWrapper.className = 'page-render-container';
            const canvas = document.createElement('canvas');
            const viewport = page.getViewport({ scale: 380 / page.getViewport({scale:1}).width });
            canvas.width = viewport.width; canvas.height = viewport.height;
            pageWrapper.appendChild(canvas);
            pageWrapper.innerHTML += `<div class="page-badge-label">Page ${pageNum}</div>`;
            previewContainer.appendChild(pageWrapper);
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        }
    } catch (err) { console.error(err); }
    updateLivePreviewGrid();
    applyPreviewFilter();
}

function parsePageSelection(input) {
    let clean = input.replace(/\s+/g, '').toLowerCase();
    if (clean === "all" || clean === "") return null;
    let pages = [];
    clean.split(",").forEach(part => {
        if (part.includes("-")) {
            let [s, e] = part.split("-");
            for (let i = parseInt(s); i <= parseInt(e); i++) pages.push(i);
        } else pages.push(parseInt(part));
    });
    return pages;
}

// ==========================================
// 🖼️ IMAGE CROP & ENHANCE LOGIC (OPENCV)
// ==========================================
function initImageCrop(src) {
    const img = new Image();
    img.onload = () => {
        engine.img = img;
        engine.canvas.width = 400;
        engine.canvas.height = (img.height * 400) / img.width;
        engine.corners = [{x:30, y:30}, {x:engine.canvas.width-30, y:30}, {x:engine.canvas.width-30, y:engine.canvas.height-30}, {x:30, y:engine.canvas.height-30}];
        resetZoom();
    };
    img.src = src;
}

function rotateImage() {
    if (!engine.originalSrc) return;
    engine.rotation = (engine.rotation + 90) % 360;
    const tempImg = new Image();
    tempImg.onload = () => {
        const cvs = document.createElement('canvas');
        if (engine.rotation === 90 || engine.rotation === 270) { cvs.width = tempImg.height; cvs.height = tempImg.width; } 
        else { cvs.width = tempImg.width; cvs.height = tempImg.height; }
        const ctx = cvs.getContext('2d');
        ctx.translate(cvs.width/2, cvs.height/2);
        ctx.rotate((engine.rotation * Math.PI)/180);
        ctx.drawImage(tempImg, -tempImg.width/2, -tempImg.height/2);
        initImageCrop(cvs.toDataURL("image/jpeg"));
    };
    tempImg.src = engine.originalSrc;
}

function resetZoom() { engine.zoom = 1; engine.offsetX = 0; engine.offsetY = 0; drawCrop(); }

function drawCrop() {
    if (!engine.img) return;
    engine.ctx.clearRect(0, 0, engine.canvas.width, engine.canvas.height);
    engine.ctx.save();
    engine.ctx.translate(engine.offsetX, engine.offsetY);
    engine.ctx.scale(engine.zoom, engine.zoom);
    engine.ctx.drawImage(engine.img, 0, 0, engine.canvas.width, engine.canvas.height);
    engine.ctx.restore();
    engine.ctx.strokeStyle = '#28a745'; engine.ctx.lineWidth = 2;
    engine.ctx.beginPath();
    engine.ctx.moveTo(engine.corners[0].x, engine.corners[0].y);
    for (let i=1; i<4; i++) engine.ctx.lineTo(engine.corners[i].x, engine.corners[i].y);
    engine.ctx.closePath(); engine.ctx.stroke();
    engine.corners.forEach(c => { engine.ctx.fillStyle='#28a745'; engine.ctx.beginPath(); engine.ctx.arc(c.x, c.y, 12, 0, Math.PI*2); engine.ctx.fill(); });
}

function saveCrop() {
    if (!engine.img) return alert("Upload image first.");
    const mappedCorners = engine.corners.map(c => ({ x: (c.x - engine.offsetX)/engine.zoom, y: (c.y - engine.offsetY)/engine.zoom }));
    
    // Perspective Warp
    const targetW = 856, targetH = 540;
    const hCvs = document.createElement('canvas'); hCvs.width = targetW; hCvs.height = targetH;
    const ctx = hCvs.getContext('2d');
    const [p1, p2, p3, p4] = mappedCorners.map(c => [c.x/engine.canvas.width, c.y/engine.canvas.height]);
    
    for (let y=0; y<targetH; y++) {
        for (let x=0; x<targetW; x++) {
            let u=x/targetW, v=y/targetH;
            let topX = p1[0]+u*(p2[0]-p1[0]), topY = p1[1]+u*(p2[1]-p1[1]);
            let botX = p4[0]+u*(p3[0]-p4[0]), botY = p4[1]+u*(p3[1]-p4[1]);
            ctx.drawImage(engine.img, (topX+v*(botX-topX))*engine.img.width, (topY+v*(botY-topY))*engine.img.height, 1, 1, x, y, 1, 1);
        }
    }

    // Enhance via OpenCV
    if (typeof cv !== 'undefined') {
        try {
            let src = cv.imread(hCvs);
            let lab = new cv.Mat(), channels = new cv.MatVector(), cl = new cv.Mat();
            cv.cvtColor(src, lab, cv.COLOR_RGBA2RGB, 0); cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab, 0); cv.split(lab, channels);
            let clahe = new cv.CLAHE(2.0, new cv.Size(8, 8)); clahe.apply(channels.get(0), cl);
            channels.set(0, cl); cv.merge(channels, lab);
            let rgb = new cv.Mat(), blur = new cv.Mat(), dest = new cv.Mat();
            cv.cvtColor(lab, rgb, cv.COLOR_Lab2RGB, 0);
            cv.GaussianBlur(rgb, blur, new cv.Size(0,0), 3, 3, cv.BORDER_DEFAULT);
            cv.addWeighted(rgb, 1.5, blur, -0.5, 0, dest);
            cv.imshow(hCvs, dest);
            src.delete(); lab.delete(); channels.delete(); cl.delete(); clahe.delete(); rgb.delete(); blur.delete(); dest.delete();
        } catch(e) { console.warn("CV Error", e); }
    }
    
    document.getElementById("croppedPreview").src = hCvs.toDataURL("image/jpeg", 0.95);
    document.getElementById("croppedPreview").style.display = "inline-block";
    applyPreviewFilter();
    hCvs.toBlob(b => finalCroppedBlob = b, "image/jpeg", 0.95);
}

// Touch/Mouse Events for Crop Canvas
const getPos = e => ({ x: ((e.touches?e.touches[0].clientX:e.clientX) - engine.canvas.getBoundingClientRect().left)*(engine.canvas.width/engine.canvas.getBoundingClientRect().width), y: ((e.touches?e.touches[0].clientY:e.clientY) - engine.canvas.getBoundingClientRect().top)*(engine.canvas.height/engine.canvas.getBoundingClientRect().height) });
engine.canvas.addEventListener('mousedown', e => { const p = getPos(e); engine.activeCorner = engine.corners.findIndex(c => Math.hypot(c.x-p.x, c.y-p.y)<45); if(engine.activeCorner===-1 && engine.zoom>1){ engine.isPanning=true; engine.lastX=e.clientX; engine.lastY=e.clientY; }});
engine.canvas.addEventListener('mousemove', e => { if(engine.activeCorner!==-1){ const p = getPos(e); engine.corners[engine.activeCorner]={x:Math.max(0,Math.min(engine.canvas.width,p.x)), y:Math.max(0,Math.min(engine.canvas.height,p.y))}; drawCrop(); } else if(engine.isPanning){ engine.offsetX+=(e.clientX-engine.lastX); engine.offsetY+=(e.clientY-engine.lastY); engine.lastX=e.clientX; engine.lastY=e.clientY; drawCrop(); }});
window.addEventListener('mouseup', () => { engine.activeCorner=-1; engine.isPanning=false; });
engine.canvas.addEventListener('touchstart', e => { if(e.touches.length===1){ const p=getPos(e); engine.activeCorner=engine.corners.findIndex(c=>Math.hypot(c.x-p.x, c.y-p.y)<45); if(engine.activeCorner===-1&&engine.zoom>1){ engine.isPanning=true; engine.lastX=e.touches[0].clientX; engine.lastY=e.touches[0].clientY;} } else if(e.touches.length===2){ engine.activeCorner=-1; engine.isPanning=false; engine.lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); engine.lastTX=(e.touches[0].clientX+e.touches[1].clientX)/2; engine.lastTY=(e.touches[0].clientY+e.touches[1].clientY)/2; }}, {passive:false});
engine.canvas.addEventListener('touchmove', e => { e.preventDefault(); if(e.touches.length===1){ if(engine.activeCorner!==-1){ const p=getPos(e); engine.corners[engine.activeCorner]={x:Math.max(0,Math.min(engine.canvas.width,p.x)), y:Math.max(0,Math.min(engine.canvas.height,p.y))}; drawCrop(); } else if(engine.isPanning){ engine.offsetX+=(e.touches[0].clientX-engine.lastX); engine.offsetY+=(e.touches[0].clientY-engine.lastY); engine.lastX=e.touches[0].clientX; engine.lastY=e.touches[0].clientY; drawCrop(); } } else if(e.touches.length===2){ const cDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); const cX=(e.touches[0].clientX+e.touches[1].clientX)/2, cY=(e.touches[0].clientY+e.touches[1].clientY)/2; let nz=engine.zoom*(cDist/engine.lastDist); nz=Math.max(1,Math.min(8,nz)); const r=engine.canvas.getBoundingClientRect(); const cx=(cX-r.left)*(engine.canvas.width/r.width), cy=(cY-r.top)*(engine.canvas.height/r.height); engine.offsetX=cx-(cx-engine.offsetX)*(nz/engine.zoom); engine.offsetY=cy-(cy-engine.offsetY)*(nz/engine.zoom); engine.zoom=nz; engine.offsetX+=(cX-engine.lastTX); engine.offsetY+=(cY-engine.lastTY); engine.lastDist=cDist; engine.lastTX=cX; engine.lastTY=cY; if(engine.zoom===1){engine.offsetX=0; engine.offsetY=0;} drawCrop(); }}, {passive:false});
window.addEventListener('touchend', () => { engine.activeCorner=-1; engine.isPanning=false; });

// ==========================================
// 📤 COMMON SUBMIT & CALCULATE LOGIC
// ==========================================
function applyPreviewFilter() {
    const isBw = document.getElementById("type").value == 5;
    const pdfWrap = document.getElementById("previewWrapperFrame");
    const imgWrap = document.getElementById("croppedPreview");
    if (isBw) { pdfWrap.classList.add("force-grayscale"); imgWrap.classList.add("force-grayscale"); } 
    else { pdfWrap.classList.remove("force-grayscale"); imgWrap.classList.remove("force-grayscale"); }
}

function calculate() {
    let copies = parseInt(document.getElementById("copies").value) || 1;
    let price = parseInt(document.getElementById("type").value);
    let totalPages = 1;
    
    if (currentMode === "pdf") {
        let layoutDivisor = parseInt(document.getElementById("layout_mode").value) || 1;
        let selectedPages = parsePageSelection(document.getElementById("pages").value.trim());
        totalPages = selectedPages ? selectedPages.length : totalDetectedPDFPages;
        totalPages = Math.ceil(totalPages / layoutDivisor);
    }
    document.getElementById("total").innerHTML = "Total: ₹" + (totalPages * price * copies);
}

async function submitOrder() {
    const name = document.getElementById("name").value.trim();
    const mobile = document.getElementById("mobile").value.trim();
    if (!name || !mobile || !cachedFileObject) return alert("Fill details and select document.");
    
    if (currentMode === "image" && !finalCroppedBlob) return alert("Please click 'Save Crop' before submitting.");

    const submitBtn = document.getElementById("submitBtn");
    submitBtn.innerText = "Please wait..."; submitBtn.disabled = true;

    try {
        let finalMimeType = cachedFileObject.type;
        let uploadBlob = cachedFileObject;

        if (currentMode === "image") {
            // Apply B&W logic to final blob if selected
            if (document.getElementById("type").value == 5) {
                uploadBlob = await new Promise(res => {
                    const i = new Image(); i.src = URL.createObjectURL(finalCroppedBlob);
                    i.onload = () => {
                        const c = document.createElement('canvas'); c.width=i.width; c.height=i.height;
                        const x = c.getContext('2d'); x.drawImage(i,0,0);
                        const d = x.getImageData(0,0,c.width,c.height), px = d.data;
                        for(let j=0; j<px.length; j+=4){ let g=0.299*px[j]+0.587*px[j+1]+0.114*px[j+2]; px[j]=px[j+1]=px[j+2]=g; }
                        x.putImageData(d,0,0); c.toBlob(res, "image/jpeg", 0.95);
                    };
                });
            } else { uploadBlob = finalCroppedBlob; }
            finalMimeType = "image/jpeg";
        } 
        else if (currentMode === "pdf") {
            // PDF parsing logic
            const sPdf = await PDFLib.PDFDocument.load(await cachedFileObject.arrayBuffer());
            let pgs = parsePageSelection(document.getElementById("pages").value) || Array.from({length:sPdf.getPageCount()},(_,i)=>i+1);
            const outPdf = await PDFLib.PDFDocument.create();
            const copied = await outPdf.copyPages(sPdf, pgs.filter(p=>p<=sPdf.getPageCount()).map(p=>p-1));
            copied.forEach(p => outPdf.addPage(p));
            uploadBlob = new Blob([await outPdf.save()], {type: "application/pdf"});
        }

        const fileName = Date.now() + "_" + cachedFileObject.name;
        const { error } = await supabaseClient.storage.from("documents").upload(fileName, uploadBlob, { contentType: finalMimeType, upsert: true });
        if (error) throw error;

        const fileUrl = supabaseClient.storage.from("documents").getPublicUrl(fileName).data.publicUrl;
        const copies = document.getElementById("copies").value;
        const amount = parseInt(document.getElementById("total").innerHTML.replace("Total: ₹", ""));
        const desc = currentMode==="pdf" ? `[Pages: ${document.getElementById("pages").value} | Layout: ${document.getElementById("layout_mode").value}]` : `[Image Cropped]`;

        const { data: order, error: dbErr } = await supabaseClient.from("orders").insert([{
            customer_name: name, mobile: mobile, pages: copies, print_type: document.getElementById("type").options[document.getElementById("type").selectedIndex].text + " " + desc, amount: amount, file_url: fileUrl, payment_status: "Pending", layout_mode: currentMode==="pdf" ? document.getElementById("layout_mode").value : 1
        }]).select();

        if (dbErr) throw dbErr;
        localStorage.setItem("amount", amount); localStorage.setItem("mobile", mobile); localStorage.setItem("current_order_id", order[0].id);
        window.location.href = "payment.html";

    } catch (e) {
        console.error(e); alert("Error: " + e.message);
        submitBtn.innerText = "Submit Order"; submitBtn.disabled = false;
    }
}
</script>
</body>
</html>
