<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Payment Method</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .amount-display {
            font-size: 24px;
            font-weight: bold;
            color: #1976d2;
            margin: 20px 0;
            background: #f0f7ff;
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed #1976d2;
        }

        .pay-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            color: white;
        }

        .pay-btn:active {
            transform: scale(0.98);
        }

        .online-btn {
            background-color: #28a745;
        }

        .online-btn:hover {
            background-color: #218838;
        }

        .cash-btn {
            background-color: #85bb65; 
            border: 2px solid #73a953;
        }

        .cash-btn:hover {
            background-color: #6e9e51;
        }

        .cancel-link {
            display: inline-block;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .cancel-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Complete Your Order</h2>
    <p style="color: #666;">Please select your preferred payment mode below.</p>
    
    <div class="amount-display" id="priceDisplay">Total Amount: ₹0</div>

    <button class="pay-btn online-btn" onclick="processOnlinePayment()">💳 Pay Online (UPI Instant)</button>
    
    <button class="pay-btn cash-btn" onclick="processCashPayment()">💵 Pay with Cash at Counter</button>

    <a href="index.html" class="cancel-link">❌ Cancel & Abandon Order</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");
    const customerMobile = localStorage.getItem("mobile");

    // 🌟 CONFIGURATION: Change this to your actual shop's UPI ID/VPA and Business Name
    const SHOP_UPI_ID = "yourshop@upi"; // <-- Put your GPay/PhonePe/Paytm UPI ID here
    const SHOP_NAME = "Digital Print Shop"; // <-- Put your shop name here

    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        document.getElementById("priceDisplay").innerText = "Total Amount: ₹" + billingAmount;
    };

    // 🌟 FIXED ONLINE PAYMENT ROUTING VIA DYNAMIC UPI INTENT
    async function processOnlinePayment() {
        if (billingAmount === "0" || billingAmount === "") {
            alert("Invalid checkout amount.");
            return;
        }

        // Generate a standard deep-linked UPI URI scheme
        const note = encodeURIComponent("Print Job Order " + (targetOrderId || ""));
        const upiUrl = `upi://pay?pa=${SHOP_UPI_ID}&pn=${encodeURIComponent(SHOP_NAME)}&am=${billingAmount}&cu=INR&tn=${note}`;

        // Automatically update payment status to "Success" in Supabase so the automated print queue triggers immediately upon clicking link
        try {
            if (targetOrderId) {
                await client
                    .from("orders")
                    .update({ payment_status: "Success" })
                    .eq("id", targetOrderId);
            }
        } catch (err) {
            console.error("Database status tracking failure:", err);
        }

        localStorage.setItem("last_payment_method", "Online UPI");

        // Redirect directly to UPI gateway handler. 
        // On phones, this opens Google Pay / PhonePe / Paytm instantly with the exact correct amount filled out!
        window.location.href = upiUrl;

        // Fallback: If they are on a desktop, send them directly to the success screen after a brief delay
        setTimeout(() => {
            window.location.href = "success.html";
        }, 1000);
    }

    function processCashPayment() {
        if (!confirm("Are you sure you want to pay using cash at the shop counter? Your document will print once marked by management.")) return;
        localStorage.setItem("last_payment_method", "Cash");
        window.location.href = "success.html";
    }
</script>

</body>
</html>
