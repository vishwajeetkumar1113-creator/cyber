<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Select Payment Method</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .amount-display {
            font-size: 26px;
            font-weight: bold;
            color: #1976d2;
            margin: 20px 0;
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #1976d2;
        }
        .pay-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .rzp-btn {
            color: white;
            background: #3399cc;
            box-shadow: 0 4px 12px rgba(51, 153, 204, 0.3);
        }
        .rzp-btn:hover {
            background: #287a9e;
        }
        .cash-btn {
            color: white;
            background-color: #28a745;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.25);
        }
        .cash-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Select Payment Method</h2>
    <p style="color: #666; font-size: 14px;">Choose how you want to settle your printing tab balance balance parameters.</p>
    
    <div class="amount-display" id="priceDisplay">Amount to Pay: ₹0</div>

    <button class="pay-btn rzp-btn" onclick="openRazorpayCheckout(event)">💳 PAY ONLINE NOW</button>
    
    <button class="pay-btn cash-btn" onclick="processCashPayment(event)">💵 PAY WITH CASH AT COUNTER</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");

    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        document.getElementById("priceDisplay").innerText = "Amount to Pay: ₹" + billingAmount;
    };

    // 🌐 OPTION 1: ONLINE GATEWAY ENGINE ROUTE
    function openRazorpayCheckout(e) {
        e.preventDefault();

        if (billingAmount === "0" || billingAmount === "") {
            alert("Invalid order amount profile.");
            return;
        }

        const amountInPaise = parseFloat(billingAmount) * 100;

        const options = {
            "key": "rzp_live_T5K9Isn4Ds0Qrx", // ⚠️ Put your live/test Razorpay Key ID here
            "amount": amountInPaise.toString(),
            "currency": "INR",
            "name": "Digital Print Shop",
            "description": "Payment for Order #" + (targetOrderId || "Bulk"),
            "handler": async function (response) {
                try {
                    if (targetOrderId) {
                        // Automatically update status variables straight to Paid state
                        await client
                            .from("orders")
                            .update({ payment_status: "Paid" })
                            .eq("id", targetOrderId);
                    }
                    localStorage.setItem("last_payment_method", "Razorpay Gateway");
                    window.location.href = "success.html";
                } catch (err) {
                    console.error("Database connection failure context: ", err);
                    window.location.href = "success.html";
                }
            },
            "theme": { "color": "#3399cc" }
        };

        const rzp = new Razorpay(options);
        rzp.open();
    }

    // 🏦 OPTION 2: CASH AT COUNTER BACKEND REGISTRATION FLOW
    async function processCashPayment(e) {
        e.preventDefault();
        
        try {
            if (targetOrderId) {
                // Update tracking profile to alert admin queue layout monitor matrix
                await client
                    .from("orders")
                    .update({ payment_status: "Cash Payment Pending" })
                    .eq("id", targetOrderId);
            }
        } catch (dbError) {
            console.error("Database tracker update error:", dbError);
        }

        localStorage.setItem("last_payment_method", "Cash Counter");
        window.location.href = "cash.html";
    }
</script>
</body>
</html>
