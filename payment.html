<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Select Payment Method</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .amount-display {
            font-size: 26px;
            font-weight: bold;
            color: #1976d2;
            margin: 20px 0;
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #1976d2;
        }
        .pay-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .rzp-btn {
            color: white;
            background: #3399cc;
            box-shadow: 0 4px 12px rgba(51, 153, 204, 0.3);
        }
        .rzp-btn:hover {
            background: #287a9e;
        }
        .cash-btn {
            color: white;
            background-color: #28a745;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.25);
        }
        .cash-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Select Payment Method</h2>
    <p style="color: #666; font-size: 14px;">Choose how you want to settle your printing tab balance balance parameters.</p>
    
    <div class="amount-display" id="priceDisplay">Amount to Pay: ₹0</div>

    <button class="pay-btn rzp-btn" onclick="openRazorpayCheckout(event)">💳 PAY ONLINE NOW</button>
    
    <button class="pay-btn cash-btn" onclick="processCashPayment(event)">💵 PAY WITH CASH AT COUNTER</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
    // 🟢 CRITICAL DATA LOCK: Variables ko shuru mein hi read karke memory mein lock kar diya
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");

    const client = window.supabase.createClient(window.SITE_CONFIG.SUPABASE_URL, window.SITE_CONFIG.SUPABASE_KEY);

    window.onload = function() {
        // Agar galti se bina kisi order ke koi direct is page par aaye toh use wapas bhej do
        if (billingAmount === "0" || !targetOrderId) {
            window.location.href = "upload.html";
            return;
        }
        document.getElementById("priceDisplay").innerText = "Amount to Pay: ₹" + billingAmount;
    };

    // 🌐 OPTION 1: ONLINE GATEWAY ENGINE ROUTE
    function openRazorpayCheckout(e) {
        e.preventDefault();

        const amountInPaise = parseFloat(billingAmount) * 100;

        const options = {
            "key": "rzp_live_T5K9Isn4Ds0Qrx", 
            "amount": amountInPaise.toString(),
            "currency": "INR",
            "name": window.SITE_CONFIG.STORE_NAME || "Digital Print Shop",
            "description": "Payment for Order #" + targetOrderId,
            
            "notes": {
                "current_order_id": targetOrderId
            },
            
            "handler": async function (response) {
                // 🔒 TAB ANTI-CUT LOCK TRIGGER ACTIVE
                const preventClose = (event) => {
                    event.preventDefault();
                    event.returnValue = "Saving your order status securely... Please wait.";
                };
                window.addEventListener("beforeunload", preventClose);

                try {
                    // Direct target update call executing securely using pre-locked variable
                    const { error } = await client
                        .from("orders")
                        .update({ payment_status: "Success" })
                        .eq("id", targetOrderId);
                        
                    if (error) throw error;
                    
                    localStorage.setItem("last_payment_method", "Razorpay Gateway");
                    
                    // 🟢 SECURE MEMORY FLUSH: Database update hone ke BAD hi purana session saaf karenge
                    localStorage.removeItem("amount");
                    localStorage.removeItem("current_order_id");
                    
                    window.removeEventListener("beforeunload", preventClose);
                    window.location.href = "success.html";
                } catch (err) {
                    console.error("Database connection failure context: ", err);
                    
                    // Backup Retry framework loop logic
                    setTimeout(async () => {
                        await client.from("orders").update({ payment_status: "Success" }).eq("id", targetOrderId);
                        localStorage.removeItem("amount");
                        localStorage.removeItem("current_order_id");
                        window.removeEventListener("beforeunload", preventClose);
                        window.location.href = "success.html";
                    }, 600);
                }
            },
            "theme": { "color": "#3399cc" }
        };

        const rzp = new Razorpay(options);
        rzp.open();
    }

    // 🏦 OPTION 2: CASH AT COUNTER BACKEND REGISTRATION FLOW
    async function processCashPayment(e) {
        e.preventDefault();
        
        try {
            await client
                .from("orders")
                .update({ payment_status: "Cash Payment Pending" })
                .eq("id", targetOrderId);
        } catch (dbError) {
            console.error("Database tracker update error:", dbError);
        }

        localStorage.setItem("last_payment_method", "Cash Counter");
        
        // Cash select karne par bhi data clear karke aage bhejenge
        localStorage.removeItem("amount");
        localStorage.removeItem("current_order_id");
        
        window.location.href = "cash.html";
    }
</script>
</body>
</html>
