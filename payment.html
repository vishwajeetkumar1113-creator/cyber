<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Payment</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 15px;
        }
        .card {
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        h2 { font-size: 28px; }
        h3 { font-size: 22px; word-break: break-word; }
        img { width: 100%; max-width: 250px; height: auto; margin: 20px 0; }
        button { width: 100%; background: #28a745; color: white; border: none; padding: 15px; cursor: pointer; border-radius: 8px; font-size: 18px; }
        button:hover { background: #218838; }
        p { font-size: 16px; }
        @media (max-width: 480px) {
            .card { padding: 15px; margin: 10px auto; }
            h2 { font-size: 24px; }
            h3 { font-size: 20px; }
            button { font-size: 16px; padding: 14px; }
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Payment</h2>
    <h3 id="amount">Amount: ₹0</h3>

    <img src="images/upi-qr.png" width="250" alt="UPI QR">

    <p><strong>UPI ID:</strong></p>
    <h3>7992433200@sbi</h3>

    <p>Click below to pay online.</p>
    <button onclick="payNow()">Pay Now</button>
</div>

<script>
const client = window.supabase.createClient(
    "https://irqlvuphoblgjqysteto.supabase.co",
    "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-"
);

const amount = localStorage.getItem("amount");
const mobile = localStorage.getItem("mobile");
const orderId = localStorage.getItem("current_order_id"); 

if (amount) {
    document.getElementById("amount").innerHTML = "Amount: ₹" + amount;
}

function payNow() {
    var options = {
        key: "rzp_live_T49srqXpwl5lGy",
        amount: amount * 100,
        currency: "INR",
        name: "Vishwajeet Cyber Cafe",
        description: "Document Printing",
        handler: async function (response) {
            
            localStorage.setItem("payment_id", response.razorpay_payment_id);
            alert("Payment Successful! Syncing with Admin Dashboard...");

            let updatedSuccessfully = false;

            // STRATEGY 1: Update using the unique Order ID (Most accurate)
            if (orderId && orderId !== "undefined") {
                try {
                    const { data, error } = await client
                        .from("orders")
                        .update({ 
                            payment_status: "Success", 
                            payment_id: response.razorpay_payment_id 
                        })
                        .eq("id", orderId)
                        .select(); 

                    if (!error && data && data.length > 0) {
                        updatedSuccessfully = true;
                        console.log("Sync achieved via unique Order ID.");
                    } else if (error) {
                        console.error("ID Update Error Details:", error.message);
                    }
                } catch (err) {
                    console.error("Network error during unique ID update:", err);
                }
            }

            // STRATEGY 2: Backup Fallback (If ID matching fails, target the latest order matching the mobile number)
            if (!updatedSuccessfully && mobile) {
                try {
                    const { error } = await client
                        .from("orders")
                        .update({ 
                            payment_status: "Success", 
                            payment_id: response.razorpay_payment_id 
                        })
                        .eq("mobile", mobile)
                        .order("id", { ascending: false })
                        .limit(1);

                    if (!error) {
                        updatedSuccessfully = true;
                        console.log("Sync achieved via mobile number fallback.");
                    } else {
                        alert("Database sync failed: " + error.message);
                    }
                } catch (err) {
                    console.error("Network error during mobile fallback update:", err);
                }
            }

            if (!updatedSuccessfully) {
                alert("Warning: Could not update status automatically. Please show payment receipt to counter.");
            }

            // Execute redirect smoothly after database transaction cycle finishes
            setTimeout(function() {
                const printType = localStorage.getItem("printType");
                if (printType === "id") {
                    const frontUrl = localStorage.getItem("frontImage");
                    const backUrl = localStorage.getItem("backImage");
                    window.location.href = "idpreview.html?front=" + encodeURIComponent(frontUrl) + "&back=" + encodeURIComponent(backUrl);
                } else {
                    window.location.href = "success.html";
                }
            }, 1500);
        },
        theme: { color: "#1976d2" }
    };

    var rzp = new Razorpay(options);
    rzp.on('payment.failed', function (response) {
        alert("Payment Failed\n" + response.error.description);
    });
    rzp.open();
}
</script>

</body>
</html>
