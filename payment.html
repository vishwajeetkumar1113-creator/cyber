<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Payment Method</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .amount-display {
            font-size: 24px;
            font-weight: bold;
            color: #1976d2;
            margin: 20px 0;
            background: #f0f7ff;
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed #1976d2;
        }

        .pay-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            color: white;
        }

        .pay-btn:active {
            transform: scale(0.98);
        }

        .online-btn {
            background-color: #28a745;
        }

        .online-btn:hover {
            background-color: #218838;
        }

        /* 🌟 CASH BUTTON CUSTOM STYLES */
        .cash-btn {
            background-color: #85bb65; /* Money Green color accent */
            border: 2px solid #73a953;
        }

        .cash-btn:hover {
            background-color: #6e9e51;
        }

        .cancel-link {
            display: inline-block;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .cancel-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Complete Your Order</h2>
    <p style="color: #666;">Please select your preferred payment configuration mode below.</p>
    
    <div class="amount-display" id="priceDisplay">Total Amount: ₹0</div>

    <button class="pay-btn online-btn" onclick="processOnlinePayment()">💳 Pay Online (UPI / Card)</button>
    
    <button class="pay-btn cash-btn" onclick="processCashPayment()">💵 Pay with Cash at Counter</button>

    <a href="index.html" class="cancel-link">❌ Cancel & Abandon Order</a>
</div>

<script>
    // Pull transaction details stored temporarily in client context cache storage
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");
    const customerMobile = localStorage.getItem("mobile");

    window.onload = function() {
        document.getElementById("priceDisplay").innerText = "Total Amount: ₹" + billingAmount;
    };

    function processOnlinePayment() {
        // Your existing routing gateway configuration handles this loop block
        alert("Redirecting to secure online payment gateway framework...");
        // window.location.href = "online_gateway_url_here";
    }

    // 🌟 CASH TRANSACTION HANDLER ROUTINE
    function processCashPayment() {
        // Confirms intent action locally to avoid accidental user slip redirects
        if (!confirm("Are you sure you want to pay using cash at the shop counter? Your document will print once marked by management.")) return;

        console.log(`Cash checkout pipeline engaged for order document matching index: ${targetOrderId}`);

        // Update local session data matrix so your success screen knows it was an offline cash collection profile
        localStorage.setItem("last_payment_method", "Cash");
        
        // Instant hard destination routing swap straight into your order success template
        window.location.href = "success.html";
    }
</script>

</body>
</html>
