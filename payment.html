<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant UPI Launch</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .amount-display {
            font-size: 26px;
            font-weight: bold;
            color: #1976d2;
            margin: 20px 0;
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #1976d2;
        }
        .pay-btn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            background-color: #1976d2;
            transition: background 0.2s ease;
            text-decoration: none;
        }
        .pay-btn:hover {
            background-color: #1565c0;
        }
        .toast-msg {
            display: none;
            margin-top: 10px;
            padding: 8px;
            background-color: #323232;
            color: white;
            font-size: 13px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Automatic UPI Launch</h2>
    <p style="color: #666; font-size: 14px; margin-bottom: 10px;">Tap below to select your banking app. The exact amount will carry over.</p>
    
    <div class="amount-display" id="priceDisplay">Amount to Pay: ₹0</div>

    <!-- 🌟 Clean Native URL scheme string -->
    <a href="#" id="nativeUpiLink" class="pay-btn" onclick="handleUpiClick(event)">⚡ Pay Now (Select App)</a>
    
    <div class="toast-msg" id="toast">📋 Shop UPI ID copied to clipboard automatically!</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");

    const SHOP_UPI_ID = "paytmqr5oxmd8@ptys"; 
    const SHOP_NAME = "Digital Print Shop";

    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        document.getElementById("priceDisplay").innerText = "Amount to Pay: ₹" + billingAmount;
        
        const note = encodeURIComponent("Order " + (targetOrderId || ""));
        // 🌟 Use the basic native web link standard scheme
        const standardUpiUrl = `upi://pay?pa=${SHOP_UPI_ID}&pn=${encodeURIComponent(SHOP_NAME)}&am=${billingAmount}&cu=INR&tn=${note}`;
        
        document.getElementById("nativeUpiLink").href = standardUpiUrl;
    };

    async function handleUpiClick(e) {
        // 1. Instantly copy the ID to clipboard as a secure backup step
        navigator.clipboard.writeText(SHOP_UPI_ID);
        
        document.getElementById("toast").style.display = "block";

        // 2. Register Paid status in Supabase so the admin panel triggers the print job
        try {
            if (targetOrderId) {
                await client
                    .from("orders")
                    .update({ payment_status: "Paid" })
                    .eq("id", targetOrderId);
            }
        } catch (err) {
            console.error(err);
        }

        // 3. Let the phone open the standard app selection list naturally
        setTimeout(() => {
            window.location.href = "success.html";
        }, 3000);
    }
</script>
</body>
</html>
