<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatic UPI Launch</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .amount-display {
            font-size: 26px;
            font-weight: bold;
            color: #1976d2;
            margin: 20px 0;
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #1976d2;
        }
        .pay-link {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            box-sizing: border-box;
            transition: opacity 0.2s ease;
        }
        .pay-link:active {
            opacity: 0.9;
        }
        .paytm-btn { background-color: #002e6e; }
        .gpay-btn { background-color: #4285f4; }
        .cash-btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 14px;
            background-color: #85bb65;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Automatic Online Payment</h2>
    <p style="color: #666; font-size: 14px;">Tap an app below to pay. It will open automatically with the exact amount pre-filled.</p>
    
    <div class="amount-display" id="priceDisplay">Amount to Pay: ₹0</div>

    <a href="#" id="paytmIntentLink" class="pay-link paytm-btn" onclick="trackClick()">🚀 Open Paytm Automatically</a>
    <a href="#" id="gpayIntentLink" class="pay-link gpay-btn" onclick="trackClick()">🚀 Open Google Pay Automatically</a>
    
    <button class="cash-btn" onclick="processCashPayment()">💵 Pay with Cash at Counter</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");

    const SHOP_UPI_ID = "paytmqr5oxmd8@ptys"; 
    const SHOP_NAME = "Digital Print Shop";

    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        document.getElementById("priceDisplay").innerText = "Amount to Pay: ₹" + billingAmount;
        
        const note = encodeURIComponent("Order " + (targetOrderId || ""));
        const rawParams = `pa=${SHOP_UPI_ID}&pn=${encodeURIComponent(SHOP_NAME)}&am=${billingAmount}&cu=INR&tn=${note}`;
        
        // Formulate direct trusted hardware intent links natively inside the HTML on page load
        const paytmIntent = `intent://pay?${rawParams}#Intent;scheme=upi;package=net.one97.paytm;end;`;
        const gpayIntent = `intent://pay?${rawParams}#Intent;scheme=upi;package=com.google.android.apps.nbu.paisa.user;end;`;
        
        // Inject links cleanly into the layout tags
        document.getElementById("paytmIntentLink").href = paytmIntent;
        document.getElementById("gpayIntentLink").href = gpayIntent;
    };

    // Updates Supabase status right as they click out to make the payment
    async function trackClick() {
        try {
            if (targetOrderId) {
                await client
                    .from("orders")
                    .update({ payment_status: "Paid" })
                    .eq("id", targetOrderId);
            }
        } catch (err) {
            console.error(err);
        }

        localStorage.setItem("last_payment_method", "Direct Web Anchor Intent Link");

        // Give them a 2-second buffer window to execute PIN before forwarding screen
        setTimeout(() => {
            window.location.href = "success.html";
        }, 2000);
    }

    function processCashPayment() {
        localStorage.setItem("last_payment_method", "Cash");
        window.location.href = "success.html";
    }
</script>
</body>
</html>
