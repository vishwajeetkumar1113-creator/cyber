<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatic UPI Launch</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .amount-display {
            font-size: 26px;
            font-weight: bold;
            color: #1976d2;
            margin: 20px 0;
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #1976d2;
        }
        .pay-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: background 0.2s ease;
        }
        .paytm-btn { background-color: #002e6e; }
        .paytm-btn:hover { background-color: #001f4d; }
        .gpay-btn { background-color: #4285f4; }
        .gpay-btn:hover { background-color: #357ae8; }
        .cash-btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 14px;
            background-color: #85bb65;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Automatic Online Payment</h2>
    <p style="color: #666; font-size: 14px;">Select an app below. It will open automatically with the exact amount pre-filled.</p>
    
    <div class="amount-display" id="priceDisplay">Amount to Pay: ₹0</div>

    <button class="pay-btn paytm-btn" onclick="launchDirectUpiApp('paytm')">🚀 Open Paytm Automatically</button>
    <button class="pay-btn gpay-btn" onclick="launchDirectUpiApp('gpay')">🚀 Open Google Pay Automatically</button>
    
    <button class="cash-btn" onclick="processCashPayment()">💵 Pay with Cash at Counter</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");

    const SHOP_UPI_ID = "paytmqr5oxmd8@ptys"; 
    const SHOP_NAME = "Digital Print Shop";

    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        document.getElementById("priceDisplay").innerText = "Amount to Pay: ₹" + billingAmount;
    };

    // 🌟 DIRECT HIGH-TRUST APP LAUNCHER ENGINE
    async function launchDirectUpiApp(appName) {
        if (billingAmount === "0" || billingAmount === "") {
            alert("Invalid checkout amount.");
            return;
        }

        const note = encodeURIComponent("Order " + (targetOrderId || ""));
        const rawParams = `pa=${SHOP_UPI_ID}&pn=${encodeURIComponent(SHOP_NAME)}&am=${billingAmount}&cu=INR&tn=${note}`;
        
        let intentUrl = "";

        // Force Android to bypass the general selector tray and open the specific app directly
        if (appName === 'paytm') {
            intentUrl = `intent://pay?${rawParams}#Intent;scheme=upi;package=net.one97.paytm;end;`;
        } else if (appName === 'gpay') {
            intentUrl = `intent://pay?${rawParams}#Intent;scheme=upi;package=com.google.android.apps.nbu.paisa.user;end;`;
        }

        // Instantly mark as paid in the database so the printer catches it
        try {
            if (targetOrderId) {
                await client
                    .from("orders")
                    .update({ payment_status: "Paid" })
                    .eq("id", targetOrderId);
            }
        } catch (err) {
            console.error(err);
        }

        localStorage.setItem("last_payment_method", "Auto App Launch (" + appName + ")");

        // Check if user is on mobile
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobile) {
            window.location.href = intentUrl;
        } else {
            window.location.href = "success.html";
        }

        // Failsafe redirect to success page
        setTimeout(() => {
            window.location.href = "success.html";
        }, 1500);
    }

    function processCashPayment() {
        localStorage.setItem("last_payment_method", "Cash");
        window.location.href = "success.html";
    }
</script>
</body>
</html>
