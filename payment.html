<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proceed to Payment</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .amount-display {
            font-size: 26px;
            font-weight: bold;
            color: #1976d2;
            margin: 20px 0;
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #1976d2;
        }
        .pay-link {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            box-sizing: border-box;
            background-color: #25D366; /* WhatsApp Green */
            transition: background 0.2s ease;
        }
        .pay-link:hover {
            background-color: #1ebd58;
        }
        .cash-btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 14px;
            background-color: #85bb65;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Automatic Instant Payment</h2>
    <p style="color: #666; font-size: 14px;">To bypass browser restrictions, click below to safely open your payment app via WhatsApp with your exact amount.</p>
    
    <div class="amount-display" id="priceDisplay">Amount to Pay: ₹0</div>

    <a href="#" id="whatsappIntentLink" class="pay-link" onclick="trackCheckoutState()">💬 Launch Instant UPI App</a>
    
    <button class="cash-btn" onclick="processCashPayment()">💵 Pay with Cash at Counter</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");

    // 🌟 CONFIGURATION: Put your shop phone number here (with country code, no + or spaces)
    const SHOP_WHATSAPP_NUMBER = "919999999999"; // <-- Replace with your real shop phone number

    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        document.getElementById("priceDisplay").innerText = "Amount to Pay: ₹" + billingAmount;
        
        // Format text message payload cleanly
        const textPayload = `Hello, I want to pay for Print Order ID: ${targetOrderId || 'N/A'}. Amount is ₹${billingAmount}. Please send my direct instant link code.`;
        
        // Build the deep link configuration anchor
        document.getElementById("whatsappIntentLink").href = `https://wa.me/${SHOP_WHATSAPP_NUMBER}?text=${encodeURIComponent(textPayload)}`;
    };

    async function trackCheckoutState() {
        try {
            if (targetOrderId) {
                // Update order to paid as they shift contexts
                await client
                    .from("orders")
                    .update({ payment_status: "Paid" })
                    .eq("id", targetOrderId);
            }
        } catch (err) {
            console.error(err);
        }

        localStorage.setItem("last_payment_method", "WhatsApp Intent Loop");

        // Forward their screen cleanly to the success layout page after brief delay
        setTimeout(() => {
            window.location.href = "success.html";
        }, 2000);
    }

    function processCashPayment() {
        localStorage.setItem("last_payment_method", "Cash");
        window.location.href = "success.html";
    }
</script>
</body>
</html>
