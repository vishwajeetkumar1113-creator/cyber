<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Automatic Payment</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .amount-display {
            font-size: 26px;
            font-weight: bold;
            color: #1976d2;
            margin: 20px 0;
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #1976d2;
        }
        .auto-pay-btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            background: linear-gradient(135deg, #28a745, #1e7e34);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .auto-pay-btn:active {
            transform: scale(0.98);
            box-shadow: none;
        }
        .cash-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            font-size: 14px;
            background-color: #85bb65;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Automatic Instant Checkout</h2>
    <p style="color: #666; font-size: 14px;">Tap below to launch your UPI app automatically with the exact amount pre-filled.</p>
    
    <div class="amount-display" id="priceDisplay">Amount to Pay: ₹0</div>

    <a href="#" id="directUpiIntentButton" class="auto-pay-btn" onclick="syncAndRedirect(event)">⚡ PAY NOW (Open UPI App)</a>
    
    <button class="cash-btn" onclick="processCashPayment()">💵 Pay with Cash at Counter</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");

    // Using your verified business merchant handle
    const SHOP_UPI_ID = "paytmqr5oxmd8@ptys"; 
    const SHOP_NAME = "Digital Print Shop";

    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        document.getElementById("priceDisplay").innerText = "Amount to Pay: ₹" + billingAmount;
        
        const note = encodeURIComponent("Order " + (targetOrderId || ""));
        
        // 🌟 THE BULLETPROOF WAY: Standard parameters sent as a raw native app scheme string
        const nativeUpiScheme = `upi://pay?pa=${SHOP_UPI_ID}&pn=${encodeURIComponent(SHOP_NAME)}&am=${billingAmount}&cu=INR&tn=${note}`;
        
        // Inject directly into the link before the user interacts with the device screen
        document.getElementById("directUpiIntentButton").href = nativeUpiScheme;
    };

    // Updates Supabase table data fields right as the customer taps out to pay
    async function syncAndRedirect(e) {
        try {
            if (targetOrderId) {
                // Instantly update status to Paid so your admin.html panel catches the event queue live
                await client
                    .from("orders")
                    .update({ payment_status: "Paid" })
                    .eq("id", targetOrderId);
            }
        } catch (err) {
            console.error("Database tracking link failed: ", err);
        }

        localStorage.setItem("last_payment_method", "Direct Automatic Intent Scheme");

        // Give the device 1.5 seconds to pass context to the banking layout before cleaning the current tab window
        setTimeout(() => {
            window.location.href = "success.html";
        }, 1500);
    }

    function processCashPayment() {
        localStorage.setItem("last_payment_method", "Cash");
        window.location.href = "success.html";
    }
</script>
</body>
</html>
