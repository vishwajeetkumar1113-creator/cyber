<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Select Payment Method</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .payment-container {
            max-width: 450px;
            width: 100%;
            padding: 30px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
        }

        h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .amount-display {
            font-size: 28px;
            font-weight: bold;
            color: #1976d2;
            margin: 20px 0;
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #1976d2;
        }

        .pay-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
        }

        .rzp-btn {
            color: white;
            background: #3399cc;
            box-shadow: 0 4px 12px rgba(51, 153, 204, 0.3);
        }

        .rzp-btn:hover {
            background: #287a9e;
        }

        .cash-btn {
            color: white;
            background-color: #28a745;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.25);
        }

        .cash-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Select Payment Method</h2>
    <p style="color: #666; font-size: 14px;">Choose how you want to pay for your print order.</p>
    
    <div class="amount-display" id="priceDisplay">Amount to Pay: ₹0</div>

    <button class="pay-btn rzp-btn" onclick="openCashfreeCheckout(event)">💳 PAY ONLINE NOW</button>
    
    <button class="pay-btn cash-btn" onclick="processCashPayment(event)">💵 PAY WITH CASH AT COUNTER</button>
</div>

<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");

    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Initialize Cashfree Instance Profile Interface
    // ⚠️ Remember to change "sandbox" string to "production" when using your live active tokens
    const cashfree = Cashfree({ mode: "sandbox" }); 

    window.onload = function() {
        document.getElementById("priceDisplay").innerText = "Amount to Pay: ₹" + billingAmount;
    };

    // 🌐 ONLINE PAYMENT ENGINE (CASHFREE INTEGRATION)
    async function openCashfreeCheckout(e) {
        e.preventDefault();

        if (billingAmount === "0" || billingAmount === "") {
            alert("Invalid order amount profile.");
            return;
        }

        try {
            /* ⚠️ SERVER-SIDE BACKEND SESSION HOOK REFERENCE NOTE:
              Cashfree requests require a server endpoint execution layer to pass a secure payment token down.
              Replace the placeholder key string below with your generated backend response object mapping variables.
            */
            const paymentSessionId = "YOUR_CASHFREE_PAYMENT_SESSION_ID"; 

            if (paymentSessionId === "YOUR_CASHFREE_PAYMENT_SESSION_ID") {
                alert("Configuration Needed: Please paste your dynamic secure Cashfree backend paymentSessionId inside this code routine context block.");
                return;
            }

            // Launch the overlay modal directly inside the current active window view
            let checkoutOptions = {
                paymentSessionId: paymentSessionId,
                redirectTarget: "_self" 
            };
            
            cashfree.checkout(checkoutOptions).then(function(result) {
                if(result.error) {
                    console.error("Cashfree operational execution interrupt logged:", result.error);
                    alert("Gateway Notification: " + result.error.message);
                }
            });

        } catch (gatewayErr) {
            console.error("Cashfree initialization interface failure profile:", gatewayErr);
            alert("Unable to route layout transaction values down into Cashfree systems.");
        }
    }

    // 🏦 CASH AT COUNTER REGISTRATION FLOW
    async function processCashPayment(e) {
        e.preventDefault();
        
        try {
            if (targetOrderId) {
                // Keep the exact verified column name structure 'payment_status'
                await client
                    .from("orders")
                    .update({ payment_status: "Cash Payment Pending" })
                    .eq("id", targetOrderId);
            }
        } catch (dbError) {
            console.error("Database tracker update error:", dbError);
        }

        localStorage.setItem("last_payment_method", "Cash Counter");
        window.location.href = "cash.html";
    }
</script>
</body>
</html>
