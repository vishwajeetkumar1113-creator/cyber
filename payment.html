<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatic Payment Engine</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .amount-display {
            font-size: 26px;
            font-weight: bold;
            color: #1976d2;
            margin: 15px 0;
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #1976d2;
        }
        .qr-wrapper img {
            width: 240px;
            height: 240px;
            display: block;
            margin: 0 auto;
        }
        .status-box {
            margin-top: 15px;
            padding: 10px;
            background: #fff3cd;
            color: #856404;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Scan & Pay to Print</h2>
    <div class="amount-display" id="priceDisplay">Amount to Pay: ₹0</div>

    <div class="qr-wrapper">
        <img id="upiQrImage" src="" alt="Generating QR Code...">
    </div>

    <div class="status-box" id="statusMessage">
        ⏳ Waiting for your payment... Do not close this page.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");

    const SHOP_UPI_ID = "paytmqr5oxmd8@ptys"; 
    const SHOP_NAME = "Digital Print Shop";

    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        document.getElementById("priceDisplay").innerText = "Amount to Pay: ₹" + billingAmount;
        
        const note = encodeURIComponent("OrderID_" + (targetOrderId || ""));
        const upiString = `upi://pay?pa=${SHOP_UPI_ID}&pn=${encodeURIComponent(SHOP_NAME)}&am=${billingAmount}&cu=INR&tn=${note}`;
        
        document.getElementById("upiQrImage").src = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(upiString)}`;

        // Start checking the database automatically every 3 seconds to see if the phone caught the payment
        setInterval(checkPaymentStatus, 3000);
    };

    async function checkPaymentStatus() {
        if (!targetOrderId) return;

        const { data, error } = await client
            .from("orders")
            .select("payment_status")
            .eq("id", targetOrderId)
            .single();

        if (data && data.payment_status === "Paid") {
            document.getElementById("statusMessage").innerHTML = "🎉 Payment Verified! Redirecting...";
            document.getElementById("statusMessage").style.background = "#d4edda";
            document.getElementById("statusMessage").style.color = "#155724";
            
            setTimeout(() => {
                window.location.href = "success.html";
            }, 1500);
        }
    }
</script>
</body>
</html>
