<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Payment Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .status-card {
            background: #ffffff;
            max-width: 450px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            transition: all 0.4s ease;
        }

        .status-icon-pending {
            width: 80px;
            height: 80px;
            background-color: #fff3cd;
            color: #856404;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px auto;
            border: 3px solid #ffeeba;
        }

        .title-pending {
            color: #856404;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .status-card.success-active {
            border-top: 8px solid #28a745;
        }

        .status-icon-success {
            width: 80px;
            height: 80px;
            background-color: #d4edda;
            color: #155724;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px auto;
            border: 3px solid #c3e6cb;
            display: none;
        }

        .title-success {
            color: #155724;
            font-size: 24px;
            margin-bottom: 10px;
            display: none;
        }

        .message {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-new-order {
            display: block;
            width: 100%;
            background-color: #1976d2;
            color: white;
            text-decoration: none;
            padding: 14px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(25, 118, 210, 0.2);
            transition: background 0.2s ease;
        }

        .btn-new-order:hover {
            background-color: #1565c0;
        }
    </style>
</head>
<body>

<div class="status-card" id="statusCard">
    <div id="pendingArea">
        <div class="status-icon-pending">⏳</div>
        <h2 class="title-pending">Payment is Pending</h2>
    </div>

    <div id="successArea">
        <div class="status-icon-success" id="successIcon">✓</div>
        <h2 class="title-success" id="successTitle">Payment Successfully Done</h2>
    </div>

    <p class="message" id="statusMessage">Please visit the shop counter now to pay cash. Keep this window open; it updates automatically the moment your bill is settled.</p>

    <a href="index.html" class="btn-new-order">➕ Add New Order</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const currentOrderId = localStorage.getItem("current_order_id");

    window.onload = function() {
        if (!currentOrderId) {
            console.warn("No active order ID found in storage.");
            return;
        }
        
        // Check current database status immediately in case it was already updated
        checkCurrentStatus();
        
        // Start live realtime listening stream
        listenForAdminPaymentApproval();
    };

    // 🌟 New: Instantly checks status if they refresh the page
    async function checkCurrentStatus() {
        const { data, error } = await client
            .from("orders")
            .select("payment_status")
            .eq("id", currentOrderId)
            .single();

        if (data) {
            const currentStatus = (data.payment_status || '').toLowerCase().trim();
            if (currentStatus === 'paid' || currentStatus === 'success' || currentStatus === 'completed') {
                showPaymentSuccessScreen();
            }
        }
    }

    // 🌟 Fixed: Broader real-time event capture logic
    function listenForAdminPaymentApproval() {
        client
            .channel('cash-status-stream')
            .on('postgres_changes', { 
                event: 'UPDATE', 
                schema: 'public', 
                table: 'orders',
                filter: `id=eq.${currentOrderId}`
            }, payload => {
                console.log("Realtime status change received:", payload.new.payment_status);
                const updatedStatus = (payload.new.payment_status || '').toLowerCase().trim();
                
                if (updatedStatus === 'paid' || updatedStatus === 'success' || updatedStatus === 'completed') {
                    showPaymentSuccessScreen();
                }
            })
            .subscribe();
    }

    function showPaymentSuccessScreen() {
        document.getElementById("pendingArea").style.display = "none";
        
        document.getElementById("successIcon").style.display = "flex";
        document.getElementById("successTitle").style.display = "block";
        document.getElementById("statusCard").classList.add("success-active");
        
        document.getElementById("statusMessage").innerText = "Thank you! Your cash payment has been processed and your print files are sent directly to the machine queue.";
        document.getElementById("statusMessage").style.color = "#155724";
    }
</script>
</body>
</html>
