<!DOCTYPE html>
<html>

<head>
    <title>Payment Success</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
        }

        .card {
            max-width: 450px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .success {
            color: green;
            font-size: 50px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            background: #1976d2;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: #125ea7;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="success">✓</div>

    <h2>Payment Successful</h2>

    <p>Your document has been received.</p>

    <p>Your payment was completed successfully.</p>

    <h3 id="paymentId"></h3>

    <p>Please wait while your document is printed.</p>

    <a href="index.html">
        New Order
    </a>

</div>

<script>

const paymentId =
    localStorage.getItem("payment_id");

if (paymentId) {
    document.getElementById("paymentId").innerHTML =
        "Payment ID: " + paymentId;
}

</script>

</body>

</html>
