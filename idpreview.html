<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>A4 Card Print Preview</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
            min-height: 100%;
            overflow-y: auto; 
            overflow-x: hidden;
        }

        .page {
            width: 210mm;
            height: 297mm;
            background: white;
            margin: 10mm auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
        }

        .print-container {
            display: flex;
            box-sizing: border-box;
            width: 100%;
        }

        /* 🌟 DUAL CARD POSITIONING: Sets front side to top-left and back side to top-right layout */
        .print-container.two-sided-layout {
            flex-direction: row;
            justify-content: flex-start;
            align-items: flex-start;
            gap: 10mm; 
            padding-top: 20mm; 
            padding-left: 15mm; 
        }

        /* 🌟 PAN POSITIONING: Places a single card directly in top-middle orientation */
        .print-container.single-sided-layout {
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; 
            padding-top: 40mm;
        }

        .card-img {
            width: 85.6mm;
            height: 54mm;
            object-fit: fill;
            border: 1px solid #000;
            border-radius: 2mm;
            display: block;
        }

        /* FORCE GRAYSCALE OVERRIDE ENGINE */
        .print-container.bw-mode,
        .print-container.bw-mode .card-img,
        .print-container.bw-mode canvas,
        .print-container.bw-mode img {
            filter: grayscale(100%) contrast(125%) brightness(100%) !important;
        }

        .no-print-bar {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .action-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        @media print {
            body, html { background: white; overflow: visible !important; }
            .no-print-bar { display: none !important; }
            .page { margin: 0 !important; box-shadow: none !important; width: 210mm; height: 297mm; }
            @page { size: portrait; margin: 0; }
            .print-container.bw-mode { filter: grayscale(100%) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>

<body>

<div class="no-print-bar">
    <button class="action-btn" onclick="window.print()">🖨️ Print Document (A4 Portrait)</button>
</div>

<div class="page">
    <div class="print-container" id="printContainer">
        <img id="frontCardImg" class="card-img" style="display:none;" alt="Front View">
        <img id="backCardImg" class="card-img" style="display:none;" alt="Back View">
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    
    // Clean string component decoding 
    const frontUrl = decodeURIComponent(urlParams.get('front') || '');
    const backUrl = decodeURIComponent(urlParams.get('back') || '');
    const printTypeSummary = decodeURIComponent(urlParams.get('summary') || ''); 

    const frontImgEl = document.getElementById('frontCardImg');
    const backImgEl = document.getElementById('backCardImg');
    const printContainer = document.getElementById('printContainer');

    if (frontUrl && frontUrl !== "null" && frontUrl.trim() !== "") {
        frontImgEl.src = frontUrl;
        frontImgEl.style.display = "block";
    }

    if (backUrl && backUrl !== "null" && backUrl.trim() !== "") {
        backImgEl.src = backUrl;
        backImgEl.style.display = "block";
    }

    // Dynamic layout controller evaluation
    if (backUrl && backUrl !== "null" && backUrl.trim() !== "") {
        printContainer.classList.add('two-sided-layout');
    } else {
        printContainer.classList.add('single-sided-layout');
        backImgEl.style.display = "none";
    }

    // Strict color channel filter verification
    if (
        printTypeSummary.toLowerCase().includes('black') || 
        printTypeSummary.toLowerCase().includes('b&w') || 
        frontUrl.toLowerCase().includes('_bw_') || 
        frontUrl.toLowerCase().includes('/bw_')
    ) {
        printContainer.classList.add('bw-mode');
    }
</script>
</body>
</html>
