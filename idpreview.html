<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>A4 Print Preview (PAN Card Layout)</title>
    <style>
        /* A4 Page Formatting Rules with Scrolling Enabled */
        html, body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
            min-height: 100%;
            overflow-y: auto; 
            overflow-x: hidden;
        }

        .page {
            width: 210mm;
            height: 297mm;
            background: white;
            margin: 10mm auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
        }

        /* 🌟 FIX: Center layout structure perfectly positioning single items in top-middle */
        .print-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; /* Centers the card horizontally on the A4 page */
            gap: 20px;
            padding-top: 40mm; /* Sets the precise gap from the top of the sheet */
            width: 100%;
            box-sizing: border-box;
        }

        /* Standard CR-80 Document Print Proportions */
        .card-img {
            width: 85.6mm;
            height: 54mm;
            object-fit: fill;
            border: 1px solid #000;
            border-radius: 2mm;
            display: block;
        }

        /* Controls Panel Layer (Hidden during physical print calls) */
        .no-print-bar {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .action-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #218838;
        }

        /* Screen optimization for mobile displays */
        @media (max-width: 215mm) {
            .page {
                margin: 5px auto !important;
                width: 95vw !important;
                height: auto !important;
                min-height: 135vw !important;
                padding: 10px !important;
            }
            .card-img {
                width: 80vw !important;
                height: 50.5vw !important;
            }
        }

        @media print {
            body, html {
                background: white;
                overflow: visible !important;
            }
            .no-print-bar {
                display: none !important;
            }
            .page {
                margin: 0 !important;
                box-shadow: none !important;
                width: 210mm;
                height: 297mm;
                page-break-after: avoid;
                page-break-before: avoid;
            }
            
            .card-img {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="no-print-bar">
    <button class="action-btn" onclick="window.print()">🖨️ Print Now (A4 Sheet)</button>
</div>

<div class="page">
    <div class="print-container" id="printContainer">
        <img id="frontCardImg" class="card-img" style="display:none;" alt="Front Card Side">
        <img id="backCardImg" class="card-img" style="display:none;" alt="Back Card Side">
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const frontUrl = urlParams.get('front');
    const backUrl = urlParams.get('back');
    const layoutMode = urlParams.get('layout');

    const frontImgEl = document.getElementById('frontCardImg');
    const backImgEl = document.getElementById('backCardImg');
    const printContainer = document.getElementById('printContainer');

    if (frontUrl) {
        frontImgEl.src = frontUrl;
        frontImgEl.style.display = "block";
    }

    // Load back side image if it exists in data payload metrics
    if (backUrl && backUrl !== "null" && backUrl.trim() !== "") {
        backImgEl.src = backUrl;
        backImgEl.style.display = "block";
    }

    // Handles dynamic layout structural updates for single documents cleanly
    if (layoutMode === 'top-center' || !backUrl || backUrl === "null" || backUrl.trim() === "") {
        backImgEl.style.display = "none";
    }
</script>

</body>
</html>
