<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>A4 Print Preview</title>
    <style>
        /* A4 Page Formatting Rules with Scrolling Enabled */
        html, body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
            min-height: 100%;
            overflow-y: auto; 
            overflow-x: hidden;
        }

        /* Base Page Styles (Default Portrait) */
        .page {
            width: 210mm;
            height: 297mm;
            background: white;
            margin: 10mm auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
        }

        /* Dynamic Landscape Class for Preview Sheet Adjustment */
        .page.landscape-mode {
            width: 297mm !important;
            height: 210mm !important;
        }

        /* Flexible Print Container Elements Layout Setup */
        .print-container {
            display: flex;
            box-sizing: border-box;
            width: 100%;
            gap: 10mm; 
            padding-top: 20mm; 
        }

        /* Default Portrait Class Rules (Single card center-top) */
        .print-container.portrait-layout {
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; 
            padding-top: 40mm;
        }

        /* Dynamic Landscape Class Layout Rules (Side-by-side card structure) */
        .print-container.landscape-layout {
            flex-direction: row;
            justify-content: flex-start;
            align-items: flex-start;
            padding-left: 20mm;
        }

        /* Standard CR-80 Printed Document Size Scaling Bounds */
        .card-img {
            width: 85.6mm;
            height: 54mm;
            object-fit: fill;
            border: 1px solid #000;
            border-radius: 2mm;
            display: block;
        }

        /* FIXED FORCE GRAYSCALE: Applies true grayscale filter layout to everything if active */
        .print-container.bw-mode,
        .print-container.bw-mode .card-img,
        .print-container.bw-mode iframe,
        .print-container.bw-mode canvas,
        .print-container.bw-mode img {
            filter: grayscale(100%) contrast(125%) brightness(100%) !important;
        }

        /* Controls Panel Layer (Hidden during physical print calls) */
        .no-print-bar {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .action-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #218838;
        }

        /* Screen optimization for mobile displays */
        @media (max-width: 215mm) {
            .page {
                margin: 5px auto !important;
                width: 95vw !important;
                height: auto !important;
                min-height: 135vw !important;
                padding: 10px !important;
            }
            .print-container {
                flex-direction: column !important;
                align-items: center !important;
                padding-left: 0 !important;
                gap: 15px !important;
            }
            .card-img {
                width: 80vw !important;
                height: 50.5vw !important;
            }
        }

        @media print {
            body, html {
                background: white;
                overflow: visible !important;
            }
            .no-print-bar {
                display: none !important;
            }
            .page {
                margin: 0 !important;
                box-shadow: none !important;
                page-break-after: avoid;
                page-break-before: avoid;
            }
            
            .page.portrait-mode-print {
                width: 210mm;
                height: 297mm;
            }
            
            .page.landscape-mode-print {
                width: 297mm;
                height: 210mm;
            }

            .card-img {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .print-container.bw-mode {
                filter: grayscale(100%) !important;
                -webkit-filter: grayscale(100%) !important;
            }
        }
    </style>
</head>

<body>

<div class="no-print-bar">
    <button class="action-btn" onclick="window.print()">🖨️ Print Now (A4 Sheet)</button>
</div>

<div class="page" id="pageElement">
    <div class="print-container" id="printContainer">
        <img id="frontCardImg" class="card-img" style="display:none;" alt="Front Card Side">
        <img id="backCardImg" class="card-img" style="display:none;" alt="Back Card Side">
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    
    // 🌟 FIX: Use decodeURIComponent to cleanly unpack raw text parameters passed from the dashboard layout links
    const frontUrl = decodeURIComponent(urlParams.get('front') || '');
    const backUrl = decodeURIComponent(urlParams.get('back') || '');
    const layoutMode = urlParams.get('layout'); 
    const printTypeSummary = urlParams.get('summary') || ''; 

    const frontImgEl = document.getElementById('frontCardImg');
    const backImgEl = document.getElementById('backCardImg');
    const printContainer = document.getElementById('printContainer');
    const pageElement = document.getElementById('pageElement');

    if (frontUrl && frontUrl !== "null" && frontUrl.trim() !== "") {
        frontImgEl.src = frontUrl;
        frontImgEl.style.display = "block";
    }

    if (backUrl && backUrl !== "null" && backUrl.trim() !== "") {
        backImgEl.src = backUrl;
        backImgEl.style.display = "block";
    }

    if (
        printTypeSummary.toLowerCase().includes('black') || 
        printTypeSummary.toLowerCase().includes('b&w') || 
        frontUrl.toLowerCase().includes('_bw_') || 
        frontUrl.toLowerCase().includes('/bw_') ||
        backUrl.toLowerCase().includes('_bw_') ||
        backUrl.toLowerCase().includes('/bw_')
    ) {
        printContainer.classList.add('bw-mode');
    }

    // Dynamic Orientation Selector Engine
    if (layoutMode === 'landscape') {
        pageElement.classList.add('landscape-mode', 'landscape-mode-print');
        printContainer.classList.add('landscape-layout');
        
        const style = document.createElement('style');
        style.innerHTML = '@media print { @page { size: landscape; margin: 0; } }';
        document.head.appendChild(style);
    } else {
        pageElement.classList.add('portrait-mode-print');
        printContainer.classList.add('portrait-layout');
        
        const style = document.createElement('style');
        style.innerHTML = '@media print { @page { size: portrait; margin: 0; } }';
        document.head.appendChild(style);
        
        if (layoutMode === 'top-center' || !backUrl || backUrl === "null" || backUrl.trim() === "") {
            backImgEl.style.display = "none";
        }
    }
</script>

</body>
</html>
