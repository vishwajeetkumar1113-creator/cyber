<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>A4 Print Preview</title>
    <style>
        /* A4 Page Formatting Rules */
        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .page {
            width: 210mm;
            height: 297mm;
            background: white;
            margin: 10mm auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
        }

        /* Default layout styling for standard double-sided prints */
        .print-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding-top: 40mm; /* Positions card objects inside upper print thresholds */
            width: 100%;
            box-sizing: border-box;
        }

        .card-img {
            width: 85.6mm;
            height: 54mm;
            object-fit: fill;
            border: 1px solid #000;
            border-radius: 2mm;
            display: block;
        }

        /* Controls Panel Layer (Hidden during physical print calls) */
        .no-print-bar {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .action-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #218838;
        }

        @media print {
            body {
                background: white;
            }
            .no-print-bar {
                display: none !important;
            }
            .page {
                margin: 0 !important;
                box-shadow: none !important;
                width: 210mm;
                height: 297mm;
            }
        }
    </style>
</head>
<body>

<div class="no-print-bar">
    <button class="action-btn" onclick="window.print()">🖨️ Print Now (A4 Sheet)</button>
</div>

<div class="page">
    <div class="print-container" id="printContainer">
        <img id="frontCardImg" class="card-img" style="display:none;" alt="Front Card Side">
        <img id="backCardImg" class="card-img" style="display:none;" alt="Back Card Side">
    </div>
</div>

<script>
    // Read the explicit image URLs and layout queries from address params
    const urlParams = new URLSearchParams(window.location.search);
    const frontUrl = urlParams.get('front');
    const backUrl = urlParams.get('back');
    const layoutMode = urlParams.get('layout');

    const frontImgEl = document.getElementById('frontCardImg');
    const backImgEl = document.getElementById('backCardImg');
    const printContainer = document.getElementById('printContainer');

    // Populate and structure image fields based on input metrics
    if (frontUrl) {
        frontImgEl.src = frontUrl;
        frontImgEl.style.display = "block";
    }

    if (backUrl && backUrl !== "null" && backUrl.trim() !== "") {
        backImgEl.src = backUrl;
        backImgEl.style.display = "block";
    }

    // TOP-CENTERED PAN CARD LAYOUT CONFIGURATION RULE
    if (layoutMode === 'top-center' || !backUrl || backUrl === "null" || backUrl.trim() === "") {
        // Center the single card horizontally at the top portion of the page canvas
        printContainer.style.display = "flex";
        printContainer.style.justifyContent = "center";
        printContainer.style.alignItems = "center";
        printContainer.style.paddingTop = "25mm"; // Standard top-middle alignment matching rule
        
        // Ensure the back card frame remains hidden
        backImgEl.style.display = "none";
    }
</script>

</body>
</html>
