<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>ID Card Print</title>

<link rel="stylesheet"
      href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="card">

    <h2>ID Card Print</h2>

    <input type="text"
           id="name"
           placeholder="Customer Name"
           required>

    <input type="tel"
           id="mobile"
           placeholder="Mobile Number"
           required>

    <h3>Front Side</h3>

    <input type="file"
           id="frontFile"
           accept="image/*">

    <div class="crop-box">
        <img id="frontImage">
    </div>

    <div class="controls">

        <button type="button"
                onclick="rotate()">
            ↺ Rotate
        </button>

        <button type="button"
                onclick="rotateRight()">
            ↻ Rotate
        </button>

        <button type="button"
                onclick="zoomIn()">
            ＋ Zoom
        </button>

        <button type="button"
                onclick="zoomOut()">
            － Zoom
        </button>

        <button type="button"
                onclick="saveFront()">
            Save Front
        </button>

    </div>

    <hr>

    <h3>Back Side</h3>

    <input type="file"
           id="backFile"
           accept="image/*">

    <div class="crop-box">
        <img id="backImage">
    </div>

    <div class="controls">

        <button type="button"
                onclick="rotateBack()">
            ↺ Rotate
        </button>

        <button type="button"
                onclick="rotateRightBack()">
            ↻ Rotate
        </button>

        <button type="button"
                onclick="zoomInBack()">
            ＋ Zoom
        </button>

        <button type="button"
                onclick="zoomOutBack()">
            － Zoom
        </button>

        <button type="button"
                onclick="saveBack()">
            Save Back
        </button>

    </div>

    <br>

    <button onclick="submitID()">
        Submit
    </button>

</div>

<script>

const SUPABASE_URL =
    "https://irqlvuphoblgjqysteto.supabase.co";

const SUPABASE_KEY =
    "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";

const client =
    window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );

let frontCropper;
let backCropper;

let frontBlob;
let backBlob;
      const AI_API =
    "https://ai-cleaner-e8vk.onrender.com/upload";

/* FRONT */

document.getElementById(
    "frontFile"
).addEventListener(
    "change",
    function(e){

    const file =
        e.target.files[0];

    const reader =
        new FileReader();

    reader.onload =
        function(event){

        const img =
            document.getElementById(
                "frontImage"
            );

        img.src =
            event.target.result;

        if(frontCropper){
            frontCropper.destroy();
        }

        frontCropper =
            new Cropper(
                img,
                {
                    aspectRatio:1.58,
                    viewMode:1,
                    autoCropArea:1
                }
            );
    };

    reader.readAsDataURL(file);

});

/* BACK */

document.getElementById(
    "backFile"
).addEventListener(
    "change",
    function(e){

    const file =
        e.target.files[0];

    const reader =
        new FileReader();

    reader.onload =
        function(event){

        const img =
            document.getElementById(
                "backImage"
            );

        img.src =
            event.target.result;

        if(backCropper){
            backCropper.destroy();
        }

        backCropper =
            new Cropper(
                img,
                {
                    aspectRatio:1.58,
                    viewMode:1,
                    autoCropArea:1
                }
            );
    };

    reader.readAsDataURL(file);

});

/* FRONT CONTROLS */

function rotate(){
    frontCropper.rotate(-90);
}

function rotateRight(){
    frontCropper.rotate(90);
}

function zoomIn(){
    frontCropper.zoom(0.1);
}

function zoomOut(){
    frontCropper.zoom(-0.1);
}

/* BACK CONTROLS */

function rotateBack(){
    backCropper.rotate(-90);
}

function rotateRightBack(){
    backCropper.rotate(90);
}

function zoomInBack(){
    backCropper.zoom(0.1);
}

function zoomOutBack(){
    backCropper.zoom(-0.1);
}

/* SAVE */

function saveFront(){

    frontCropper
    .getCroppedCanvas()
    .toBlob(
        async function(blob){

            frontBlob =
                new File(
                    [blob],
                    "front.jpg",
                    {
                        type: "image/jpeg"
                    }
                );

            await uploadToAI(
                frontBlob
            );

            alert(
                "Front side saved."
            );
        }
    );
}

function saveBack(){

    backCropper
    .getCroppedCanvas()
    .toBlob(
        async function(blob){

            backBlob =
                new File(
                    [blob],
                    "back.jpg",
                    {
                        type: "image/jpeg"
                    }
                );

            await uploadToAI(
                backBlob
            );

            alert(
                "Back side saved."
            );
        }
    );

}

async function uploadToAI(file){

    const formData = new FormData();

    formData.append(
        "image",
        file
    );

    try{

        const response =
            await fetch(
                AI_API,
                {
                    method: "POST",
                    body: formData
                }
            );

        const result =
            await response.json();

        console.log(
            "AI Result:",
            result
        );

        return result;

    }catch(error){

        console.log(error);

        alert(
            "AI server not responding."
        );

        return null;
    }
}

   

/* SUBMIT */

async function submitID(){

    const name =
        document.getElementById(
            "name"
        ).value.trim();

    const mobile =
        document.getElementById(
            "mobile"
        ).value.trim();

    if(name === ""){
        alert("Enter customer name.");
        return;
    }

    if(mobile === ""){
        alert("Enter mobile number.");
        return;
    }

    if(!frontBlob){
        alert("Save front side first.");
        return;
    }

    if(!backBlob){
        alert("Save back side first.");
        return;
    }

    const frontName =
        Date.now() + "_front.jpg";

    const backName =
        Date.now() + "_back.jpg";

   const frontUpload =
    await client.storage
    .from("documents")
    .upload(
        frontName,
        frontBlob,
        {
            contentType: "image/jpeg",
            upsert: true
        }
    );

console.log(frontUpload);

if(frontUpload.error){
    alert(frontUpload.error.message);
    console.log(frontUpload.error);
    return;
}

    const backUpload =
    await client.storage
    .from("documents")
    .upload(
        backName,
        backBlob,
        {
            contentType: "image/jpeg",
            upsert: true
        }
    );

console.log(backUpload);

if(backUpload.error){
    alert(backUpload.error.message);
    console.log(backUpload.error);
    return;
}

    const frontUrl =
        client.storage
        .from("documents")
        .getPublicUrl(frontName)
        .data.publicUrl;

    const backUrl =
        client.storage
        .from("documents")
        .getPublicUrl(backName)
        .data.publicUrl;

    const { error } =
        await client
        .from("orders")
        .insert([
            {
                customer_name: name,
                mobile: mobile,
                print_type: "ID Card",
                pages: 1,
                amount: 20,
                front_url: frontUrl,
                back_url: backUrl,
                payment_status: "Pending",
                payment_id: ""
            }
        ]);

    if(error){
        alert(error.message);
        return;
    }

localStorage.setItem(
    "frontImage",
    frontUrl
);

localStorage.setItem(
    "backImage",
    backUrl
);

localStorage.setItem(
    "amount",
    5
);

localStorage.setItem(
    "printType",
    "id"
);

window.location.href =
    "payment.html";
}

</script>

</body>
</html>
