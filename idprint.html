<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Print (Perspective Tool)</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .canvas-container {
            position: relative;
            margin: 15px auto;
            width: 100%;
            max-width: 400px;
            background: #f5f5f5;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }
        
        .exit-fullscreen-btn {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .exit-fullscreen-btn:hover {
            background: #dc3545;
        }

        .fullscreen-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 100000;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        .fullscreen-controls button {
            width: auto;
            min-width: 100px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
        }
        
        .canvas-container:fullscreen {
            max-width: 100vw !important;
            width: 100vw !important;
            height: 100vh !important;
            background: #111 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 0;
            margin: 0;
        }
        
        .canvas-container:fullscreen .exit-fullscreen-btn { display: block; }
        .canvas-container:fullscreen .fullscreen-controls { display: flex; }
        
        .canvas-container:fullscreen canvas {
            width: auto !important;
            height: auto !important;
            max-width: 100% !important;
            max-height: 80vh !important;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        .instructions {
            font-size: 13px;
            color: #555;
            text-align: center;
            margin-bottom: 5px;
        }
        .side-preview {
            margin: 15px auto;
            text-align: center;
            display: none;
        }
        .side-preview img {
            width: 180px;
            height: 114px;
            object-fit: contain;
            border: 2px dashed #28a745;
            border-radius: 6px;
            background: #fff;
            padding: 2px;
        }
        .side-preview p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: #28a745;
            font-weight: bold;
        }
        .input-group {
            margin-top: 10px;
            margin-bottom: 15px;
        }
        .input-group label {
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>ID Card Print</h2>

    <input type="text" id="name" placeholder="Customer Name" required>
    <input type="tel" id="mobile" placeholder="Mobile Number" required>

    <h3>Front Side</h3>
    <p class="instructions">Use mouse wheel or pinch to zoom. Drag corners to crop.</p>
    <input type="file" id="frontFile" accept="image/*">
    
    <div class="canvas-container" id="frontContainer">
        <button type="button" class="exit-fullscreen-btn" onclick="closeFullscreen()">✕ Exit Fullscreen</button>
        <canvas id="frontCanvas" width="400" height="260"></canvas>
        <div class="fullscreen-controls">
            <button type="button" style="background: #28a745;" onclick="rotateImage('front')">↻ Rotate</button>
            <button type="button" style="background: #1976d2;" onclick="saveSide('front')">Save Front</button>
        </div>
    </div>
    
    <div class="controls">
        <button type="button" onclick="rotateImage('front')">↻ Rotate 90°</button>
        <button type="button" onclick="goFullscreen('front')">⛶ Edit Fullscreen</button>
        <button type="button" onclick="resetZoom('front')">Reset Zoom</button>
        <button type="button" onclick="saveSide('front')">Save Front</button>
    </div>

    <div class="side-preview" id="frontPreviewContainer">
        <img id="frontPreviewImg" src="" alt="Front Preview">
        <p id="frontPreviewStatus">✓ Front Side Saved</p>
    </div>

    <hr>

    <h3>Back Side</h3>
    <p class="instructions">Use mouse wheel or pinch to zoom. Drag corners to crop.</p>
    <input type="file" id="backFile" accept="image/*">
    
    <div class="canvas-container" id="backContainer">
        <button type="button" class="exit-fullscreen-btn" onclick="closeFullscreen()">✕ Exit Fullscreen</button>
        <canvas id="backCanvas" width="400" height="260"></canvas>
        <div class="fullscreen-controls">
            <button type="button" style="background: #28a745;" onclick="rotateImage('back')">↻ Rotate</button>
            <button type="button" style="background: #1976d2;" onclick="saveSide('back')">Save Back</button>
        </div>
    </div>
    
    <div class="controls">
        <button type="button" onclick="rotateImage('back')">↻ Rotate 90°</button>
        <button type="button" onclick="goFullscreen('back')">⛶ Edit Fullscreen</button>
        <button type="button" onclick="resetZoom('back')">Reset Zoom</button>
        <button type="button" onclick="saveSide('back')">Save Back</button>
    </div>

    <div class="side-preview" id="backPreviewContainer">
        <img id="backPreviewImg" src="" alt="Back Preview">
        <p id="backPreviewStatus">✓ Back Side Saved</p>
    </div>

    <hr>

    <div class="input-group">
        <label>Number of Pages / Copies to Print:</label>
        <input type="number" id="copies" value="1" min="1" oninput="calculatePrice()" required>
    </div>

    <div class="input-group">
        <label>Print Type:</label>
        <select id="type" onchange="calculatePrice()">
            <option value="5" selected>Black & White (₹5 / copy)</option>
            <option value="10">Color (₹10 / copy)</option>
        </select>
    </div>

    <h3 id="totalPrice" style="color: #1976d2; text-align: center;">Total Price: ₹5</h3>

    <br>
    <button onclick="submitID()" style="background:#1976d2;">Submit Order</button>
</div>

<script>
const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let frontBlob = null;
let backBlob = null;

const engine = {
    front: { img: null, corners: [], activeCorner: -1, canvas: null, ctx: null, rotation: 0, originalSrc: "", zoom: 1, offsetX: 0, offsetY: 0, isPanning: false, lastTouchDist: 0 },
    back: { img: null, corners: [], activeCorner: -1, canvas: null, ctx: null, rotation: 0, originalSrc: "", zoom: 1, offsetX: 0, offsetY: 0, isPanning: false, lastTouchDist: 0 }
};

engine.front.canvas = document.getElementById('frontCanvas');
engine.front.ctx = engine.front.canvas.getContext('2d');
engine.back.canvas = document.getElementById('backCanvas');
engine.back.ctx = engine.back.canvas.getContext('2d');

document.getElementById('frontFile').addEventListener('change', (e) => handleFileSelect(e, 'front'));
document.getElementById('backFile').addEventListener('change', (e) => handleFileSelect(e, 'back'));

function handleFileSelect(e, side) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        const rawImg = new Image();
        rawImg.onload = function() {
            const maxDimension = 1200;
            let targetWidth = rawImg.width;
            let targetHeight = rawImg.height;

            if (rawImg.width > maxDimension || rawImg.height > maxDimension) {
                if (rawImg.width > rawImg.height) {
                    targetWidth = maxDimension;
                    targetHeight = Math.round((rawImg.height * maxDimension) / rawImg.width);
                } else {
                    targetHeight = maxDimension;
                    targetWidth = Math.round((rawImg.width * maxDimension) / rawImg.height);
                }
            }

            const optimizationCanvas = document.createElement('canvas');
            optimizationCanvas.width = targetWidth;
            optimizationCanvas.height = targetHeight;
            const optimizationCtx = optimizationCanvas.getContext('2d');
            optimizationCtx.drawImage(rawImg, 0, 0, targetWidth, targetHeight);

            const optimizedDataUrl = optimizationCanvas.toDataURL("image/jpeg", 0.92);
            
            engine[side].originalSrc = optimizedDataUrl;
            engine[side].rotation = 0; 
            resetZoom(side);
            loadImageData(side, optimizedDataUrl);
        };
        rawImg.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

function loadImageData(side, src) {
    const img = new Image();
    img.crossOrigin = "anonymous";
    
    img.onload = function() {
        engine[side].img = img;
        const w = engine[side].canvas.width;
        const h = engine[side].canvas.height;
        
        engine[side].corners = [
            { x: 30, y: 30 },       
            { x: w - 30, y: 30 },   
            { x: w - 30, y: h - 30 },
            { x: 30, y: h - 30 }    
        ];
        draw(side);
    };
    img.src = src;
}

function resetZoom(side) {
    engine[side].zoom = 1;
    engine[side].offsetX = 0;
    engine[side].offsetY = 0;
    draw(side);
}

function calculatePrice() {
    let copies = parseInt(document.getElementById("copies").value) || 1;
    if (copies < 1) copies = 1;
    let baseRate = parseInt(document.getElementById("type").value); 
    document.getElementById("totalPrice").innerText = "Total Price: ₹" + (copies * baseRate);
}

async function goFullscreen(side) {
    const container = document.getElementById(`${side}Container`);
    if (!engine[side].img) {
        alert("Please upload an image first.");
        return;
    }
    
    try {
        if (container.requestFullscreen) {
            await container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) { 
            await container.webkitRequestFullscreen();
        }
    } catch(err) {
        console.warn("Fullscreen permission denied:", err);
    }
    
    setTimeout(() => draw(side), 100);
}

function closeFullscreen() {
    if (document.fullscreenElement) {
        document.exitFullscreen().catch(()=>{});
    } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
    }
}

function rotateImage(side) {
    const s = engine[side];
    if (!s.originalSrc) {
        alert("Please upload an image first.");
        return;
    }

    s.rotation = (s.rotation + 90) % 360;

    const tempImg = new Image();
    tempImg.crossOrigin = "anonymous";
    tempImg.onload = function() {
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');

        if (s.rotation === 90 || s.rotation === 270) {
            tempCanvas.width = tempImg.height;
            tempCanvas.height = tempImg.width;
        } else {
            tempCanvas.width = tempImg.width;
            tempCanvas.height = tempImg.height;
        }

        tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
        tempCtx.rotate((s.rotation * Math.PI) / 180);
        tempCtx.drawImage(tempImg, -tempImg.width / 2, -tempImg.height / 2);

        const rotatedImg = new Image();
        rotatedImg.crossOrigin = "anonymous";
        rotatedImg.onload = function() {
            s.img = rotatedImg;
            draw(side);
        };
        rotatedImg.src = tempCanvas.toDataURL("image/jpeg");
    };
    tempImg.src = s.originalSrc;
}

function draw(side) {
    const s = engine[side];
    if (!s.img) return;

    s.ctx.clearRect(0, 0, s.canvas.width, s.canvas.height);
    
    s.ctx.save();
    s.ctx.translate(s.offsetX, s.offsetY);
    s.ctx.scale(s.zoom, s.zoom);
    
    s.ctx.drawImage(s.img, 0, 0, s.canvas.width, s.canvas.height);
    s.ctx.restore();

    s.ctx.strokeStyle = '#28a745';
    s.ctx.lineWidth = 2;
    s.ctx.beginPath();
    s.ctx.moveTo(s.corners[0].x, s.corners[0].y);
    for (let i = 1; i < 4; i++) s.ctx.lineTo(s.corners[i].x, s.corners[i].y);
    s.ctx.closePath();
    s.ctx.stroke();

    s.corners.forEach((corner) => {
        s.ctx.fillStyle = '#28a745';
        s.ctx.beginPath();
        s.ctx.arc(corner.x, corner.y, 8, 0, Math.PI * 2);
        s.ctx.fill();
        s.ctx.strokeStyle = '#fff';
        s.ctx.lineWidth = 2;
        s.ctx.stroke();
    });
}

['front', 'back'].forEach((side) => {
    const canvas = engine[side].canvas;
    let lastX = 0;
    let lastY = 0;
    
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const s = engine[side];
        if (!s.img) return;

        const mouse = getMousePos(e);
        const zoomFactor = 1.1;
        let newZoom = e.deltaY < 0 ? s.zoom * zoomFactor : s.zoom / zoomFactor;
        
        newZoom = Math.max(1, Math.min(8, newZoom));

        s.offsetX = mouse.x - (mouse.x - s.offsetX) * (newZoom / s.zoom);
        s.offsetY = mouse.y - (mouse.y - s.offsetY) * (newZoom / s.zoom);
        s.zoom = newZoom;

        if(s.zoom === 1) { s.offsetX = 0; s.offsetY = 0; }

        draw(side);
    }, { passive: false });

    function handleStart(e) {
        if (e.target.closest('.exit-fullscreen-btn') || e.target.closest('.fullscreen-controls')) return;
        const s = engine[side];
        if (!s.img) return;

        const pos = getMousePos(e);

        s.activeCorner = s.corners.findIndex(c => 
            Math.hypot(c.x - pos.x, c.y - pos.y) < 35 
        );

        if (e.touches && e.touches.length === 2) {
            e.preventDefault();
            s.activeCorner = -1; 
            s.lastTouchDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
        } else if (s.activeCorner === -1 && s.zoom > 1) {
            s.isPanning = true;
            lastX = e.touches ? e.touches[0].clientX : e.clientX;
            lastY = e.touches ? e.touches[0].clientY : e.clientY;
        }
    }

    function handleMove(e) {
        const s = engine[side];
        if (!s.img) return;

        if (e.touches && e.touches.length === 2) {
            e.preventDefault();
            const dist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            
            const zoomFactor = dist / s.lastTouchDist;
            let newZoom = Math.max(1, Math.min(8, s.zoom * zoomFactor));

            const midX = ((e.touches[0].clientX + e.touches[1].clientX) / 2 - canvas.getBoundingClientRect().left) * (canvas.width / canvas.getBoundingClientRect().width);
            const midY = ((e.touches[0].clientY + e.touches[1].clientY) / 2 - canvas.getBoundingClientRect().top) * (canvas.height / canvas.getBoundingClientRect().height);

            s.offsetX = midX - (midX - s.offsetX) * (newZoom / s.zoom);
            s.offsetY = midY - (midY - s.offsetY) * (newZoom / s.zoom);
            s.zoom = newZoom;
            s.lastTouchDist = dist;

            if (s.zoom === 1) { s.offsetX = 0; s.offsetY = 0; }
            draw(side);
            return;
        }

        if (s.activeCorner !== -1) {
            if (e.touches) e.preventDefault();
            const pos = getMousePos(e);
            pos.x = Math.max(0, Math.min(canvas.width, pos.x));
            pos.y = Math.max(0, Math.min(canvas.height, pos.y));
            s.corners[s.activeCorner] = pos;
            draw(side);
        } else if (s.isPanning) {
            if (e.touches) e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            s.offsetX += (clientX - lastX);
            s.offsetY += (clientY - lastY);
            lastX = clientX;
            lastY = clientY;
            draw(side);
        }
    }

    function handleEnd() {
        engine[side].activeCorner = -1;
        engine[side].isPanning = false;
    }

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    canvas.addEventListener('touchstart', handleStart, { passive: false });
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', handleEnd);
});

function projectPerspective(srcImg, corners, targetW, targetH) {
    targetW = 428;
    targetH = 270;

    const hiddenCanvas = document.createElement('canvas');
    hiddenCanvas.width = targetW;
    hiddenCanvas.height = targetH;
    const ctx = hiddenCanvas.getContext('2d');

    const cvsW = 400, cvsH = 260; 
    const p1 = [corners[0].x / cvsW, corners[0].y / cvsH];
    const p2 = [corners[1].x / cvsW, corners[1].y / cvsH];
    const p3 = [corners[2].x / cvsW, corners[2].y / cvsH];
    const p4 = [corners[3].x / cvsW, corners[3].y / cvsH];

    for (let y = 0; y < targetH; y++) {
        for (let x = 0; x < targetW; x++) {
            let u = x / targetW;
            let v = y / targetH;

            let topX = p1[0] + u * (p2[0] - p1[0]);
            let topY = p1[1] + u * (p2[1] - p1[1]);
            let botX = p4[0] + u * (p3[0] - p4[0]);
            let botY = p4[1] + u * (p3[1] - p4[1]);

            let srcX = (topX + v * (botX - topX)) * srcImg.width;
            let srcY = (topY + v * (botY - topY)) * srcImg.height;

            ctx.drawImage(srcImg, srcX, srcY, 1, 1, x, y, 1, 1);
        }
    }

    try {
        const imgData = ctx.getImageData(0, 0, targetW, targetH);
        const data = imgData.data;

        const contrast = 35; 
        const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
        const brightnessOffset = 20; 

        for (let i = 0; i < data.length; i += 4) {
            let r = data[i];
            let g = data[i + 1];
            let b = data[i + 2];

            r += brightnessOffset;
            g += brightnessOffset;
            b += brightnessOffset;

            r = factor * (r - 128) + 128;
            g = factor * (g - 128) + 128;
            b = factor * (g - 128) + 128;

            let luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            if (luminance > 180) { 
                r = Math.min(255, r + 25);
                g = Math.min(255, g + 25);
                b = Math.min(255, b + 25);
            }

            data[i]     = Math.max(0, Math.min(255, r));
            data[i + 1] = Math.max(0, Math.min(255, g));
            data[i + 2] = Math.max(0, Math.min(255, b));
        }

        ctx.putImageData(imgData, 0, 0);
    } catch (e) {
        console.warn("Local image filter execution failed:", e);
    }

    return hiddenCanvas;
}

function saveSide(side) {
    const s = engine[side];
    if (!s.img) {
        alert(`Please choose an image for ${side} first.`);
        return;
    }

    const mappedCorners = s.corners.map(c => {
        return {
            x: (c.x - s.offsetX) / s.zoom,
            y: (c.y - s.offsetY) / s.zoom
        };
    });

    closeFullscreen();

    const resultCanvas = projectPerspective(s.img, mappedCorners, 856, 540);
    
    const directCropUrl = resultCanvas.toDataURL("image/jpeg");
    document.getElementById(`${side}PreviewImg`).src = directCropUrl;
    
    const statusText = document.getElementById(`${side}PreviewStatus`);
    statusText.innerText = "✓ Image Enhanced for Printing Successfully!";
    statusText.className = "";
    
    document.getElementById(`${side}PreviewContainer`).style.display = "block";

    resultCanvas.toBlob((baseBlob) => {
        const processedFile = new File([baseBlob], `${side}.jpg`, { type: "image/jpeg" });
        if (side === 'front') frontBlob = processedFile;
        else backBlob = processedFile;

    }, "image/jpeg", 0.75);
}

async function submitID() {
    const name = document.getElementById("name").value.trim();
    const mobile = document.getElementById("mobile").value.trim();
    const copiesInput = parseInt(document.getElementById("copies").value) || 1;
    const typeSelect = document.getElementById("type").value;

    if (!name || !mobile) { alert("Enter customer details."); return; }
    if (!frontBlob || !backBlob) { alert("Save both Front and Back crops first."); return; }

    alert("Saving order and setting up secure checkout... Please wait.");

    const frontName = Date.now() + "_front.jpg";
    const backName = Date.now() + "_back.jpg";

    const frontUpload = await client.storage.from("documents").upload(frontName, frontBlob, { contentType: "image/jpeg", upsert: true });
    if (frontUpload.error) { alert(frontUpload.error.message); return; }

    const backUpload = await client.storage.from("documents").upload(backName, backBlob, { contentType: "image/jpeg", upsert: true });
    if (backUpload.error) { alert(backUpload.error.message); return; }

    const frontUrl = client.storage.from("documents").getPublicUrl(frontName).data.publicUrl;
    const backUrl = client.storage.from("documents").getPublicUrl(backName).data.publicUrl;

    let baseRate = parseInt(typeSelect); 
    let totalAmountCalculation = copiesInput * baseRate;

    const baseColorType = (baseRate == 5 ? "Black & White" : "Color");
    const trackingPrintSummaryText = `ID Card - ${baseColorType} [${copiesInput} Copies]`;

    // ADDED .select() here to gather the specific target ID back from Supabase instantly
    const { data: insertedOrder, error } = await client.from("orders").insert([{
        customer_name: name, 
        mobile: mobile, 
        print_type: trackingPrintSummaryText, 
        pages: copiesInput, 
        amount: totalAmountCalculation,
        front_url: frontUrl, 
        back_url: backUrl, 
        payment_status: "Pending", 
        payment_id: ""
    }]).select();

    if (error) { alert(error.message); return; }

    localStorage.setItem("frontImage", frontUrl);
    localStorage.setItem("backImage", backUrl);
    localStorage.setItem("amount", totalAmountCalculation);
    localStorage.setItem("printType", "id");
    // Save unique row order ID for payment confirmation tracking
    localStorage.setItem("current_order_id", insertedOrder[0].id); 

    window.location.href = "payment.html";
}
</script>

</body>
</html>
