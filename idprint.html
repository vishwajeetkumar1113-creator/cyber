<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Print (Perspective Tool)</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .canvas-container {
            position: relative;
            margin: 15px auto;
            width: 100%;
            max-width: 400px;
            background: #f5f5f5;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }
        
        /* NEW: Exit Button Styling (Hidden by default in normal view) */
        .exit-fullscreen-btn {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(220, 53, 69, 0.9); /* Translucent Red */
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .exit-fullscreen-btn:hover {
            background: #dc3545;
        }
        
        /* Fullscreen optimization rules for the active container */
        .canvas-container:fullscreen {
            max-width: 100vw !important;
            width: 100vw !important;
            height: 100vh !important;
            background: #111 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 0;
            margin: 0;
        }
        
        /* NEW: Show the exit button ONLY when the container goes into fullscreen */
        .canvas-container:fullscreen .exit-fullscreen-btn {
            display: block;
        }
        
        .canvas-container:fullscreen canvas {
            width: auto !important;
            height: auto !important;
            max-width: 100% !important;
            max-height: 85vh !important;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        .instructions {
            font-size: 13px;
            color: #555;
            text-align: center;
            margin-bottom: 5px;
        }
        .side-preview {
            margin: 15px auto;
            text-align: center;
            display: none;
        }
        .side-preview img {
            width: 180px;
            height: 114px;
            object-fit: contain;
            border: 2px dashed #28a745;
            border-radius: 6px;
            background: #fff;
            padding: 2px;
        }
        .side-preview p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: #28a745;
            font-weight: bold;
        }
        .loading-text {
            color: #1976d2 !important;
            font-style: italic;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>ID Card Print</h2>

    <input type="text" id="name" placeholder="Customer Name" required>
    <input type="tel" id="mobile" placeholder="Mobile Number" required>

    <h3>Front Side</h3>
    <p class="instructions">Drag the 4 green corners to match the edges of your ID card</p>
    <input type="file" id="frontFile" accept="image/*">
    
    <div class="canvas-container" id="frontContainer">
        <button type="button" class="exit-fullscreen-btn" onclick="closeFullscreen()">✕ Exit Fullscreen</button>
        <canvas id="frontCanvas" width="400" height="260"></canvas>
    </div>
    
    <div class="controls">
        <button type="button" onclick="rotateImage('front')">↻ Rotate 90°</button>
        <button type="button" onclick="goFullscreen('front')">⛶ Edit Fullscreen</button>
        <button type="button" onclick="saveSide('front')">Save Front</button>
    </div>

    <div class="side-preview" id="frontPreviewContainer">
        <img id="frontPreviewImg" src="" alt="Front Preview">
        <p id="frontPreviewStatus">✓ Front Side Saved (AI Cleaning...)</p>
    </div>

    <hr>

    <h3>Back Side</h3>
    <p class="instructions">Drag the 4 green corners to match the edges of your ID card</p>
    <input type="file" id="backFile" accept="image/*">
    
    <div class="canvas-container" id="backContainer">
        <button type="button" class="exit-fullscreen-btn" onclick="closeFullscreen()">✕ Exit Fullscreen</button>
        <canvas id="backCanvas" width="400" height="260"></canvas>
    </div>
    
    <div class="controls">
        <button type="button" onclick="rotateImage('back')">↻ Rotate 90°</button>
        <button type="button" onclick="goFullscreen('back')">⛶ Edit Fullscreen</button>
        <button type="button" onclick="saveSide('back')">Save Back</button>
    </div>
