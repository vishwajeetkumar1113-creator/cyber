<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>ID Card Print</title>

<link rel="stylesheet"
      href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="card">

    <h2>ID Card Print</h2>

    <input type="text"
           id="name"
           placeholder="Customer Name"
           required>

    <input type="tel"
           id="mobile"
           placeholder="Mobile Number"
           required>

    <h3>Front Side</h3>

    <input type="file"
           id="frontFile"
           accept="image/*">

    <div class="crop-box">
        <img id="frontImage">
    </div>

    <div class="controls">

        <button type="button"
                onclick="rotate()">
            ↺ Rotate
        </button>

        <button type="button"
                onclick="rotateRight()">
            ↻ Rotate
        </button>

        <button type="button"
                onclick="zoomIn()">
            ＋ Zoom
        </button>

        <button type="button"
                onclick="zoomOut()">
            － Zoom
        </button>

        <button type="button"
                onclick="saveFront()">
            Save Front
        </button>

    </div>

    <hr>

    <h3>Back Side</h3>

    <input type="file"
           id="backFile"
           accept="image/*">

    <div class="crop-box">
        <img id="backImage">
    </div>

    <div class="controls">

        <button type="button"
                onclick="rotateBack()">
            ↺ Rotate
        </button>

        <button type="button"
                onclick="rotateRightBack()">
            ↻ Rotate
        </button>

        <button type="button"
                onclick="zoomInBack()">
            ＋ Zoom
        </button>

        <button type="button"
                onclick="zoomOutBack()">
            － Zoom
        </button>

        <button type="button"
                onclick="saveBack()">
            Save Back
        </button>

    </div>

    <br>

    <button onclick="submitID()">
        Submit
    </button>

</div>

<script>

const SUPABASE_URL =
    "https://irqlvuphoblgjqysteto.supabase.co";

const SUPABASE_KEY =
    "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";

const client =
    window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );



let frontCropper;
let backCropper;

let frontBlob;
let backBlob;


/* FRONT IMAGE */

document.getElementById(
    "frontFile"
).addEventListener(
    "change",
    function(e){

        const file =
            e.target.files[0];

        if(!file) return;

        const reader =
            new FileReader();

        reader.onload =
            function(event){

                const img =
                    document.getElementById(
                        "frontImage"
                    );

                img.src =
                    event.target.result;

                if(frontCropper){
                    frontCropper.destroy();
                }

                frontCropper =
    new Cropper(
        img,
        {
            aspectRatio: 85.6 / 54,
            viewMode: 1,
            autoCropArea: 1,
            movable: true,
            scalable: false,
            zoomable: true,
            rotatable: true,
            dragMode: "move"
        }
    );
            };

        reader.readAsDataURL(file);

    }
);


/* BACK IMAGE */

document.getElementById(
    "backFile"
).addEventListener(
    "change",
    function(e){

        const file =
            e.target.files[0];

        if(!file) return;

        const reader =
            new FileReader();

        reader.onload =
            function(event){

                const img =
                    document.getElementById(
                        "backImage"
                    );

                img.src =
                    event.target.result;

                if(backCropper){
                    backCropper.destroy();
                }

                backCropper =
                    nfrontCropper =
    new Cropper(
        img,
        {
            aspectRatio: 85.6 / 54,
            viewMode: 1,
            autoCropArea: 1,
            movable: true,
            scalable: false,
            zoomable: true,
            rotatable: true,
            dragMode: "move"
        }
    );
            };

        reader.readAsDataURL(file);

    }
);


/* FRONT CONTROLS */

function rotate(){
    if(frontCropper){
        frontCropper.rotate(-90);
    }
}

function rotateRight(){
    if(frontCropper){
        frontCropper.rotate(90);
    }
}

function zoomIn(){
    if(frontCropper){
        frontCropper.zoom(0.1);
    }
}

function zoomOut(){
    if(frontCropper){
        frontCropper.zoom(-0.1);
    }
}


/* BACK CONTROLS */

function rotateBack(){
    if(backCropper){
        backCropper.rotate(-90);
    }
}

function rotateRightBack(){
    if(backCropper){
        backCropper.rotate(90);
    }
}

function zoomInBack(){
    if(backCropper){
        backCropper.zoom(0.1);
    }
}

function zoomOutBack(){
    if(backCropper){
        backCropper.zoom(-0.1);
    }
}


/* SAVE FRONT */
function saveFront(){

    if(!frontCropper){
        alert("Select front image.");
        return;
    }

    frontCropper
    .getCroppedCanvas()
    .toBlob(function(blob){

        frontBlob = new File(
            [blob],
            "front.jpg",
            {
                type: "image/jpeg"
            }
        );

        alert("Front side saved.");
    });
}

          


/* SAVE BACK */

function saveBack(){

    if(!backCropper){
        alert("Select back image.");
        return;
    }

    backCropper
    .getCroppedCanvas()
    .toBlob(function(blob){

        backBlob = new File(
            [blob],
            "back.jpg",
            {
                type: "image/jpeg"
            }
        );

        alert("Back side saved.");
    });
}

/* AI UPLOAD */



/* SUBMIT */

async function submitID(){

    const name =
        document
        .getElementById(
            "name"
        )
        .value
        .trim();

    const mobile =
        document
        .getElementById(
            "mobile"
        )
        .value
        .trim();

    if(name === ""){
        alert(
            "Enter customer name."
        );
        return;
    }

    if(mobile === ""){
        alert(
            "Enter mobile number."
        );
        return;
    }

    if(!frontBlob){
        alert(
            "Save front side first."
        );
        return;
    }

    if(!backBlob){
        alert(
            "Save back side first."
        );
        return;
    }

    const frontName =
        Date.now() +
        "_front.jpg";

    const backName =
        Date.now() +
        "_back.jpg";

    const frontUpload =
        await client.storage
        .from("documents")
        .upload(
            frontName,
            frontBlob,
            {
                contentType:
                    "image/jpeg",
                upsert: true
            }
        );

    if(frontUpload.error){
        alert(
            frontUpload.error.message
        );
        return;
    }

    const backUpload =
        await client.storage
        .from("documents")
        .upload(
            backName,
            backBlob,
            {
                contentType:
                    "image/jpeg",
                upsert: true
            }
        );

    if(backUpload.error){
        alert(
            backUpload.error.message
        );
        return;
    }

    const frontUrl =
        client.storage
        .from("documents")
        .getPublicUrl(
            frontName
        )
        .data.publicUrl;

    const backUrl =
        client.storage
        .from("documents")
        .getPublicUrl(
            backName
        )
        .data.publicUrl;

    const { error } =
        await client
        .from("orders")
        .insert([
            {
                customer_name:
                    name,
                mobile:
                    mobile,
                print_type:
                    "ID Card",
                pages: 1,
                amount: 20,
                front_url:
                    frontUrl,
                back_url:
                    backUrl,
                payment_status:
                    "Pending",
                payment_id:
                    ""
            }
        ]);

    if(error){
        alert(
            error.message
        );
        return;
    }

    localStorage.setItem(
        "frontImage",
        frontUrl
    );

    localStorage.setItem(
        "backImage",
        backUrl
    );

    localStorage.setItem(
        "amount",
        5
    );

    localStorage.setItem(
        "printType",
        "id"
    );

    window.location.href =
        "payment.html";
}

</script>

</body>
</html>
