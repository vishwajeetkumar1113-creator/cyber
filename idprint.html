<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>ID Card Print</title>

<link rel="stylesheet"
      href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

</head>

<body>

<div class="card">

    <h2>ID Card Print</h2>

    <input type="text"
           id="name"
           placeholder="Customer Name">

    <input type="tel"
           id="mobile"
           placeholder="Mobile Number">

    <h3>Front Side</h3>

    <input type="file"
           id="frontFile"
           accept="image/*">

    <div class="crop-box">
        <img id="frontImage">
    </div>

    <div class="controls">

        <button type="button"
                onclick="rotateLeft()">
            ↺ Rotate
        </button>

        <button type="button"
                onclick="rotateRight()">
            ↻ Rotate
        </button>

        <button type="button"
                onclick="zoomIn()">
            ＋ Zoom
        </button>

        <button type="button"
                onclick="zoomOut()">
            － Zoom
        </button>

        <button type="button"
                onclick="saveFront()">
            Save Front
        </button>

    </div>

    <hr>

    <h3>Back Side</h3>

    <input type="file"
           id="backFile"
           accept="image/*">

    <div class="crop-box">
        <img id="backImage">
    </div>

    <div class="controls">

        <button type="button"
                onclick="rotateLeftBack()">
            ↺ Rotate
        </button>

        <button type="button"
                onclick="rotateRightBack()">
            ↻ Rotate
        </button>

        <button type="button"
                onclick="zoomInBack()">
            ＋ Zoom
        </button>

        <button type="button"
                onclick="zoomOutBack()">
            － Zoom
        </button>

        <button type="button"
                onclick="saveBack()">
            Save Back
        </button>

    </div>

    <br>

    <button onclick="submitID()">
        Submit
    </button>

</div>

<script>

let frontCropper;
let backCropper;

let frontBlob;
let backBlob;

/* FRONT */

document.getElementById(
    "frontFile"
).addEventListener(
    "change",
    function(e){

    const file =
        e.target.files[0];

    const reader =
        new FileReader();

    reader.onload =
        function(event){

        const img =
            document.getElementById(
                "frontImage"
            );

        img.src =
            event.target.result;

        if(frontCropper){
            frontCropper.destroy();
        }

        frontCropper =
            new Cropper(
                img,
                {
                    aspectRatio:1.58,
                    viewMode:1,
                    autoCropArea:1,
                    movable:true,
                    zoomable:true,
                    rotatable:true,
                    cropBoxResizable:true,
                    cropBoxMovable:true
                }
            );
    };

    reader.readAsDataURL(file);

});

/* BACK */

document.getElementById(
    "backFile"
).addEventListener(
    "change",
    function(e){

    const file =
        e.target.files[0];

    const reader =
        new FileReader();

    reader.onload =
        function(event){

        const img =
            document.getElementById(
                "backImage"
            );

        img.src =
            event.target.result;

        if(backCropper){
            backCropper.destroy();
        }

        backCropper =
            new Cropper(
                img,
                {
                    aspectRatio:1.58,
                    viewMode:1,
                    autoCropArea:1,
                    movable:true,
                    zoomable:true,
                    rotatable:true,
                    cropBoxResizable:true,
                    cropBoxMovable:true
                }
            );
    };

    reader.readAsDataURL(file);

});

/* FRONT CONTROLS */

function rotateLeft(){
    frontCropper.rotate(-90);
}

function rotateRight(){
    frontCropper.rotate(90);
}

function zoomIn(){
    frontCropper.zoom(0.1);
}

function zoomOut(){
    frontCropper.zoom(-0.1);
}

/* BACK CONTROLS */

function rotateLeftBack(){
    backCropper.rotate(-90);
}

function rotateRightBack(){
    backCropper.rotate(90);
}

function zoomInBack(){
    backCropper.zoom(0.1);
}

function zoomOutBack(){
    backCropper.zoom(-0.1);
}

/* SAVE */

function saveFront(){

    frontCropper
    .getCroppedCanvas()
    .toBlob(function(blob){

        frontBlob = blob;

        alert(
            "Front side saved."
        );

    });
}

function saveBack(){

    backCropper
    .getCroppedCanvas()
    .toBlob(function(blob){

        backBlob = blob;

        alert(
            "Back side saved."
        );

    });
}

/* SUBMIT */

function submitID(){

    const name =
        document.getElementById(
            "name"
        ).value.trim();

    const mobile =
        document.getElementById(
            "mobile"
        ).value.trim();

    if(name === ""){

        alert(
            "Enter customer name."
        );

        return;
    }

    if(mobile === ""){

        alert(
            "Enter mobile number."
        );

        return;
    }

    if(!frontBlob){

        alert(
            "Save front side first."
        );

        return;
    }

    if(!backBlob){

        alert(
            "Save back side first."
        );

        return;
    }

    alert(
        "ID card ready for upload."
    );

    // Add Supabase upload here
    // Add payment page redirect here

}

</script>

</body>
</html>
