<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Print (Perspective & Rotate)</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .canvas-container {
            position: relative;
            margin: 15px auto;
            max-width: 100%;
            display: inline-block;
        }
        canvas {
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #f5f5f5;
            max-width: 100%;
            height: auto;
            cursor: crosshair;
            display: block;
        }
        .instructions {
            font-size: 13px;
            color: #555;
            text-align: center;
            margin-bottom: 5px;
        }
        .side-preview {
            margin: 15px auto;
            text-align: center;
            display: none;
        }
        .side-preview img {
            width: 180px;
            height: 114px;
            object-fit: contain;
            border: 2px dashed #28a745;
            border-radius: 6px;
            background: #fff;
            padding: 2px;
        }
        .side-preview p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>ID Card Print</h2>

    <input type="text" id="name" placeholder="Customer Name" required>
    <input type="tel" id="mobile" placeholder="Mobile Number" required>

    <h3>Front Side</h3>
    <p class="instructions">Drag the 4 green corners to match the edges of your ID card</p>
    <input type="file" id="frontFile" accept="image/*">
    
    <div class="canvas-container">
        <canvas id="frontCanvas" width="400" height="260"></canvas>
    </div>
    
    <div class="controls">
        <button type="button" onclick="rotateImage('front')">↻ Rotate 90°</button>
        <button type="button" onclick="saveSide('front')">Save Front</button>
    </div>

    <div class="side-preview" id="frontPreviewContainer">
        <img id="frontPreviewImg" src="" alt="Front Preview">
        <p>✓ Front Side Saved & Flattened</p>
    </div>

    <hr>

    <h3>Back Side</h3>
    <p class="instructions">Drag the 4 green corners to match the edges of your ID card</p>
    <input type="file" id="backFile" accept="image/*">
    
    <div class="canvas-container">
        <canvas id="backCanvas" width="400" height="260"></canvas>
    </div>
    
    <div class="controls">
        <button type="button" onclick="rotateImage('back')">↻ Rotate 90°</button>
        <button type="button" onclick="saveSide('back')">Save Back</button>
    </div>

    <div class="side-preview" id="backPreviewContainer">
        <img id="backPreviewImg" src="" alt="Back Preview">
        <p>✓ Back Side Saved & Flattened</p>
    </div>

    <br>
    <button onclick="submitID()" style="background:#1976d2;">Submit Order</button>
</div>

<script>
const SUPABASE_URL = "https://irqlvuphoblgjqysteto.supabase.co";
const SUPABASE_KEY = "sb_publishable_-8iwefgyZfbxfF93ZjcFbw_G09EA3U-";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let frontBlob = null;
let backBlob = null;

// Track data structures for perspective rendering
const engine = {
    front: { img: null, corners: [], activeCorner: -1, canvas: null, ctx: null, rotation: 0, originalSrc: "" },
    back: { img: null, corners: [], activeCorner: -1, canvas: null, ctx: null, rotation: 0, originalSrc: "" }
};

engine.front.canvas = document.getElementById('frontCanvas');
engine.front.ctx = engine.front.canvas.getContext('2d');
engine.back.canvas = document.getElementById('backCanvas');
engine.back.ctx = engine.back.canvas.getContext('2d');

// Set up image upload listeners
document.getElementById('frontFile').addEventListener('change', (e) => handleFileSelect(e, 'front'));
document.getElementById('backFile').addEventListener('change', (e) => handleFileSelect(e, 'back'));

function handleFileSelect(e, side) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        engine[side].originalSrc = event.target.result;
        engine[side].rotation = 0; // Reset rotation on new file upload
        loadImageData(side, event.target.result);
    };
    reader.readAsDataURL(file);
}

function loadImageData(side, src) {
    const img = new Image();
    img.onload = function() {
        engine[side].img = img;
        // Initialize or maintain 4 corner positions
        const w = engine[side].canvas.width;
        const h = engine[side].canvas.height;
        engine[side].corners = [
            { x: 40, y: 40 },       // Top Left
            { x: w - 40, y: 40 },   // Top Right
            { x: w - 40, y: h - 40 },// Bottom Right
            { x: 40, y: h - 40 }    // Bottom Left
        ];
        draw(side);
    };
    img.src = src;
}

// Function to handle 90-degree rotations cleanly on the canvas
function rotateImage(side) {
    const s = engine[side];
    if (!s.originalSrc) {
        alert("Please upload an image first.");
        return;
    }

    s.rotation = (s.rotation + 90) % 360;

    const tempImg = new Image();
    tempImg.onload = function() {
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');

        if (s.rotation === 90 || s.rotation === 270) {
            tempCanvas.width = tempImg.height;
            tempCanvas.height = tempImg.width;
        } else {
            tempCanvas.width = tempImg.width;
            tempCanvas.height = tempImg.height;
        }

        tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
        tempCtx.rotate((s.rotation * Math.PI) / 180);
        tempCtx.drawImage(tempImg, -tempImg.width / 2, -tempImg.height / 2);

        // Treat this rotated output canvas context generation as the new base processing source image
        const rotatedImg = new Image();
        rotatedImg.onload = function() {
            s.img = rotatedImg;
            draw(side);
        };
        rotatedImg.src = tempCanvas.toDataURL("image/jpeg");
    };
    tempImg.src = s.originalSrc;
}

function draw(side) {
    const s = engine[side];
    if (!s.img) return;

    s.ctx.clearRect(0, 0, s.canvas.width, s.canvas.height);
    s.ctx.drawImage(s.img, 0, 0, s.canvas.width, s.canvas.height);

    // Draw boundary line tracking path loops
    s.ctx.strokeStyle = '#28a745';
    s.ctx.lineWidth = 2;
    s.ctx.beginPath();
    s.ctx.moveTo(s.corners[0].x, s.corners[0].y);
    for (let i = 1; i < 4; i++) s.ctx.lineTo(s.corners[i].x, s.corners[i].y);
    s.ctx.closePath();
    s.ctx.stroke();

    // Draw interactive tracking point anchors
    s.corners.forEach((corner) => {
        s.ctx.fillStyle = '#28a745';
        s.ctx.beginPath();
        s.ctx.arc(corner.x, corner.y, 8, 0, Math.PI * 2);
        s.ctx.fill();
        s.ctx.strokeStyle = '#fff';
        s.ctx.lineWidth = 2;
        s.ctx.stroke();
    });
}

// Coordinate relative location listener tracking maps
['front', 'back'].forEach((side) => {
    const canvas = engine[side].canvas;
    
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX - rect.left) * (canvas.width / rect.width),
            y: (e.clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    canvas.addEventListener('mousedown', (e) => {
        const pos = getMousePos(e);
        engine[side].activeCorner = engine[side].corners.findIndex(c => 
            Math.hypot(c.x - pos.x, c.y - pos.y) < 15
        );
    });

    canvas.addEventListener('mousemove', (e) => {
        if (engine[side].activeCorner === -1) return;
        const pos = getMousePos(e);
        engine[side].corners[engine[side].activeCorner] = pos;
        draw(side);
    });

    window.addEventListener('mouseup', () => {
        engine[side].activeCorner = -1;
    });
});

// Linear Unwarping Interpolation Matrix calculation algorithms
function projectPerspective(srcImg, corners, targetW, targetH) {
