<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID Card Print (Perspective Tool)</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <style>
        * {
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }
        .canvas-container {
            position: relative;
            margin: 15px auto;
            width: 100%;
            max-width: 400px;
            background: #f5f5f5;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease;
            touch-action: none; 
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }
        
        .exit-fullscreen-btn {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .exit-fullscreen-btn:hover {
            background: #dc3545;
        }

        .fullscreen-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 100000;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        .fullscreen-controls button {
            width: auto;
            min-width: 100px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
        }
        
        .canvas-container:fullscreen {
            max-width: 100vw !important;
            width: 100vw !important;
            height: 100vh !important;
            background: #111 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 0;
            margin: 0;
        }
        
        .canvas-container:fullscreen .exit-fullscreen-btn { display: block; }
        .canvas-container:fullscreen .fullscreen-controls { display: flex; }
        
        .canvas-container:fullscreen canvas {
            width: auto !important;
            height: auto !important;
            max-width: 100% !important;
            max-height: 80vh !important;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        .instructions {
            font-size: 13px;
            color: #555;
            text-align: center;
            margin-bottom: 5px;
        }
        .side-preview {
            margin: 15px auto;
            text-align: center;
            display: none;
        }
        .side-preview img {
            width: 180px;
            height: 114px;
            object-fit: contain;
            border: 2px dashed #28a745;
            border-radius: 6px;
            background: #fff;
            padding: 2px;
        }
        .side-preview p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: #28a745;
            font-weight: bold;
        }
        .input-group {
            margin-top: 10px;
            margin-bottom: 15px;
        }
        .input-group label {
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .force-grayscale {
            filter: grayscale(100%) brightness(102%) contrast(105%) !important;
        }
        button:disabled {
            background-color: #9e9e9e !important;
            cursor: not-allowed !important;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>ID Card Print Layout Engine</h2>

    <input type="text" id="name" placeholder="Customer Name (Optional)">
    <input type="tel" id="mobile" placeholder="Mobile Number (Optional)">

    <div class="input-group">
        <label>Number of Pages / Copies to Print:</label>
        <input type="number" id="copies" value="1" min="1" oninput="calculatePrice()" required>
    </div>

    <div class="input-group">
        <label>Print Type Mode:</label>
        <select id="type" onchange="calculatePrice(); applyLiveGrayscalePreviewFilter();">
            <option value="5" selected>Black & White (₹5 / copy)</option>
            <option value="10">Color (₹10 / copy)</option>
        </select>
    </div>

    <div id="totalPrice" style="color: #1976d2; font-weight: bold; text-align: center; margin-bottom: 20px; font-size: 18px;">Total Price: ₹5</div>

    <hr>

    <h3>Front Side</h3>
    <p class="instructions">Drag corners to crop. Use 2 fingers to pinch-zoom / pan.</p>
    <input type="file" id="frontFile" accept="image/*">
    
    <div class="canvas-container" id="frontContainer">
        <button type="button" class="exit-fullscreen-btn" onclick="closeFullscreen()">✕ Exit Fullscreen</button>
        <canvas id="frontCanvas" width="400" height="260"></canvas>
        <div class="fullscreen-controls">
            <button type="button" style="background: #28a745;" onclick="rotateImage('front')">↻ Rotate</button>
            <button type="button" style="background: #1976d2;" onclick="saveSide('front')">Save Front</button>
        </div>
    </div>
    
    <div class="controls">
        <button type="button" onclick="rotateImage('front')">↻ Rotate 90°</button>
        <button type="button" onclick="goFullscreen('front')">⛶ Edit Fullscreen</button>
        <button type="button" onclick="resetZoom('front')">Reset Zoom</button>
        <button type="button" onclick="saveSide('front')">Save Front</button>
    </div>

    <div class="side-preview" id="frontPreviewContainer">
        <img id="frontPreviewImg" src="" alt="Front Preview">
        <p id="frontPreviewStatus">✓ Clean Front Image Saved</p>
    </div>

    <hr>

    <h3>Back Side </h3>
    <p class="instructions">Crop Accurate for Best Result</p>
    <input type="file" id="backFile" accept="image/*">
    
    <div class="canvas-container" id="backContainer">
        <button type="button" class="exit-fullscreen-btn" onclick="closeFullscreen()">✕ Exit Fullscreen</button>
        <canvas id="backCanvas" width="400" height="260"></canvas>
        <div class="fullscreen-controls">
            <button type="button" style="background: #28a745;" onclick="rotateImage('back')">↻ Rotate</button>
            <button type="button" style="background: #1976d2;" onclick="saveSide('back')">Save Back</button>
        </div>
    </div>
    
    <div class="controls">
        <button type="button" onclick="rotateImage('back')">↻ Rotate 90°</button>
        <button type="button" onclick="goFullscreen('back')">⛶ Edit Fullscreen</button>
        <button type="button" onclick="resetZoom('back')">Reset Zoom</button>
        <button type="button" onclick="saveSide('back')">Save Back</button>
    </div>

    <div class="side-preview" id="backPreviewContainer">
        <img id="backPreviewImg" src="" alt="Back Preview">
        <p id="backPreviewStatus">✓ Clean Back Image Saved</p>
    </div>

    <br>
    <button id="submitBtn" onclick="submitID()" style="background:#1976d2; width: 100%; padding: 12px; font-weight: bold; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px;">Submit Processing Order</button>
</div>

<script>
const client = window.supabase.createClient(window.SITE_CONFIG.SUPABASE_URL, window.SITE_CONFIG.SUPABASE_KEY);

let frontDataUrl = null;
let backDataUrl = null;

const engine = {
    front: { img: null, corners: [], activeCorner: -1, canvas: null, ctx: null, rotation: 0, originalSrc: "", zoom: 1, offsetX: 0, offsetY: 0, isPanning: false, lastTouchDist: 0, lastTouchX: 0, lastTouchY: 0 },
    back: { img: null, corners: [], activeCorner: -1, canvas: null, ctx: null, rotation: 0, originalSrc: "", zoom: 1, offsetX: 0, offsetY: 0, isPanning: false, lastTouchDist: 0, lastTouchX: 0, lastTouchY: 0 }
};

engine.front.canvas = document.getElementById('frontCanvas');
engine.front.ctx = engine.front.canvas.getContext('2d');
engine.back.canvas = document.getElementById('backCanvas');
engine.back.ctx = engine.back.canvas.getContext('2d');

document.getElementById('frontFile').addEventListener('change', (e) => handleFileSelect(e, 'front'));
document.getElementById('backFile').addEventListener('change', (e) => handleFileSelect(e, 'back'));

function handleFileSelect(e, side) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        const rawImg = new Image();
        rawImg.onload = function() {
            const maxDimension = 1200;
            let targetWidth = rawImg.width;
            let targetHeight = rawImg.height;

            if (rawImg.width > maxDimension || rawImg.height > maxDimension) {
                if (rawImg.width > rawImg.height) {
                    targetWidth = maxDimension;
                    targetHeight = Math.round((rawImg.height * maxDimension) / rawImg.width);
                } else {
                    targetHeight = maxDimension;
                    targetWidth = Math.round((rawImg.width * maxDimension) / rawImg.height);
                }
            }

            const optimizationCanvas = document.createElement('canvas');
            optimizationCanvas.width = targetWidth;
            optimizationCanvas.height = targetHeight;
            const optimizationCtx = optimizationCanvas.getContext('2d');
            optimizationCtx.drawImage(rawImg, 0, 0, targetWidth, targetHeight);

            const optimizedDataUrl = optimizationCanvas.toDataURL("image/jpeg", 0.92);
            
            engine[side].originalSrc = optimizedDataUrl;
            engine[side].rotation = 0; 
            resetZoom(side);
            loadImageData(side, optimizedDataUrl);
        };
        rawImg.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

function loadImageData(side, src) {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = function() {
        engine[side].img = img;
        
        // Dynamically adjust canvas height based on the original image aspect ratio
        const newHeight = (img.height * 400) / img.width;
        engine[side].canvas.height = newHeight;
        
        const w = engine[side].canvas.width;
        const h = engine[side].canvas.height;
        engine[side].corners = [{ x: 30, y: 30 }, { x: w - 30, y: 30 }, { x: w - 30, y: h - 30 }, { x: 30, y: h - 30 }];
        draw(side);
    };
    img.src = src;
}

function resetZoom(side) {
    engine[side].zoom = 1;
    engine[side].offsetX = 0;
    engine[side].offsetY = 0;
    draw(side);
}

function calculatePrice() {
    let copies = parseInt(document.getElementById("copies").value) || 1;
    if (copies < 1) copies = 1;
    let baseRate = parseInt(document.getElementById("type").value); 
    document.getElementById("totalPrice").innerText = "Total Price: ₹" + (copies * baseRate);
}

function applyLiveGrayscalePreviewFilter() {
    const frontImg = document.getElementById("frontPreviewImg");
    const backImg = document.getElementById("backPreviewImg");
    const isBw = document.getElementById("type").value == 5;
    
    if (isBw) {
        if(frontImg) frontImg.classList.add("force-grayscale");
        if(backImg) backImg.classList.add("force-grayscale");
    } else {
        if(frontImg) frontImg.classList.remove("force-grayscale");
        if(backImg) backImg.classList.remove("force-grayscale");
    }
}

async function goFullscreen(side) {
    const container = document.getElementById(`${side}Container`);
    if (!engine[side].img) { alert("Please upload an image first."); return; }
    try {
        if (container.requestFullscreen) await container.requestFullscreen();
        else if (container.webkitRequestFullscreen) await container.webkitRequestFullscreen();
    } catch(err) { console.warn(err); }
    setTimeout(() => draw(side), 100);
}

function closeFullscreen() {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
}

function rotateImage(side) {
    const s = engine[side];
    if (!s.originalSrc) { alert("Upload image first."); return; }
    
    s.rotation = (s.rotation + 90) % 360;
    const tempImg = new Image();
    tempImg.crossOrigin = "anonymous";
    tempImg.onload = function() {
        const internalCanvas = document.createElement('canvas');
        if (s.rotation === 90 || s.rotation === 270) {
            internalCanvas.width = tempImg.height;
            internalCanvas.height = tempImg.width;
        } else {
            internalCanvas.width = tempImg.width;
            internalCanvas.height = tempImg.height;
        }
        
        const internalCtx = internalCanvas.getContext('2d');
        internalCtx.translate(internalCanvas.width / 2, internalCanvas.height / 2);
        internalCtx.rotate((s.rotation * Math.PI) / 180);
        internalCtx.drawImage(tempImg, -tempImg.width / 2, -tempImg.height / 2);
        
        const rotatedImg = new Image();
        rotatedImg.crossOrigin = "anonymous";
        rotatedImg.onload = function() {
            s.img = rotatedImg;
            
            // Re-adjust canvas height after rotation
            const newHeight = (rotatedImg.height * 400) / rotatedImg.width;
            s.canvas.height = newHeight;
            
            const w = s.canvas.width;
            const h = s.canvas.height;
            s.corners = [{ x: 30, y: 30 }, { x: w - 30, y: 30 }, { x: w - 30, y: h - 30 }, { x: 30, y: h - 30 }];
            
            draw(side);
        };
        rotatedImg.src = internalCanvas.toDataURL("image/jpeg");
    };
    tempImg.src = s.originalSrc;
}

function draw(side) {
    const s = engine[side];
    if (!s.img) return;
    s.ctx.clearRect(0, 0, s.canvas.width, s.canvas.height);
    s.ctx.save();
    s.ctx.translate(s.offsetX, s.offsetY);
    s.ctx.scale(s.zoom, s.zoom);
    s.ctx.drawImage(s.img, 0, 0, s.canvas.width, s.canvas.height);
    s.ctx.restore();
    s.ctx.strokeStyle = '#28a745';
    s.ctx.lineWidth = 2;
    s.ctx.beginPath();
    s.ctx.moveTo(s.corners[0].x, s.corners[0].y);
    for (let i = 1; i < 4; i++) s.ctx.lineTo(s.corners[i].x, s.corners[i].y);
    s.ctx.closePath();
    s.ctx.stroke();
    s.corners.forEach((corner) => {
        s.ctx.fillStyle = '#28a745';
        s.ctx.beginPath();
        s.ctx.arc(corner.x, corner.y, 14, 0, Math.PI * 2); 
        s.ctx.fill();
        s.ctx.strokeStyle = '#fff';
        s.ctx.lineWidth = 3;
        s.ctx.stroke();
    });
}

function projectPerspective(srcImg, corners, targetW, targetH, cvsW, cvsH) {
    targetW = 856; targetH = 540;
    const hiddenCanvas = document.createElement('canvas');
    hiddenCanvas.width = targetW;
    hiddenCanvas.height = targetH;
    const ctx = hiddenCanvas.getContext('2d');

    const p1 = [corners[0].x / cvsW, corners[0].y / cvsH];
    const p2 = [corners[1].x / cvsW, corners[1].y / cvsH];
    const p3 = [corners[2].x / cvsW, corners[2].y / cvsH];
    const p4 = [corners[3].x / cvsW, corners[3].y / cvsH];

    for (let y = 0; y < targetH; y++) {
        for (let x = 0; x < targetW; x++) {
            let u = x / targetW; let v = y / targetH;
            let topX = p1[0] + u * (p2[0] - p1[0]);
            let topY = p1[1] + u * (p2[1] - p1[1]);
            let botX = p4[0] + u * (p3[0] - p4[0]);
            let botY = p4[1] + u * (p3[1] - p4[1]);
            let srcX = (topX + v * (botX - topX)) * srcImg.width;
            let srcY = (topY + v * (botY - topY)) * srcImg.height;
            ctx.drawImage(srcImg, srcX, srcY, 1, 1, x, y, 1, 1);
        }
    }

    const isBw = document.getElementById("type").value == 5;
    if (isBw) {
        const imgData = ctx.getImageData(0, 0, targetW, targetH);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
            data[i] = gray; data[i+1] = gray; data[i+2] = gray;
        }
        ctx.putImageData(imgData, 0, 0);
    }
    return hiddenCanvas;
}

// ========================================================================
// 🤖 BROWSER-SIDE LIVE CV IMAGE ENHANCER (CLAHE + UNSHARP MATRICES)
// ========================================================================
function enhanceCroppedImageOnBrowser(canvasElement) {
    if (typeof cv === 'undefined') return canvasElement; // Fallback if OpenCV.js is not loaded yet
    try {
        let src = cv.imread(canvasElement);
        let labMat = new cv.Mat();
        let channels = new cv.MatVector();
        let cl = new cv.Mat();
        
        // Convert to LAB color framework safely
        cv.cvtColor(src, labMat, cv.COLOR_RGBA2RGB, 0);
        cv.cvtColor(labMat, labMat, cv.COLOR_RGB2Lab, 0);
        cv.split(labMat, channels);
        
        // Execute CLAHE adaptive details lock contrast
        let clahe = new cv.CLAHE(2.0, new cv.Size(8, 8));
        clahe.apply(channels.get(0), cl);
        channels.set(0, cl);
        cv.merge(channels, labMat);
        
        let enhancedRGB = new cv.Mat();
        cv.cvtColor(labMat, enhancedRGB, cv.COLOR_Lab2RGB, 0);
        
        // Run Unsharp contrast blending boundaries
        let blurred = new cv.Mat();
        cv.GaussianBlur(enhancedRGB, blurred, new cv.Size(0, 0), 3, 3, cv.BORDER_DEFAULT);
        
        let dest = new cv.Mat();
        cv.addWeighted(enhancedRGB, 1.5, blurred, -0.5, 0, dest);
        
        // Render back to canvas memory
        cv.imshow(canvasElement, dest);
        
        // Free heap allocation layers cleanly
        src.delete(); labMat.delete(); channels.delete(); cl.delete();
        clahe.delete(); enhancedRGB.delete(); blurred.delete(); dest.delete();
    } catch (e) {
        console.warn("Local JS CV context dropped, using native pixel layout:", e);
    }
    return canvasElement;
}

function dataURLtoBlob(dataurl) {
    var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
        bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
    while(n--){ u8arr[n] = bstr.charCodeAt(n); }
    return new Blob([u8arr], {type:mime});
}

// 🚀 FIXED: Added "Please Wait" loading logic for Save Buttons
async function saveSide(side) {
    const s = engine[side];
    if (!s.img) { alert(`Choose an image for ${side} first.`); return; }

    // Find all save buttons for this side and disable them
    const buttons = document.querySelectorAll(`button[onclick="saveSide('${side}')"]`);
    buttons.forEach(btn => {
        btn.dataset.originalText = btn.innerText; // Store original text
        btn.innerText = "Please wait...";
        btn.disabled = true;
    });

    // Give browser 100ms to update the UI button before freezing on processing
    await new Promise(r => setTimeout(r, 100));

    const mappedCorners = s.corners.map(c => ({ x: (c.x - s.offsetX) / s.zoom, y: (c.y - s.offsetY) / s.zoom }));
    closeFullscreen();

    // Pass dynamic canvas width and height here
    let resultCanvas = projectPerspective(s.img, mappedCorners, 856, 540, s.canvas.width, s.canvas.height);
    
    // Injected the live web browser enhancer filter directly onto the saved perspective canvas before showing preview
    resultCanvas = enhanceCroppedImageOnBrowser(resultCanvas);
    
    const croppedDataUrl = resultCanvas.toDataURL("image/jpeg", 0.90);
    
    document.getElementById(`${side}PreviewImg`).src = croppedDataUrl;
    document.getElementById(`${side}PreviewContainer`).style.display = "block";
    applyLiveGrayscalePreviewFilter();

    if (side === 'front') frontDataUrl = croppedDataUrl;
    else backDataUrl = croppedDataUrl;

    // Restore button states
    buttons.forEach(btn => {
        btn.innerText = btn.dataset.originalText;
        btn.disabled = false;
    });
}

// ========================================================================
// 🔲 CENTRAL WEB A4 ROUNDED MERGER ENGINE (FRONT LEFT TOP & BACK RIGHT TOP)
// ========================================================================
function generateMergedA4Blob() {
    return new Promise((resolve) => {
        const a4Canvas = document.createElement('canvas');
        a4Canvas.width = 2480;
        a4Canvas.height = 3508;
        const ctx = a4Canvas.getContext('2d');

        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, a4Canvas.width, a4Canvas.height);

        let frontLoaded = false;
        let backLoaded = false;

        function drawRoundedCard(img, x, y, width, height, radius) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            
            ctx.clip();
            ctx.drawImage(img, x, y, width, height);
            ctx.restore();
        }

        const frontImg = new Image();
        frontImg.onload = function() {
            drawRoundedCard(frontImg, 150, 150, 1010, 640, 50);
            frontLoaded = true;
            checkComplete();
        };
        frontImg.src = frontDataUrl;

        if (backDataUrl) {
            const backImg = new Image();
            backImg.onload = function() {
                drawRoundedCard(backImg, 1320, 150, 1010, 640, 50);
                backLoaded = true;
                checkComplete();
            };
            backImg.src = backDataUrl;
        } else {
            backLoaded = true;
            checkComplete();
        }

        function checkComplete() {
            if (frontLoaded && backLoaded) {
                a4Canvas.toBlob((blob) => {
                    resolve(blob);
                }, "image/jpeg", 0.92);
            }
        }
    });
}

// ==========================================
// 👑 SUBMIT ORDER (WITH SECRET ADMIN MODE)
// ==========================================
async function submitID() {
    // 👑 1. ADMIN MODE CHECK
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === 'vishu') {
        localStorage.setItem('adminMode', 'true');
    }
    const isAdmin = localStorage.getItem('adminMode') === 'true';

    // 🟢 2. SPAM PROTECTION (Admin ko wait nahi karna padega)
    const lastOrderTime = localStorage.getItem("last_order_time");
    if (!isAdmin && lastOrderTime && (Date.now() - parseInt(lastOrderTime)) < 60000) { 
        alert("⏳ Security Alert: Please wait 1 minute before placing another order.");
        return;
    }

    // 🟢 3. INPUT SANITIZATION
    const rawName = document.getElementById("name").value.trim();
    const rawMobile = document.getElementById("mobile").value.trim();
    
    const name = rawName.replace(/<[^>]*>?/gm, ''); 
    const mobile = rawMobile.replace(/[^0-9+]/g, ''); 

    if (rawName !== name || rawMobile !== mobile) {
        alert("⚠️ Invalid characters detected in Name or Mobile!");
        return;
    }

    const finalName = name || (isAdmin ? "Shop Admin" : "Guest");
    const finalMobile = mobile || "N/A";
    const copiesInput = parseInt(document.getElementById("copies").value) || 1;
    const typeSelect = document.getElementById("type").value;
    const isBw = typeSelect == 5;

    if (!frontDataUrl) { alert("Save Front crop first."); return; }

    // Dynamic Submit Button Loading State
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.innerText = "Please wait...";
    submitBtn.disabled = true;
    
    const finalA4Blob = await generateMergedA4Blob();

    const prefix = isBw ? "bw_" : "color_";
    const timestamp = Date.now();
    const fileName = `${timestamp}_${prefix}merged_a4.jpg`;

    const uploadResponse = await client.storage.from("documents").upload(fileName, finalA4Blob, { 
        contentType: "image/jpeg",
        upsert: true 
    });
    
    if (uploadResponse.error) { 
        alert("Upload Failed: " + uploadResponse.error.message); 
        submitBtn.innerText = "Submit Processing Order";
        submitBtn.disabled = false;
        return; 
    }

    const publicUrl = client.storage.from("documents").getPublicUrl(fileName).data.publicUrl;
    let baseRate = isBw ? 5 : 10;
    let totalAmountCalculation = copiesInput * baseRate;

    const printLabel = isBw ? "Black & White" : "Color";
    const orderLabelText = `Document ID - ${printLabel} [${copiesInput} Copies]`;

    // 👑 4. ADMIN PAYMENT STATUS LOGIC
    const finalPaymentStatus = isAdmin ? "Paid (Admin)" : "Pending";
    const finalPaymentId = isAdmin ? "Direct-Shop-Print" : "";

    const { data: insertedOrder, error } = await client.from("orders").insert([{
        customer_name: finalName, mobile: finalMobile, print_type: orderLabelText, pages: copiesInput, amount: totalAmountCalculation,
        file_url: publicUrl, front_url: null, back_url: null, 
        payment_status: finalPaymentStatus, 
        payment_id: finalPaymentId
    }]).select();

    if (error) { 
        alert("Database Insertion Error: " + error.message); 
        submitBtn.innerText = "Submit Processing Order";
        submitBtn.disabled = false;
        return; 
    }

    // Success hone par LocalStorage set karna
    localStorage.setItem("last_order_time", Date.now());

    // 👑 5. PAYMENT PAGE BYPASS
    if (isAdmin) {
        alert("👑 Owner Mode: ID Card sent directly to printer! No payment required.");
        window.location.reload(); // Page refresh ho jayega ready for next print
    } else {
        localStorage.setItem("amount", totalAmountCalculation);
        localStorage.setItem("mobile", finalMobile);
        localStorage.setItem("printType", "id");
        if (insertedOrder && insertedOrder.length > 0) localStorage.setItem("current_order_id", insertedOrder[0].id); 
        window.location.href = "payment.html"; // Customer normal payment page par jayega
    }
}

// ========================================================================
// MOBILE TOUCH / INTERACTION MULTI-GRID EVENT SCHEMATICS
// ========================================================================
['front', 'back'].forEach((side) => {
    const canvas = engine[side].canvas;
    let lastX = 0; let lastY = 0;
    
    function getCanvasCoordinates(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { 
            x: (clientX - rect.left) * (canvas.width / rect.width), 
            y: (clientY - rect.top) * (canvas.height / rect.height) 
        };
    }

    canvas.addEventListener('touchstart', function(e) {
        const s = engine[side]; if (!s.img) return;
        
        if (e.touches.length === 2) {
            s.activeCorner = -1;
            s.isPanning = false;
            s.lastTouchDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            s.lastTouchX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            s.lastTouchY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        } else if (e.touches.length === 1) {
            const pos = getCanvasCoordinates(e);
            s.activeCorner = s.corners.findIndex(c => Math.hypot(c.x - pos.x, c.y - pos.y) < 45);
            
            if (s.activeCorner === -1 && s.zoom > 1) { 
                s.isPanning = true; 
                lastX = e.touches[0].clientX; 
                lastY = e.touches[0].clientY; 
            }
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', function(e) {
        const s = engine[side]; if (!s.img) return;
        if (e.cancelable) e.preventDefault(); 

        if (e.touches.length === 2) {
            const currentDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            const currentX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const currentY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

            let scaleFactor = currentDist / s.lastTouchDist;
            let newZoom = s.zoom * scaleFactor;
            newZoom = Math.max(1, Math.min(8, newZoom)); 

            const rect = canvas.getBoundingClientRect();
            const canvasCenterX = (currentX - rect.left) * (canvas.width / rect.width);
            const canvasCenterY = (currentY - rect.top) * (canvas.height / rect.height);

            s.offsetX = canvasCenterX - (canvasCenterX - s.offsetX) * (newZoom / s.zoom);
            s.offsetY = canvasCenterY - (canvasCenterY - s.offsetY) * (newZoom / s.zoom);
            
            s.zoom = newZoom;
            s.offsetX += (currentX - s.lastTouchX);
            s.offsetY += (currentY - s.lastTouchY);

            s.lastTouchDist = currentDist;
            s.lastTouchX = currentX;
            s.lastTouchY = currentY;

            if (s.zoom === 1) { s.offsetX = 0; s.offsetY = 0; }
            draw(side);
        } else if (e.touches.length === 1) {
            if (s.activeCorner !== -1) {
                const pos = getCanvasCoordinates(e);
                s.corners[s.activeCorner] = { x: Math.max(0, Math.min(canvas.width, pos.x)), y: Math.max(0, Math.min(canvas.height, pos.y)) };
                draw(side);
            } else if (s.isPanning) {
                s.offsetX += (e.touches[0].clientX - lastX); 
                s.offsetY += (e.touches[0].clientY - lastY);
                lastX = e.touches[0].clientX; 
                lastY = e.touches[0].clientY; 
                draw(side);
            }
        }
    }, { passive: false });

    window.addEventListener('touchend', function() { 
        engine[side].activeCorner = -1; 
        engine[side].isPanning = false; 
    });

    canvas.addEventListener('mousedown', function(e) {
        const s = engine[side]; if (!s.img) return;
        const pos = getCanvasCoordinates(e);
        s.activeCorner = s.corners.findIndex(c => Math.hypot(c.x - pos.x, c.y - pos.y) < 45);
        if (s.activeCorner === -1 && s.zoom > 1) { s.isPanning = true; lastX = e.clientX; lastY = e.clientY; }
    });
    
    canvas.addEventListener('mousemove', function(e) {
        const s = engine[side]; if (!s.img) return;
        if (s.activeCorner !== -1) {
            const pos = getCanvasCoordinates(e);
            s.corners[s.activeCorner] = { x: Math.max(0, Math.min(canvas.width, pos.x)), y: Math.max(0, Math.min(canvas.height, pos.y)) };
            draw(side);
        } else if (s.isPanning) {
            s.offsetX += (e.clientX - lastX); s.offsetY += (e.clientY - lastY);
            lastX = e.clientX; lastY = e.clientY; draw(side);
        }
    });
    window.addEventListener('mouseup', function() { engine[side].activeCorner = -1; engine[side].isPanning = false; });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const s = engine[side]; if (!s.img) return;
        const mouse = getCanvasCoordinates(e);
        let newZoom = e.deltaY < 0 ? s.zoom * 1.1 : s.zoom / 1.1;
        newZoom = Math.max(1, Math.min(8, newZoom));
        s.offsetX = mouse.x - (mouse.x - s.offsetX) * (newZoom / s.zoom);
        s.offsetY = mouse.y - (mouse.y - s.offsetY) * (newZoom / s.zoom);
        s.zoom = newZoom;
        if(s.zoom === 1) { s.offsetX = 0; s.offsetY = 0; }
        draw(side);
    }, { passive: false });
});
</script>
